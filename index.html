        p.respawnTimer = 0;
      }
      if (this.konamiActivated) this.sharedLives = 10;
    }
    // Clear incompatible transformations for all players
    for (const p of this.players) {
      if (!p.isUnderwater && p.isMermaid) p.isMermaid = false;
      if (p.isUnderwater) {
        // Only clear non-base forms when going underwater
        const baseDef = p.characterDef.startForm;
        if (!baseDef.isMouseicorn) p.isMouseicorn = false;
        if (!baseDef.isKittycorn) p.isKittycorn = false;
        if (!baseDef.isPixicorn) p.isPixicorn = false;
      }
    }
    // Deactivate inactive player slots
    for (let i = 0; i < this.players.length; i++) {
      if (!this.activePlayers[i]) {
        this.players[i].alive = false;
        this.players[i].respawnTimer = 0;
      }
    }
    // Snap camera to centroid of active players
    const actives = this.players.filter((p, i) => this.activePlayers[i]);
    const midX = actives.length > 0 ? actives.reduce((s, p) => s + p.cx, 0) / actives.length : this.player.cx;
    this.camera.x = midX - CFG.W * 0.5;
    this.camera.targetX = this.camera.x;
    this.camera.y = this.level.height - CFG.H;
    this.camera.targetY = this.camera.y;
  }
  respawnPlayer() {
    for (let i = 0; i < this.players.length; i++) {
      if (this.activePlayers[i]) {
        this.players[i].reset(this.level.spawnX + i * 30, this.level.spawnY);
        this.players[i]._deathHandled = false;
        this.players[i].respawnTimer = 0;
      } else {
        this.players[i].alive = false;
        this.players[i].respawnTimer = 0;
      }
    }
    const actives = this.players.filter((p, i) => this.activePlayers[i]);
    const midX = actives.length > 0 ? actives.reduce((s, p) => s + p.cx, 0) / actives.length : this.player.cx;
    this.camera.x = midX - CFG.W * 0.5;
    this.camera.targetX = this.camera.x;
    this.camera.y = this.level.height - CFG.H;
    this.camera.targetY = this.camera.y;
  }
  run(timestamp) {
    if (!this.lastTime) this.lastTime = timestamp;
    let dt = (timestamp - this.lastTime) / 1000;
    this.lastTime = timestamp;

    // Clamp large dt (tab switch, etc.)
    if (dt > 0.1) dt = 0.1;

    // Init audio on first interaction (keyboard or gamepad)
    if (!this.audio.initialized) {
      if (Object.keys(KEYBOARD).length > 0 || this.inputs.some(inp => inp.anyGamepadPressed)) {
        this.audio.init();
        if (this.stateMachine.state === STATE_TITLE) {
          this.audio.playMusic("title_screen", true);
        }
      }
    }

    if (this.audio.initialized) {
      this.audio.checkPendingMusic();
    }

    for (const inp of this.inputs) inp.update();

    // Konami Code reward (P1 only) — shared lives pool
    if (this.input.konamiJustCompleted) {
      this.konamiActivated = true;
      this.sharedLives = 10;
      this.audio.hoopSound();
      this.konamiFlashTimer = 2.0;
    }
    if (this.konamiFlashTimer > 0) this.konamiFlashTimer -= dt;

    // Fixed timestep for physics
    this.accumulator += dt;
    while (this.accumulator >= this.fixedDT) {
      this.stateMachine.update(this.fixedDT);
      this.accumulator -= this.fixedDT;
    }

    // Render
    this.render(dt);

    requestAnimationFrame(t => this.run(t));
  }
  render(dt) {
    const c = this.renderer.c;
    this.renderer.begin();

    switch (this.stateMachine.state) {
      case STATE_TITLE:
        this.renderTitle(c);
        break;
      case STATE_CODE_ENTRY:
        this.renderCodeEntry(c);
        break;
      case STATE_LEVEL_INTRO:
        this.renderGame(c);
        this.renderLevelIntro(c);
        break;
      case STATE_PLAYING:
      case STATE_DYING:
        this.renderGame(c);
        break;
      case STATE_PAUSED:
        this.renderGame(c);
        this.renderPaused(c);
        break;
      case STATE_COMPLETE:
        this.renderGame(c);
        this.renderComplete(c);
        break;
      case STATE_PLAYER_SELECT:
        this.renderPlayerSelect(c);
        break;
      case STATE_NAME_ENTRY:
        this.renderNameEntry(c);
        break;
      case STATE_STORY:
        this.renderStory(c);
        break;
    }

    // CRT scanline overlay
    c.fillStyle = "rgba(0,0,0,0.04)";
    for (let y = 0; y < CFG.H; y += 3) {
      c.fillRect(0, y, CFG.W, 1);
    }
    // Vignette (corner darkening)
    const vig = c.createRadialGradient(CFG.W/2, CFG.H/2, CFG.W*0.35, CFG.W/2, CFG.H/2, CFG.W*0.7);
    vig.addColorStop(0, "rgba(0,0,0,0)");
    vig.addColorStop(1, "rgba(0,0,0,0.25)");
    c.fillStyle = vig;
    c.fillRect(0, 0, CFG.W, CFG.H);

    // Konami Code flash (visible on any screen)
    if (this.konamiFlashTimer > 0) {
      c.save();
      const a = Math.min(1, this.konamiFlashTimer);
      c.fillStyle = `rgba(255,215,0,${a * 0.25})`;
      c.fillRect(0, 0, CFG.W, CFG.H);
      c.textAlign = "center";
      c.textBaseline = "middle";
      c.font = "bold 18px monospace";
      c.fillStyle = `rgba(255,255,100,${a})`;
      c.fillText("\u2764 10 SHARED LIVES! \u2764", CFG.W / 2, CFG.H / 2);
      c.restore();
    }

    this.renderer.end();
  }
  renderTitle(c) {
    const gt = this.stateMachine.titlePhase;

    // Animated background
    const grd = c.createLinearGradient(0, 0, 0, CFG.H);
    const hue1 = (gt * 20) % 360;
    const hue2 = (hue1 + 60) % 360;
    const hue3 = (hue1 + 120) % 360;
    grd.addColorStop(0, `hsl(${hue1},70%,12%)`);
    grd.addColorStop(0.5, `hsl(${hue2},60%,16%)`);
    grd.addColorStop(1, `hsl(${hue3},70%,12%)`);
    c.fillStyle = grd;
    c.fillRect(0, 0, CFG.W, CFG.H);

    // Stars in background
    const rng = new SeededRNG(42);
    for (let i = 0; i < 60; i++) {
      const sx = rng.next() * CFG.W;
      const sy = rng.next() * CFG.H * 0.7;
      const twinkle = Math.sin(gt * 3 + i * 1.5) * 0.4 + 0.6;
      c.fillStyle = `rgba(255,255,255,${twinkle})`;
      c.beginPath();
      c.arc(sx, sy, 1 + rng.next(), 0, Math.PI*2);

    // Title text with rainbow gradient

    c.fillStyle = "rgba(0,0,0,0.5)";

    // Title with rainbow

    for (let i = 0; i < rainbowColors.length; i++) {
      titleGrd.addColorStop(((i / rainbowColors.length) + offset) % 1, rainbowColors[i]);
    }
    c.fillStyle = titleGrd;
    c.fillText("RAINBOW UNICORN QUEST", CFG.W/2, 66);

    // Subtitle with dashes
    c.font = "bold 12px monospace";

    c.font = "bold 9px monospace";
    c.fillStyle = "#88aacc";
    c.fillText("4 PLAYER CO-OP", CFG.W/2, 100);

    // Four animated characters on title screen with colored glow
    const drawH = 50;
    const charSprites = [
      { sprite: SPRITES.run, fw: CFG.SPRITE_RUN_FW, fh: CFG.SPRITE_RUN_FH, color: "#ffffff", label: "STAR", scale: 0.9 },
      { sprite: SPRITES.kittycornRun, fw: CFG.SPRITE_KITTYCORN_RUN_FW, fh: CFG.SPRITE_KITTYCORN_RUN_FH, color: "#ff88cc", label: "LUNA", scale: 0.7, frames: CFG.SPRITE_KITTYCORN_RUN_FRAMES },
      { sprite: SPRITES.pixicorn, fw: CFG.SPRITE_PIXICORN_FW, fh: CFG.SPRITE_PIXICORN_FH, color: "#cc88ff", label: "FAYE", scale: 0.9, frames: CFG.SPRITE_PIXICORN_FLY_FRAMES },
      { sprite: SPRITES.mousicorn, fw: CFG.SPRITE_MOUSICORN_FW, fh: CFG.SPRITE_MOUSICORN_FH, color: "#aa8866", label: "PIP", scale: 0.9, frames: CFG.SPRITE_MOUSICORN_RUN_FRAMES },
    ];
    const spacing = 80;
    const startX = CFG.W / 2 - (spacing * 1.5);
    for (let i = 0; i < 4; i++) {
      const ch = charSprites[i];
      const bobY = Math.sin(gt * 2 + i * 0.8) * 5;
      const cx = startX + i * spacing;
      const dh = drawH * ch.scale;
      // Colored glow behind character
      const glowPulse = 0.12 + Math.sin(gt * 3 + i) * 0.06;
      c.fillStyle = ch.color.replace(")", `,${glowPulse})`).replace("#", "rgba(");
      // Parse hex color for glow
      const hr = parseInt(ch.color.slice(1,3), 16);
      const hg = parseInt(ch.color.slice(3,5), 16);
      const hb = parseInt(ch.color.slice(5,7), 16);
      c.fillStyle = `rgba(${hr},${hg},${hb},${glowPulse})`;
      c.beginPath();
      c.arc(cx, 148 + bobY, 28, 0, Math.PI * 2);
      c.fill();
      // Character sprite
      c.save();
      c.translate(cx, 148 + bobY);
      if (ch.sprite) {
        const nFrames = ch.frames || CFG.SPRITE_RUN_FRAMES;
        const f = Math.floor(gt * 10) % nFrames;
        const srcX = f * ch.fw;
        const dw = ch.fw * (dh / ch.fh);
        c.drawImage(ch.sprite, srcX, 0, ch.fw, ch.fh, -dw / 2, -dh / 2, dw, dh);
      } else {
        c.fillStyle = ch.color;
        c.beginPath();
        c.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();
      // Character label
      c.font = "bold 8px monospace";
      c.fillStyle = ch.color;
      c.fillText(ch.label, cx, 115);
      // P-tag

      c.fillStyle = "rgba(255,255,255,0.4)";
      c.fillText("P" + (i + 1), cx, 180);
      // Stat bars (TMNT style: Speed/Power)

      c.font = "5px monospace";
      c.fillStyle = "rgba(255,255,255,0.35)";
      c.fillText("SPD", cx - 18, barY);
      c.fillText("PWR", cx - 18, barY + 8);
      // Speed bar
      const speeds = [0.7, 0.9, 0.6, 0.8];
      const powers = [0.6, 0.5, 0.8, 0.7];
      c.fillStyle = "rgba(0,0,0,0.3)";
      c.fillRect(cx - 5, barY - 3, barW, 4);
      c.fillStyle = "#44cc44";
      c.fillRect(cx - 5, barY - 3, barW * speeds[i], 4);
      // Power bar
      c.fillStyle = "rgba(0,0,0,0.3)";
      c.fillRect(cx - 5, barY + 5, barW, 4);
      c.fillStyle = "#ff6644";
      c.fillRect(cx - 5, barY + 5, barW * powers[i], 4);
    }

    // INSERT COIN text (pulsing)
    const coinAlpha = 0.5 + Math.sin(gt * 5) * 0.5;
    c.globalAlpha = coinAlpha;
    c.font = "bold 12px monospace";
    c.fillStyle = "#ffdd44";
    c.fillText("INSERT  COIN", CFG.W/2, 208);
    c.globalAlpha = 1;
    c.font = "bold 8px monospace";
    c.fillStyle = "rgba(255,255,255,0.4)";
    c.fillText("PRESS  ENTER  TO  START", CFG.W/2, 222);

    c.font = "7px monospace";
    c.fillStyle = "#665588";
    c.fillText("P1: ARROWS + SPACE/SHIFT    P2: WASD + Q/F/X", CFG.W/2, 238);
    c.fillText("P3 + P4: GAMEPAD ONLY    ALL: GAMEPAD 0-3", CFG.W/2, 248);

    // Code entry hint
    c.font = "bold 8px monospace";
    c.fillStyle = "#44aaaa";
    c.fillText("PRESS  C / SELECT  FOR  SAVE  CODE", CFG.W/2, 261);

    // Copyright line
    c.font = "5px monospace";
    c.fillStyle = "rgba(255,255,255,0.15)";
    c.fillText("\u00A9 UNICORN ARCADE 2025", CFG.W/2, CFG.H - 4);

    c.restore();
  }
  renderPlayerSelect(c) {

  renderNameEntry(c) {
    const gt = this.stateMachine.titlePhase;
    const sm = this.stateMachine;
    const slot = sm.nameEntrySlot;
    const name = sm.nameInput;

    // Dark background + starfield
    c.fillStyle = "#0a0a1a";
    c.fillRect(0, 0, CFG.W, CFG.H);
    const rng = new SeededRNG(42);
    for (let i = 0; i < 50; i++) {
      const sx = rng.next() * CFG.W;
      const sy = rng.next() * CFG.H * 0.8;
      const twinkle = Math.sin(gt * 3 + i * 1.5) * 0.3 + 0.5;
      c.fillStyle = `rgba(255,255,255,${twinkle})`;
      c.beginPath(); c.arc(sx, sy, 1, 0, Math.PI*2); c.fill();
    }

    c.save();
    c.textAlign = "center";
    c.textBaseline = "middle";

    // Heading
    const slotIdx = slot - 1;
    const charDef = CHARACTER_DEFS[CHARACTER_ORDER[slotIdx]];
    c.font = "bold 18px monospace";
    c.fillStyle = charDef ? charDef.labelColor : "#ffffff";
    c.fillText("P" + slot + " " + (charDef ? charDef.name.toUpperCase() : "") + "  NAME", CFG.W/2, 55);

    // Letter boxes (8 slots)
    const boxW = 26, boxH = 32, gap = 4;
    const totalW = 8 * boxW + 7 * gap;
    const startX = CFG.W/2 - totalW/2;
    const boxY = CFG.H/2 - 20;
    const letterIdx = sm.nameLetterIdx;
    const curLetter = String.fromCharCode(65 + letterIdx);

    for (let i = 0; i < 8; i++) {
      const bx = startX + i * (boxW + gap);
      c.fillStyle = i < name.length ? "rgba(50,200,220,0.12)" : "rgba(255,255,255,0.04)";
      c.fillRect(bx, boxY, boxW, boxH);
      c.strokeStyle = i === name.length ? (charDef ? charDef.labelColor : "#ffffff") : "rgba(255,255,255,0.2)";
      c.lineWidth = i === name.length ? 2 : 1;
      c.strokeRect(bx, boxY, boxW, boxH);

      if (i < name.length) {
        c.font = "bold 18px monospace";
        c.fillStyle = "#ffffff";
        c.fillText(name[i], bx + boxW/2, boxY + boxH/2 + 1);
      }
      // Active box — D-pad cycling
      if (i === name.length && name.length < 8) {
        c.font = "bold 18px monospace";
        c.fillStyle = charDef ? charDef.labelColor : "#ffcc44";
        c.fillText(curLetter, bx + boxW/2, boxY + boxH/2 + 1);
        c.font = "9px monospace";
        c.fillStyle = "rgba(255,255,255,0.5)";
        c.fillText("\u25B2", bx + boxW/2, boxY - 7);
        c.fillText("\u25BC", bx + boxW/2, boxY + boxH + 10);
      }
    }

    // Default name hint
    const defaultName = charDef ? charDef.defaultName : "STAR";
    c.font = "10px monospace";
    c.fillStyle = "rgba(255,255,255,0.3)";
    c.fillText("DEFAULT: " + defaultName, CFG.W/2, boxY + boxH + 28);

    // Instructions
    c.font = "9px monospace";
    c.fillStyle = "rgba(255,255,255,0.45)";
    c.fillText("KEYBOARD: TYPE + ENTER    BACKSPACE    ESC", CFG.W/2, CFG.H - 38);
    c.fillText("GAMEPAD:  \u25B2\u25BC PICK   A ADD   B DELETE   START OK", CFG.W/2, CFG.H - 24);

    c.restore();
  }
  renderStory(c) {
    const sm = this.stateMachine;
    const scene = STORY_SCENES[sm.storySceneIndex];
    if (!scene) return;
    const gt = sm.stateTimer;

    // Gradient background
    const grd = c.createLinearGradient(0, 0, 0, CFG.H);
    for (let i = 0; i < scene.bgColors.length; i++) {
      grd.addColorStop(i / (scene.bgColors.length - 1), scene.bgColors[i]);
    }
    c.fillStyle = grd;
    c.fillRect(0, 0, CFG.W, CFG.H);

    // Check for custom image
    const customImg = this.storyImages[scene.imageKey];
    let textStartY = 50;

    if (customImg && customImg.complete) {
      // Draw custom image (centered, fit within top portion)
      const maxW = CFG.W - 20;
      const maxH = CFG.H * 0.4;
      const imgAspect = customImg.width / customImg.height;
      let drawW, drawH;
      if (imgAspect > maxW / maxH) {
        drawW = maxW;
        drawH = maxW / imgAspect;
      } else {
        drawH = maxH;
        drawW = maxH * imgAspect;
      }
      const imgX = (CFG.W - drawW) / 2;
      const imgY = 35;
      // Fade in with phase 0
      if (sm.storyPhase === 0) {
        c.globalAlpha = Math.min(1, gt / 1.5);
      }
      // Rounded border effect
      c.save();
      c.strokeStyle = "rgba(255,255,255,0.3)";
      c.lineWidth = 2;
      c.strokeRect(imgX - 1, imgY - 1, drawW + 2, drawH + 2);
      c.drawImage(customImg, imgX, imgY, drawW, drawH);
      c.globalAlpha = 1;
      c.restore();
      textStartY = imgY + drawH + 12;
    } else {
      // Fallback: canvas illustration
      this.drawStoryIllustration(c, scene.illustrationTheme, gt);
    }

    c.save();
    c.textAlign = "center";
    c.textBaseline = "top";

    // Fade in overlay for phase 0
    if (sm.storyPhase === 0) {
      const fadeAlpha = Math.min(1, gt / 1.5);
      c.globalAlpha = fadeAlpha;
    }

    // Title
    c.font = "bold 16px monospace";
    c.fillStyle = "#ffcc44";
    c.fillText(scene.title, CFG.W/2, customImg ? textStartY : 20);
    const titleOffset = customImg ? textStartY + 20 : 42;

    // Text lines
    const lines = this.playerCount >= 2 ? scene.text2P : scene.text1P;
    const lineH = 18;
    c.font = "10px monospace";

    for (let i = 0; i < lines.length; i++) {
      const lineY = titleOffset + i * lineH;
      if (lineY > CFG.H - 35) break; // Don't draw past bottom
      // Fade in based on scroll progress
      const lineReveal = sm.storyScrollY - i * lineH;
      const lineAlpha = sm.storyPhase === 0 ? 0 : Math.min(1, Math.max(0, lineReveal / 16));
      if (lineAlpha <= 0) continue;

      c.globalAlpha = lineAlpha;
      // Inject names (support P1-P4)
      let text = lines[i]
        .replace(/\{P1\}/g, this.playerNames[0])
        .replace(/\{P2\}/g, this.playerNames[1])
        .replace(/\{P3\}/g, this.playerNames[2] || "FAYE")
        .replace(/\{P4\}/g, this.playerNames[3] || "PIP");
      c.fillStyle = text === "THE END" ? "#ffcc44" : "#ddddee";
      c.fillText(text, CFG.W/2, lineY);
    }

    c.globalAlpha = 1;

    // Blinking prompt in phase 2
    if (sm.storyPhase === 2 && Math.sin(gt * 4) > 0) {
      c.font = "bold 10px monospace";
      c.fillStyle = "#aaaaff";
      c.fillText("PRESS  ENTER  TO  CONTINUE", CFG.W/2, CFG.H - 20);
    }

    // Drop hint (subtle, always visible in story mode)
    if (!customImg) {
      c.font = "8px monospace";
      c.fillStyle = "rgba(255,255,255,0.2)";
      c.fillText("DROP IMAGE HERE TO ADD ART", CFG.W/2, CFG.H - 8);
    }

    c.restore();
  }
  drawStoryIllustration(c, theme, gt) {
    c.save();
    const w = CFG.W, h = CFG.H;

    switch (theme) {

        c.beginPath();

        // Sparkles
        for (let i = 0; i < 8; i++) {

      }

          c.fillRect(tx-5, h*0.2, 10, h*0.8);
          // Canopy circles
          c.beginPath(); c.arc(tx, h*0.25, 30, 0, Math.PI*2); c.fill();
        }
        // Cat ear silhouettes
        c.fillStyle = "#0a1500";
        c.beginPath(); c.moveTo(w*0.45, h*0.55); c.lineTo(w*0.48, h*0.42);
        c.lineTo(w*0.51, h*0.55); c.fill();
        c.beginPath(); c.moveTo(w*0.49, h*0.55); c.lineTo(w*0.52, h*0.42);
        c.lineTo(w*0.55, h*0.55); c.fill();
        break;
      }
      case "pixicorn_sparkle": {
        // Waterfall
        c.fillStyle = "#220044";
        c.fillRect(w*0.4, 0, w*0.2, h*0.7);
        c.fillStyle = "#440088";
        c.fillRect(w*0.42, h*0.7, w*0.16, h*0.3);
        // Sparkle particles
        for (let i = 0; i < 15; i++) {
          const px = w*0.3 + Math.sin(gt + i*0.8) * w*0.25;
          const py = (h*0.2 + i*h*0.05 + gt*20) % h;
          const s = 1 + Math.sin(gt*3+i) * 0.5;
          c.fillStyle = `hsl(${(gt*60+i*30)%360},80%,70%)`;
          c.beginPath(); c.arc(px, py, s, 0, Math.PI*2); c.fill();
        }
        break;
      }
      case "mousicorn_sewer": {
        // Dark tunnel
        c.fillStyle = "#0a0a00";
        c.fillRect(0, h*0.3, w, h*0.5);
        // Light at end
        const lightR = 40 + Math.sin(gt * 2) * 5;
        const grad = c.createRadialGradient(w*0.8, h*0.55, 0, w*0.8, h*0.55, lightR);
        grad.addColorStop(0, "rgba(255,255,200,0.6)");
        grad.addColorStop(1, "rgba(255,255,200,0)");
        c.fillStyle = grad;
        c.beginPath(); c.arc(w*0.8, h*0.55, lightR, 0, Math.PI*2); c.fill();
        break;
      }
      case "world_travel": {
        // Globe outline
        c.strokeStyle = "#885500";
        c.lineWidth = 2;
        c.beginPath(); c.arc(w*0.5, h*0.5, 50, 0, Math.PI*2); c.stroke();
        // Longitude lines
        for (let i = 0; i < 4; i++) {
          c.beginPath(); c.ellipse(w*0.5, h*0.5, 50*Math.cos(i*0.7), 50, gt*0.3+i, 0, Math.PI*2);
          c.stroke();
        }
        break;
      }
      case "storm_cleared": {
        // Parting clouds
        c.fillStyle = "#334455";
        c.beginPath(); c.ellipse(w*0.2, h*0.3, 80, 25, 0, 0, Math.PI*2); c.fill();
        c.beginPath(); c.ellipse(w*0.8, h*0.3, 80, 25, 0, 0, Math.PI*2); c.fill();
        // Gap in center — rainbow bridge
        const rc = ["#ff4444","#ff8800","#ffff00","#44ff44","#4488ff","#8844ff"];
        for (let i = 0; i < rc.length; i++) {
          c.strokeStyle = rc[i];
          c.lineWidth = 3;
          c.beginPath(); c.arc(w*0.5, h*0.6, 60+i*4, Math.PI, 0); c.stroke();
        }
        break;
      }
      case "rainbow_finale": {
        // Full rainbow arc
        const rc = ["#ff4444","#ff8800","#ffff00","#44ff44","#4488ff","#8844ff","#ff44ff"];
        for (let i = 0; i < rc.length; i++) {
          c.strokeStyle = rc[i];
          c.lineWidth = 4;
          c.beginPath(); c.arc(w*0.5, h*0.7, 80+i*5, Math.PI, 0); c.stroke();
        }
        // Animated sparkles
        for (let i = 0; i < 20; i++) {
          const angle = Math.PI + (i/20) * Math.PI;
          const r = 80 + Math.sin(gt*3+i)*20;
          const sx = w*0.5 + Math.cos(angle)*r;
          const sy = h*0.7 + Math.sin(angle)*r;
          c.fillStyle = `hsl(${(gt*80+i*18)%360},90%,70%)`;
          c.beginPath(); c.arc(sx, sy, 1.5+Math.sin(gt*4+i)*0.8, 0, Math.PI*2); c.fill();
        }
        break;
      }
    }

    c.globalAlpha = 1;
    c.restore();
  }
  renderCodeEntry(c) {
    const gt = this.stateMachine.titlePhase;

    // Dark background
    c.fillStyle = "#0a0a1a";
    c.fillRect(0, 0, CFG.W, CFG.H);

    // Starfield
    const rng = new SeededRNG(42);
    for (let i = 0; i < 50; i++) {
      const sx = rng.next() * CFG.W;
      const sy = rng.next() * CFG.H * 0.8;
      const twinkle = Math.sin(gt * 3 + i * 1.5) * 0.3 + 0.5;
      c.fillStyle = `rgba(255,255,255,${twinkle})`;
      c.beginPath();
      c.arc(sx, sy, 1, 0, Math.PI*2);
      c.fill();
    }

    c.save();
    c.textAlign = "center";
    c.textBaseline = "middle";

    // Title
    c.font = "bold 20px monospace";
    c.fillStyle = "#ffcc44";
    c.fillText("ENTER  SAVE  CODE", CFG.W/2, 60);

    // Code display boxes
    const boxW = 32, boxH = 38, gap = 8;
    const totalW = 4 * boxW + 3 * gap;
    const startX = CFG.W/2 - totalW/2;
    const boxY = CFG.H/2 - 25;
    const code = this.stateMachine.codeInput || "";

    const letterIdx = this.stateMachine.codeLetterIdx || 0;
    const curLetter = String.fromCharCode(65 + letterIdx);

    for (let i = 0; i < 4; i++) {
      const bx = startX + i * (boxW + gap);
      // Box background
      c.fillStyle = i < code.length ? "rgba(50,200,220,0.15)" : "rgba(255,255,255,0.05)";
      c.fillRect(bx, boxY, boxW, boxH);
      // Box border
      c.strokeStyle = i === code.length ? "#44ddee" : "rgba(255,255,255,0.3)";
      c.lineWidth = i === code.length ? 2 : 1;
      c.strokeRect(bx, boxY, boxW, boxH);

      // Letter (confirmed)
      if (i < code.length) {
        c.font = "bold 22px monospace";
        c.fillStyle = "#ffffff";
        c.fillText(code[i], bx + boxW/2, boxY + boxH/2 + 1);
      }

      // Active box — show cycling letter with up/down arrows
      if (i === code.length && code.length < 4) {
        // Current selected letter
        c.font = "bold 22px monospace";
        c.fillStyle = "#44ddee";
        c.fillText(curLetter, bx + boxW/2, boxY + boxH/2 + 1);
        // Up arrow hint
        c.font = "10px monospace";
        c.fillStyle = "rgba(68,221,238,0.6)";
        c.fillText("\u25B2", bx + boxW/2, boxY - 8);
        // Down arrow hint
        c.fillText("\u25BC", bx + boxW/2, boxY + boxH + 12);
      }
    }

    // Message (accepted / invalid)
    const msg = this.stateMachine.codeMessage;
    if (msg) {
      c.font = "bold 14px monospace";
      c.fillStyle = this.stateMachine.codeSuccess ? "#44ff88" : "#ff4444";
      c.fillText(msg, CFG.W/2, boxY + boxH + 30);
    }

    // Instructions — show both keyboard and gamepad
    c.font = "9px monospace";
    c.fillStyle = "rgba(255,255,255,0.5)";
    c.fillText("KEYBOARD: TYPE + ENTER    BACKSPACE    ESC", CFG.W/2, CFG.H - 38);
    c.fillText("GAMEPAD:  \u25B2\u25BC PICK LETTER   A CONFIRM   B DELETE   START SUBMIT", CFG.W/2, CFG.H - 24);

    c.restore();
  }
  renderLevelIntro(c) {
    const gt = this.stateMachine.stateTimer;
    const def = LEVEL_DEFS[this.currentLevelIndex];

    // Dark overlay
    const alpha = Math.max(0.3, 0.8 - gt * 0.3);
    c.fillStyle = `rgba(0,0,20,${alpha})`;
    c.fillRect(0, 0, CFG.W, CFG.H);

    c.save();
    c.textAlign = "center";
    c.textBaseline = "middle";

    // World / Level name
    c.font = "bold 16px monospace";
    c.fillStyle = "#ffcc44";
    c.fillText("WORLD " + def.world + " - " + def.level, CFG.W/2, CFG.H/2 - 25);

    c.font = "bold 24px monospace";
    const tGrd = c.createLinearGradient(CFG.W/2 - 120, 0, CFG.W/2 + 120, 0);
    const rainbowC = ["#ff4444","#ff8800","#ffff00","#44ff44","#4488ff","#8844ff","#ff44ff"];
    for (let i = 0; i < rainbowC.length; i++) {
      tGrd.addColorStop(i / (rainbowC.length - 1), rainbowC[i]);
    }
    c.fillStyle = tGrd;
    c.fillText(def.title, CFG.W/2, CFG.H/2 + 10);

    // Shared lives display
    c.font = "bold 11px monospace";
    c.fillStyle = "#ffffff";
    const activeNames = this.playerNames.filter((n, i) => this.activePlayers[i]).map(n => n.substring(0,5));
    const livesLabel = activeNames.length > 1 ? "  (" + activeNames.join(" + ") + ")" : "";
    c.fillText("\u2764 x " + this.sharedLives + livesLabel, CFG.W/2, CFG.H/2 + 40);

    c.restore();
  }
  renderGame(c) {
    const camX = this.camera.scrollX;
    const camY = this.camera.scrollY;

    // Parallax background (multi-parallax with crossfade for zoned levels)
    if (this.parallaxMap) {
      const camCol = Math.floor(camX / CFG.TILE);
      const currentZone = this.level.getZoneAtCol(camCol);
      const screenEndCol = camCol + Math.ceil(CFG.W / CFG.TILE);
      const nextZone = this.level.getZoneAtCol(screenEndCol);

      const currentBg = this.parallaxMap[currentZone.bgTheme];
      if (currentBg) currentBg.draw(c, camX);

      // Crossfade if next zone has different theme
      if (nextZone.bgTheme !== currentZone.bgTheme) {
        const transitionWidth = 15; // tiles
        const distToZone = nextZone.startCol - camCol;
        if (distToZone < transitionWidth && distToZone > -5) {
          const alpha = Math.max(0, Math.min(1, 1 - distToZone / transitionWidth));
          c.globalAlpha = alpha;
          const nextBg = this.parallaxMap[nextZone.bgTheme];
          if (nextBg) nextBg.draw(c, camX);
          c.globalAlpha = 1;
        }
      }
    } else {
      this.parallax.draw(c, camX);
    }

    c.save();
    // Don't translate - we pass camX/camY to each draw call for precision

    // Tiles
    this.tileRenderer.drawTiles(c, this.level, camX, camY);

    // Environmental props (behind entities)
    for (const prop of this.level.props) {
      // Cull off-screen props
      if (prop.x + 30 < camX || prop.x - 30 > camX + CFG.W) continue;
      c.save();
      c.translate(-camX, -camY);
      drawProp(c, prop, this.gameTime);
      c.restore();
    }

    // Dead flowers
    for (const df of this.level.deadFlowers) {
      if (df.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawDeadFlower(c, df, this.gameTime);
        c.restore();
      }
    }

    // Black flowers
    for (const bf of this.level.blackFlowers) {
      if (bf.alive && !bf.used) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawBlackFlower(c, bf, this.gameTime);
        c.restore();
      }
    }

    // Hay bales
    for (const hb of this.level.hayBales) {
      if (hb.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawHayBale(c, hb, this.gameTime);
        c.restore();
      }
    }

    // Wing crystals
    for (const wc of this.level.wingCrystals) {
      if (wc.alive && !wc.collected) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawWingCrystal(c, wc, this.gameTime);
        c.restore();
      }
    }

    // Form gates
    for (const gate of this.level.formGates) {
      if (!gate.isOpen()) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawFormGate(c, gate, this.gameTime);
        c.restore();
      }
    }

    // Stars (behind player)
    for (const star of this.level.stars) {
      if (star.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawStar(c, star, this.gameTime);
        c.restore();
      }
    }

    // Hoop
    if (this.level.hoop && this.level.hoop.alive) {
      c.save();
      c.translate(-camX, -camY);
      this.spriteDrawer.drawHoop(c, this.level.hoop, this.gameTime);
      c.restore();
    }

    // Flies
    for (const fly of this.level.flies) {
      if (fly.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawFly(c, fly, this.gameTime);
        c.restore();
      }
    }

    // Gnomes
    for (const gnome of this.level.gnomes) {
      if (gnome.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawGnome(c, gnome, this.gameTime);
        c.restore();
      }
    }

    // Fish
    for (const fish of this.level.fish) {
      if (fish.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawFish(c, fish, this.gameTime);
        c.restore();
      }
    }

    // Jellyfish
    for (const jelly of this.level.jellyfish) {
      if (jelly.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawJellyfish(c, jelly, this.gameTime);
        c.restore();
      }
    }

    // Narwhals
    for (const nw of this.level.narwhals) {
      if (nw.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawNarwhal(c, nw, this.gameTime);
        c.restore();
      }
    }

    // Birds
    for (const bird of this.level.birds) {
      if (bird.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawBird(c, bird, this.gameTime);
        c.restore();
      }
    }

    // Mermaid Gems
    for (const mg of this.level.mermaidGems) {
      if (mg.alive && !mg.collected) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawMermaidGem(c, mg, this.gameTime);
        c.restore();
      }
    }

    // Kittycorn Gems
    for (const kg of this.level.kittycornGems) {
      if (kg.alive && !kg.collected) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawKittycornGem(c, kg, this.gameTime);
        c.restore();
      }
    }

    // Pixicorn Gems
    for (const pg of this.level.pixicornGems) {
      if (pg.alive && !pg.collected) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawPixicornGem(c, pg, this.gameTime);
        c.restore();
      }
    }

    // Mousicorn Gems
    for (const mg of this.level.mousicornGems) {
      if (mg.alive && !mg.collected) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawMousicornGem(c, mg, this.gameTime);
        c.restore();
      }
    }

    // Fireballs
    for (const fb of this.level.fireballs) {
      if (fb.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawFireball(c, fb, this.gameTime);
        c.restore();
      }
    }

    // Boss
    if (this.level.boss && this.level.boss.alive) {
      c.save();
      c.translate(-camX, -camY);
      this.spriteDrawer.drawBoss(c, this.level.boss, this.gameTime);
      c.restore();
    }

    // Poops
    for (const poop of this.level.poops) {
      if (poop.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawPoop(c, poop, this.gameTime);
        c.restore();
      }
    }

    // Rainbow bolts
    for (const rb of this.level.rainbowBolts) {
      if (rb.alive) {
        c.save();
        c.translate(-camX, -camY);
        this.spriteDrawer.drawRainbowBolt(c, rb, this.gameTime);
        c.restore();
      }
    }

    // Draw all active players
    for (let i = 0; i < this.players.length; i++) {
      if (!this.activePlayers[i]) continue;
      const p = this.players[i];
      if (p.alive || (p.respawnTimer > 0) || this.stateMachine.state === STATE_DYING) {
        c.save();
        c.translate(-camX, -camY);
        // Ghost effect while respawning
        if (!p.alive && p.respawnTimer > 0) {
          c.globalAlpha = 0.3 + 0.2 * Math.sin(this.gameTime * 8);
        }
        this.spriteDrawer.drawPlayer(c, p, this.gameTime);
        c.globalAlpha = 1;
        // Player label (name + slot tag)
        if (p.alive) {
          c.font = "bold 7px monospace";
          c.textAlign = "center";
          c.fillStyle = p.characterDef.labelColor;
          c.fillText(this.playerNames[i].substring(0, 5), p.cx, p.top - 6);
          c.fillStyle = "rgba(255,255,255,0.5)";
          c.font = "6px monospace";
          c.fillText("P" + (i + 1), p.cx, p.top - 13);
        }
        c.restore();
      }
    }

    // Particles (world space)
    this.particles.draw(c, camX, camY);

    c.restore();

    // Underwater tint overlay (zone-aware)
    let showUnderwaterTint = false;
    if (this.level.levelDef.zones) {
      const camCol = Math.floor(this.camera.scrollX / CFG.TILE);
      const zone = this.level.getZoneAtCol(camCol);
      showUnderwaterTint = !!zone.isUnderwater;
    } else {
      showUnderwaterTint = !!this.level.levelDef.isUnderwater;
    }
    if (showUnderwaterTint) {
      c.fillStyle = "rgba(10,40,80,0.15)";
      c.fillRect(0, 0, CFG.W, CFG.H);
      // Animated bubble columns
      const gt = this.gameTime;
      for (let i = 0; i < 6; i++) {
        const bx = (i * 83 + 40) % CFG.W;
        const by = CFG.H - ((gt * 30 + i * 50) % (CFG.H + 20));
        const br = 1.5 + Math.sin(gt * 3 + i) * 0.5;
        c.fillStyle = "rgba(150,200,255,0.15)";
        c.beginPath();
        c.arc(bx + Math.sin(gt * 2 + i * 1.3) * 5, by, br, 0, Math.PI*2);
        c.fill();
      }
    }

    // HUD
    this.hud.draw(c, this.players, this.gameTime, this.level.levelDef, this.levelTimer, this.activePlayers, this.sharedLives, this.playerNames, this);

    // Death overlay
    if (this.stateMachine.state === STATE_DYING) {
      const alpha = Math.min(0.6, this.stateMachine.deathTimer * 0.5);
      c.fillStyle = `rgba(80,0,0,${alpha})`;
      c.fillRect(0, 0, CFG.W, CFG.H);

      if (this.stateMachine.deathTimer > 0.5) {
        c.save();
        c.textAlign = "center";
        c.textBaseline = "middle";
        c.font = "bold 20px monospace";
        c.fillStyle = "#ff4444";
        c.fillText(this.sharedLives >= 0 ? "OUCH!" : "GAME OVER", CFG.W/2, CFG.H/2);
        c.restore();
      }
    }
  }
  renderPaused(c) {
    // Dark overlay
    c.fillStyle = "rgba(0,0,20,0.6)";
    c.fillRect(0, 0, CFG.W, CFG.H);
    c.save();
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.font = "bold 28px monospace";
    c.fillStyle = "#ffffff";
    c.fillText("PAUSED", CFG.W/2, CFG.H/2 - 10);
    const gt = this.stateMachine.stateTimer;
    if (Math.sin(gt * 4) > 0) {
      c.font = "bold 11px monospace";
      c.fillStyle = "#aaaaff";
      c.fillText("PRESS  START  TO  RESUME", CFG.W/2, CFG.H/2 + 20);
    }
    c.restore();
  }
  renderComplete(c) {
    // Overlay
    const alpha = Math.min(0.7, this.stateMachine.stateTimer * 0.8);
    c.fillStyle = `rgba(0,0,40,${alpha})`;
    c.fillRect(0, 0, CFG.W, CFG.H);

    const gt = this.stateMachine.stateTimer;
    const def = this.level.levelDef;
    const isBossLevel = def.isBoss;
    const isWorldComplete = isBossLevel;
    const nextIdx = this.currentLevelIndex + 1;
    const isGameComplete = nextIdx >= LEVEL_DEFS.length;

    c.save();
    c.textAlign = "center";
    c.textBaseline = "middle";

    // Big text
    c.font = "bold 26px monospace";
    const tGrd = c.createLinearGradient(CFG.W/2 - 120, 0, CFG.W/2 + 120, 0);
    const rainbowC = ["#ff4444","#ff8800","#ffff00","#44ff44","#4488ff","#8844ff","#ff44ff"];
    for (let i = 0; i < rainbowC.length; i++) {
      tGrd.addColorStop(i / (rainbowC.length - 1), rainbowC[i]);
    }
    c.fillStyle = tGrd;
    if (isGameComplete) {
      c.fillText("YOU  WIN!", CFG.W/2, CFG.H/2 - 40);
      c.font = "bold 16px monospace";
      c.fillStyle = "#ffcc44";
      c.fillText("ALL WORLDS COMPLETE!", CFG.W/2, CFG.H/2 - 10);
    } else if (isWorldComplete) {
      c.fillText("WORLD " + def.world + " CLEAR!", CFG.W/2, CFG.H/2 - 40);
      c.font = "bold 14px monospace";
      c.fillStyle = "#ffcc44";
      c.fillText("BOSS DEFEATED!", CFG.W/2, CFG.H/2 - 10);
    } else {
      c.fillText("LEVEL  COMPLETE!", CFG.W/2, CFG.H/2 - 30);
    }

    // Stats
    c.font = "bold 13px monospace";
    c.fillStyle = "#ffee44";
    const totalStars = this.players.reduce((sum, p, i) => sum + (this.activePlayers[i] ? p.stars : 0), 0);
    c.fillText("Stars: " + totalStars + " / " + this.level.stars.length, CFG.W/2, CFG.H/2 + 15);

    // Level name
    c.font = "bold 10px monospace";
    c.fillStyle = "#aaaacc";
    c.fillText(def.name + " " + def.title, CFG.W/2, CFG.H/2 + 32);

    // Show save code when completing a world (boss defeated)
    if (isWorldComplete && !isGameComplete) {
      const nextWorld = def.world + 1;
      const nextCode = WORLD_CODE_BY_NUM[nextWorld];
      if (nextCode) {
        c.font = "bold 10px monospace";
        c.fillStyle = "#44ddee";
        c.fillText("SAVE CODE FOR WORLD " + nextWorld + ":", CFG.W/2, CFG.H/2 + 48);
        c.font = "bold 18px monospace";
        c.fillStyle = "#ffffff";
        c.fillText(nextCode, CFG.W/2, CFG.H/2 + 66);
        c.font = "8px monospace";
        c.fillStyle = "rgba(255,255,255,0.4)";
        c.fillText("WRITE THIS DOWN!", CFG.W/2, CFG.H/2 + 80);
      }
    }

    // Next level prompt
    if (gt > 2.5 && Math.sin(gt * 4) > 0) {
      c.font = "bold 11px monospace";
      c.fillStyle = "#aaaaff";
      const promptY = isWorldComplete && !isGameComplete ? CFG.H/2 + 96 : CFG.H/2 + 55;
      if (isGameComplete) {
        c.fillText("PRESS  ENTER  FOR  TITLE", CFG.W/2, promptY);
      } else if (isWorldComplete) {
        const secsLeft = Math.max(0, Math.ceil(5.0 - gt));
        const nextDef = LEVEL_DEFS[nextIdx];
        c.fillText("CONTINUING TO " + nextDef.name + " IN " + secsLeft + "...", CFG.W/2, promptY);
      } else {
        const nextDef = LEVEL_DEFS[nextIdx];
        c.fillText("PRESS ENTER FOR " + nextDef.name + " " + nextDef.title, CFG.W/2, promptY);
      }
    }

    c.restore();

    // Continuous sparkle effect
    if (Math.random() < 0.3) {
      this.particles.sparkleBurst(
        Math.random() * CFG.W + this.camera.scrollX,
        Math.random() * CFG.H + this.camera.scrollY,
        2
      );
    }
  }
  start() {
    requestAnimationFrame(t => this.run(t));
  }
}

// ============================================================
//  INITIALIZATION
// ============================================================

const game = new Game();
game.start();

</script>
