// --- Seeded RNG ---
class SeededRNG {
  constructor(seed) { this.s = seed; }
  next() {
    this.s = (this.s * 16807 + 0) % 2147483647;
    return (this.s - 1) / 2147483646;
  }
  nextInt(min, max) { return min + Math.floor(this.next() * (max - min + 1)); }
  nextFloat(min, max) { return min + this.next() * (max - min); }
}

// --- Global Keyboard State (shared between both input managers) ---
const KEYBOARD = {};
let _globalLastLetter = "";

window.addEventListener("keydown", e => {
  e.preventDefault();
  KEYBOARD[e.code] = true;
  if (e.code.startsWith("Key") && e.code.length === 4) {
    _globalLastLetter = e.code[3];
  }
  if (e.code === "Backspace") _globalLastLetter = "BACKSPACE";
  if (e.code === "Escape") _globalLastLetter = "ESCAPE";
});
window.addEventListener("keyup", e => {
  e.preventDefault();
  KEYBOARD[e.code] = false;
});

// --- Input Manager (supports P1 and P2 via playerSlot) ---
class InputManager {
  constructor(playerSlot) {
    this.playerSlot = playerSlot || 1;
    this._gpKeys = {};
    this._combined = {};
    this.justPressed = {};
    this._prev = {};
    this.lastLetter = "";
    this.anyGamepadPressed = false;
    // Konami Code state (P1 only)
    this._konamiSeq = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","KeyB","KeyA","Enter"];
    this._konamiIndex = 0;
    this._konamiDone = false;
    this.konamiJustCompleted = false;
  }
  // Map raw keyboard keys to normalized internal keys based on player slot
  _getKeys() {
    const keys = {};
    if (this.playerSlot === 1) {
      // P1: Arrow keys, Space, ShiftLeft (shoot), KeyP/ShiftRight (poop), Enter, KeyC
      if (KEYBOARD["ArrowLeft"])  keys["ArrowLeft"] = true;
      if (KEYBOARD["ArrowRight"]) keys["ArrowRight"] = true;
      if (KEYBOARD["ArrowUp"])    keys["ArrowUp"] = true;
      if (KEYBOARD["ArrowDown"])  keys["ArrowDown"] = true;
      if (KEYBOARD["Space"])      keys["Space"] = true;
      if (KEYBOARD["ShiftLeft"])  keys["ShiftLeft"] = true;
      if (KEYBOARD["KeyP"])       keys["KeyP"] = true;
      if (KEYBOARD["ShiftRight"]) keys["ShiftRight"] = true;
      if (KEYBOARD["Enter"])      keys["Enter"] = true;
      if (KEYBOARD["KeyC"])       keys["KeyC"] = true;
      // Konami code letters
      if (KEYBOARD["KeyA"]) keys["KeyA"] = true;
      if (KEYBOARD["KeyB"]) keys["KeyB"] = true;
    } else if (this.playerSlot === 2) {
      // P2: WASD, Q (jump), F (shoot), X (poop), E (confirm)
      if (KEYBOARD["KeyA"]) keys["ArrowLeft"] = true;
      if (KEYBOARD["KeyD"]) keys["ArrowRight"] = true;
      if (KEYBOARD["KeyW"]) keys["ArrowUp"] = true;
      if (KEYBOARD["KeyS"]) keys["ArrowDown"] = true;
      if (KEYBOARD["KeyQ"]) keys["Space"] = true;
      if (KEYBOARD["KeyF"]) keys["ShiftLeft"] = true;
      if (KEYBOARD["KeyX"]) keys["KeyP"] = true;
      if (KEYBOARD["KeyE"]) keys["Enter"] = true;
    }
    // P3 and P4: gamepad only, no keyboard keys
    return keys;
  }
  pollGamepad() {
    this._gpKeys = {};
    this.anyGamepadPressed = false;
    // P1 uses gamepad index 0, P2 uses index 1
    const gpIdx = this.playerSlot - 1;
    const gamepads = navigator.getGamepads();
    if (!gamepads) return;
    const gp = gamepads[gpIdx];
    if (!gp) return;
    const ax0 = gp.axes[0] || 0;
    const ax1 = gp.axes[1] || 0;
    if (ax0 < -0.5) this._gpKeys["ArrowLeft"]  = true;
    if (ax0 > 0.5)  this._gpKeys["ArrowRight"] = true;
    if (ax1 < -0.5) this._gpKeys["ArrowUp"]    = true;
    if (ax1 > 0.5)  this._gpKeys["ArrowDown"]  = true;
    if (gp.buttons.length > 15) {
      if (gp.buttons[12].pressed) this._gpKeys["ArrowUp"]    = true;
      if (gp.buttons[13].pressed) this._gpKeys["ArrowDown"]  = true;
      if (gp.buttons[14].pressed) this._gpKeys["ArrowLeft"]  = true;
      if (gp.buttons[15].pressed) this._gpKeys["ArrowRight"] = true;
    }
    const aBtn = gp.mapping === "standard" ? 0 : 1;
    const bBtn = gp.mapping === "standard" ? 1 : 0;
    const aBtnPressed = gp.buttons[aBtn] && gp.buttons[aBtn].pressed;
    const bBtnPressed = gp.buttons[bBtn] && gp.buttons[bBtn].pressed;
    if (aBtnPressed) this._gpKeys["Space"] = true;
    if (this._gpKeys["ArrowDown"] && bBtnPressed) {
      this._gpKeys["KeyP"] = true;
    } else if (bBtnPressed) {
      this._gpKeys["ShiftLeft"] = true;
    }
    if (aBtnPressed) this._gpKeys["_gpA"] = true;
    if (bBtnPressed) this._gpKeys["_gpB"] = true;
    if (gp.buttons[8] && gp.buttons[8].pressed) this._gpKeys["KeyC"] = true;
    if (gp.buttons[9] && gp.buttons[9].pressed) this._gpKeys["Enter"] = true;
    for (let i = 0; i < gp.buttons.length; i++) {
      if (gp.buttons[i].pressed) { this.anyGamepadPressed = true; break; }
    }
  }
  update() {
    this.pollGamepad();
    this.konamiJustCompleted = false;
    const kbKeys = this._getKeys();
    const combined = {};
    for (const k in kbKeys) if (kbKeys[k]) combined[k] = true;
    for (const k in this._gpKeys) if (this._gpKeys[k]) combined[k] = true;
    for (const k in combined) {
      this.justPressed[k] = combined[k] && !this._prev[k];
    }
    for (const k in this._prev) {
      if (!combined[k]) this.justPressed[k] = false;
    }
    // Konami code detection (P1 only)
    if (this.playerSlot === 1 && !this._konamiDone) {
      const expected = this._konamiSeq[this._konamiIndex];
      const konamiMatch = (k, exp) => {
        if (k === exp) return true;
        if (exp === "KeyA" && k === "_gpA") return true;
        if (exp === "KeyB" && k === "_gpB") return true;
        return false;
      };
      for (const k in this.justPressed) {
        if (!this.justPressed[k]) continue;
        if (konamiMatch(k, expected)) {
          this._konamiIndex++;
          if (this._konamiIndex >= this._konamiSeq.length) {
            this._konamiDone = true;
            this.konamiJustCompleted = true;
          }
          break;
        }
        if (this._konamiSeq.indexOf(k) !== -1) {
          this._konamiIndex = (k === this._konamiSeq[0]) ? 1 : 0;
        }
      }
    }
    this._combined = combined;
    this._prev = Object.assign({}, combined);
  }
  consumeLetter() {
    if (this.playerSlot !== 1) return "";
    const l = _globalLastLetter;
    _globalLastLetter = "";
    return l;
  }
  held(code) { return !!this._combined[code]; }
  pressed(code) { return !!this.justPressed[code]; }
  get left() { return this.held("ArrowLeft"); }
  get right() { return this.held("ArrowRight"); }
  get up() { return this.held("ArrowUp"); }       // belt-scroll: depth movement (walk away from camera)
  get down() { return this.held("ArrowDown"); }    // belt-scroll: depth movement (walk toward camera)
  get jump() { return this.pressed("Space"); }     // belt-scroll: jump is ONLY Space/Q/gamepad A
  get jumpHeld() { return this.held("Space"); }    // belt-scroll: jump held
  get enter() { return this.pressed("Enter") || this.pressed("Space"); }
  get poop() { return this.held("KeyP") || this.held("ShiftRight"); }
  get shoot() { return this.pressed("ShiftLeft"); }
}

// --- Audio Manager (WebAudio API) ---
class AudioManager {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.sfxGain = null;
    this.musicGain = null;
    this.initialized = false;
    this.buffers = {};       // name → AudioBuffer cache
    this._currentMusic = null; // { source, gain, name }
    this._musicFading = null;  // outgoing track during crossfade
    this._preloaded = false;
    this._countdownSource = null; // active countdown sound node
  }
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === "suspended") this.ctx.resume();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.4;
      this.masterGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.6;
      this.sfxGain.connect(this.masterGain);
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.35;
      this.musicGain.connect(this.masterGain);
      this.initialized = true;
      console.log("[Audio] AudioContext initialized, state:", this.ctx.state);
      this.preloadAll();
      // Debug helper: type audioDebug() in console to see buffer status
      window.audioDebug = () => {
        const loaded = Object.keys(this.buffers);
        const sfxKeys = Object.keys(SFX_MAP);
        const missing = sfxKeys.filter(k => !this.buffers[SFX_MAP[k].file]);
        console.log("Loaded buffers:", loaded.length, loaded);
        console.log("SFX_MAP keys missing buffers:", missing.length, missing);
        console.log("Current music:", this._currentMusic ? this._currentMusic.name : "none");
        console.log("Pending music:", this._pendingMusic || "none");
        console.log("AudioContext state:", this.ctx.state);
      };
    } catch(e) { console.warn("WebAudio unavailable:", e); }
  }
  preloadAll() {
    if (this._preloaded) return;
    this._preloaded = true;
    // Build WAV list from SFX_MAP + extras not in map
    const sfxFiles = Object.values(SFX_MAP).map(s => s.file + ".wav");
    const extraWavs = ["title_screen.wav"];
    const musicFiles = [
      "game_complete.mp3","music_boss.mp3","music_boss_alt.mp3",
      "music_world1.mp3","music_world2.mp3","music_world2_alt.mp3",
      "music_world3.mp3","music_world4.mp3","music_world5.mp3",
      "music_world6.mp3","music_world6_alt.mp3",
      "music_world7.mp3","music_world8.mp3","music_world8_alt.mp3"
    ];
    const files = [...new Set(sfxFiles)].concat(extraWavs, musicFiles);
    this._loadTotal = files.length;
    this._loadCount = 0;
    this._loadFailed = [];
    for (const f of files) {
      const name = f.replace(/\.(wav|mp3)$/, "");
      const url = "sounds/" + encodeURIComponent(f);
      fetch(url).then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status + " for " + f);
        return r.arrayBuffer();
      }).then(buf => {
        return this.ctx.decodeAudioData(buf);
      }).then(decoded => {
        this.buffers[name] = decoded;
        this._loadCount++;
        if (this._loadCount === this._loadTotal) console.log("[Audio] All " + this._loadTotal + " files loaded OK");
      }).catch(e => {
        this._loadFailed.push(f);
        this._loadCount++;
        console.warn("[Audio] FAILED to load:", f, e.message || e);
        if (this._loadCount === this._loadTotal) {
          console.log("[Audio] Loading done. " + this._loadFailed.length + " failed:", this._loadFailed);
        }
      });
    }
  }
  playSample(name, vol) {
    if (!this.initialized || !this.buffers[name]) return;
    if (this.ctx.state === "suspended") this.ctx.resume();
    const src = this.ctx.createBufferSource();
    src.buffer = this.buffers[name];
    const gain = this.ctx.createGain();
    gain.gain.value = vol !== undefined ? vol : 1.0;
    src.connect(gain);
    gain.connect(this.sfxGain);
    src.start(0);
  }
  _sfx(key) {
    const s = SFX_MAP[key];
    if (s && this.buffers[s.file]) { this.playSample(s.file, s.vol); return true; }
    if (s && !this.buffers[s.file]) console.warn("[Audio] _sfx(" + key + ") — buffer '" + s.file + "' NOT loaded");
    return false;
  }
  _sfxRandom(prefix, count) {
    // Pick randomly from loaded variants only
    const available = [];
    for (let i = 1; i <= count; i++) {
      const s = SFX_MAP[prefix + i];
      if (s && this.buffers[s.file]) available.push(s);
    }
    if (available.length === 0) return false;
    const pick = available[Math.floor(Math.random() * available.length)];
    this.playSample(pick.file, pick.vol);
    return true;
  }
  playMusic(name, loop) {
    if (!this.initialized) { console.warn("[Audio] playMusic(" + name + ") — not initialized"); return; }
    // No-op if same track already playing
    if (this._currentMusic && this._currentMusic.name === name) return;
    // If buffer not loaded yet, defer
    if (!this.buffers[name]) {
      console.log("[Audio] playMusic(" + name + ") — buffer not loaded yet, deferring");
      this._pendingMusic = { name: name, loop: !!loop };
      return;
    }
    console.log("[Audio] playMusic(" + name + ") — PLAYING, ctx.state=" + this.ctx.state);
    if (this.ctx.state === "suspended") this.ctx.resume();
    // Crossfade out old track
    if (this._currentMusic) {
      const old = this._currentMusic;
      old.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
      setTimeout(() => { try { old.source.stop(); } catch(e){} }, 600);
      this._currentMusic = null;
    }
    // Start new track
    const src = this.ctx.createBufferSource();
    src.buffer = this.buffers[name];
    src.loop = !!loop;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(1.0, this.ctx.currentTime + 0.5);
    src.connect(gain);
    gain.connect(this.musicGain);
    src.start(0);
    this._currentMusic = { source: src, gain: gain, name: name };
    this._pendingMusic = null;
  }
  stopMusic(fadeTime) {
    if (!this._currentMusic) { console.log("[Audio] stopMusic — nothing playing"); return; }
    console.log("[Audio] stopMusic(" + this._currentMusic.name + ") fade=" + (fadeTime||0.5) + "s");
    const fade = fadeTime !== undefined ? fadeTime : 0.5;
    const old = this._currentMusic;
    old.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + fade);
    setTimeout(() => { try { old.source.stop(); } catch(e){} }, (fade + 0.1) * 1000);
    this._currentMusic = null;
  }
  checkPendingMusic() {
    if (this._pendingMusic && this.buffers[this._pendingMusic.name]) {
      console.log("[Audio] Pending music now loaded: " + this._pendingMusic.name);
      this.playMusic(this._pendingMusic.name, this._pendingMusic.loop);
    }
  }
  getMusicForLevel(def) {
    if (def.isBoss) {
      // Alternate boss music for worlds 5+
      return def.world >= 5 ? "music_boss_alt" : "music_boss";
    }
    switch (def.world) {
      case 1: return "music_world1";
      case 2: return def.level >= 3 ? "music_world2_alt" : "music_world2";
      case 3: return "music_world3";
      case 4: return "music_world4";
      case 5: return "music_world5";
      case 6: return def.level >= 3 ? "music_world6_alt" : "music_world6";
      case 7: return "music_world7";
      case 8: return def.level >= 3 ? "music_world8_alt" : "music_world8";
      default: return "music_world1";
    }
  }
  // Play an oscillator-based SFX (fallback / subtle sounds)
  playSFX(type, freq, duration, freqEnd, vol) {
    if (!this.initialized) return;
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || "square";
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, ctx.currentTime + duration);
    gain.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  }
  // --- SFX methods (WAV via SFX_MAP + oscillator fallback) ---
  jumpSound() { if (!this._sfx("jump")) this.playSFX("square", 300, 0.15, 600, 0.25); }
  doubleJumpSound() { if (!this._sfx("doubleJump")) this.playSFX("square", 400, 0.18, 800, 0.2); }
  collectSound() {
    if (!this._sfx("collect")) {
      this.playSFX("sine", 800, 0.08, 1200, 0.3);
      setTimeout(() => this.playSFX("sine", 1200, 0.12, 1600, 0.25), 80);
    }
  }
  loseFormSound() { if (!this._sfx("loseForm")) this.playSFX("sawtooth", 300, 0.25, 120, 0.3); }
  shrinkSound() { if (!this._sfx("shrink")) this.playSFX("sawtooth", 200, 0.3, 80, 0.3); }
  hurtSound() { if (!this._sfx("hurtGeneric")) this.playSFX("sawtooth", 200, 0.3, 80, 0.3); }
  hoopSound() {
    if (!this._sfx("hoop")) {
      this.playSFX("sine", 523, 0.12, 523, 0.3);
      setTimeout(() => this.playSFX("sine", 659, 0.12, 659, 0.3), 120);
      setTimeout(() => this.playSFX("sine", 784, 0.12, 784, 0.3), 240);
      setTimeout(() => this.playSFX("sine", 1047, 0.25, 1047, 0.35), 360);
    }
  }
  landSound() { this.playSFX("triangle", 100, 0.1, 60, 0.15); }
  menuSelect() { this.playSFX("square", 600, 0.08, 900, 0.2); }
  poopSound() { this._sfxRandom("poop", 3); }
  growBigSound() { this._sfx("growBig"); }
  extraLifeSound() { this._sfx("extraLife"); }
  deathSound() { console.log("[Audio] deathSound() called"); this._sfx("death"); }
  fallDeathSound() { console.log("[Audio] fallDeathSound() called"); this._sfx("fallDeath"); }
  flowerBloomSound() { this._sfx("flowerBloom"); }
  rainbowShotSound() { this._sfx("rainbowShot"); }
  levelCompleteSound() { this._sfx("celebrateUnicorn"); }
  playCountdown() {
    if (!this.initialized) return;
    const s = SFX_MAP.timerCountdown;
    if (!s || !this.buffers[s.file]) return;
    this.stopCountdown();
    const src = this.ctx.createBufferSource();
    src.buffer = this.buffers[s.file];
    const gain = this.ctx.createGain();
    gain.gain.value = s.vol;
    src.connect(gain);
    gain.connect(this.sfxGain);
    src.start(0, 0, 20); // play first 20s of 24s file
    this._countdownSource = src;
  }
  stopCountdown() {
    if (this._countdownSource) {
      try { this._countdownSource.stop(); } catch(e) {}
      this._countdownSource = null;
    }
  }
  celebrateSound(player) {
    if (player.isMermaid) { this._sfx("celebrateMermaid"); }
    else if (player.isKittycorn) { this._sfx("celebrateKittycorn"); }
    else if (player.isPiggicorn) { this._sfx("celebratePixicorn"); }
    else if (player.isMouseicorn) {
      // Triple squeak! Play 3 back-to-back
      this._sfx("celebrateMouseicorn");
      setTimeout(() => this._sfx("celebrateMouseicorn"), 300);
      setTimeout(() => this._sfx("celebrateMouseicorn"), 600);
    }
    else { this.levelCompleteSound(); }
  }
  fireBossSound() {
    if (!this._sfx("fireBoss")) this.playSFX("sawtooth", 150, 0.2, 80, 0.2);
  }
  dragonBossSound() {
    const s = SFX_MAP.dragonBoss;
    if (!this.initialized || !s || !this.buffers[s.file]) return;
    const src = this.ctx.createBufferSource();
    src.buffer = this.buffers[s.file];
    const gain = this.ctx.createGain();
    gain.gain.value = s.vol;
    src.connect(gain);
    gain.connect(this.sfxGain);
    src.start(0, 0, 3); // play first 3 seconds
  }
  bossIntroSound(bossType) {
    if (bossType === "pharaoh_cat") this._sfx("catPharaohRoar");
    else if (bossType === "storm_dragon") this.dragonBossSound();
    else if (bossType === "gnome") this._sfx("angryBoss");
  }
  // --- Per-form poop sounds (synthesized) ---
  mermaidPoopSound() {
    if (!this.initialized) return;
    // Bubbly underwater — 4 staggered sine pops
    for (let i = 0; i < 4; i++) {
      setTimeout(() => {
        this.playSFX("sine", 400 + Math.random() * 200, 0.08, 200 + Math.random() * 100, 0.2);
      }, i * 60);
    }
  }
  kittycornPoopSound() {
    if (!this.initialized) return;
    // Cute squeaky — 3 high triangle chirps
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        this.playSFX("triangle", 1200 + i * 200, 0.06, 1800 + i * 200, 0.2);
      }, i * 70);
    }
  }
  pixicornPoopSound() {
    if (!this.initialized) return;
    // Sparkly arpeggio — 5 ascending sine notes
    const notes = [523, 659, 784, 988, 1175];
    for (let i = 0; i < notes.length; i++) {
      setTimeout(() => {
        this.playSFX("sine", notes[i], 0.1, notes[i] * 1.05, 0.2);
      }, i * 50);
    }
  }
  mousicornPoopSound() {
    if (!this.initialized) return;
    // Tiny squeak — 2 very high square chirps
    this.playSFX("square", 2400, 0.04, 3200, 0.15);
    setTimeout(() => this.playSFX("square", 2800, 0.05, 3600, 0.15), 60);
  }
  // Form-aware poop dispatcher (WAV variants first, synth fallback)
  formPoopSound(player) {
    if (player.isMermaid) { if (!this._sfxRandom("mermaidPoop", 3)) this.mermaidPoopSound(); }
    else if (player.isKittycorn) { if (!this._sfxRandom("kittycornPoop", 3)) this.kittycornPoopSound(); }
    else if (player.isPiggicorn) { if (!this._sfxRandom("pixicornPoop", 3)) this.pixicornPoopSound(); }
    else if (player.isMouseicorn) { if (!this._sfxRandom("mousicornPoop", 3)) this.mousicornPoopSound(); }
    else { this.poopSound(); }
  }
}

// --- Camera ---
class Camera {
  constructor() {
    this.x = 0;
    this.y = 0;
    this.targetX = 0;
    this.targetY = 0;
    this.shakeX = 0;
    this.shakeY = 0;
    this.shakeMag = 0;
    this.deadZoneX = CFG.CAM_DEAD_X;
    this.deadZoneY = CFG.CAM_DEAD_Y;
    this.maxX = 0;
    this.maxY = 0;
  }
  setBounds(levelW, levelH) {
    this.maxX = Math.max(0, levelW - CFG.W);
    this.maxY = 0; // belt-scroll: no vertical camera movement
  }
  follow(px, py, facing, dt) {
    // Target with look-ahead
    const lookAhead = facing * CFG.CAM_LOOK_AHEAD;
    const desiredX = px - CFG.W * 0.4 + lookAhead;
    const desiredY = py - CFG.H * 0.5;

    // Dead zone: only move target when player exceeds dead zone
    const dx = desiredX - this.targetX;
    const dy = desiredY - this.targetY;
    if (Math.abs(dx) > this.deadZoneX) {
      this.targetX += (dx - Math.sign(dx) * this.deadZoneX);
    }
    if (Math.abs(dy) > this.deadZoneY) {
      this.targetY += (dy - Math.sign(dy) * this.deadZoneY);
    }

    // Smooth lerp
    this.x += (this.targetX - this.x) * CFG.CAM_LERP;
    this.y += (this.targetY - this.y) * CFG.CAM_LERP;

    // Clamp
    this.x = Math.max(0, Math.min(this.x, this.maxX));
    this.y = Math.max(0, Math.min(this.y, this.maxY));

    // Shake
    if (this.shakeMag > 0.5) {
      this.shakeX = (Math.random() - 0.5) * this.shakeMag;
      this.shakeY = (Math.random() - 0.5) * this.shakeMag;
      this.shakeMag *= CFG.SHAKE_DECAY;
    } else {
      this.shakeX = 0;
      this.shakeY = 0;
      this.shakeMag = 0;
    }
  }
  // Co-op camera: follow midpoint of two players (legacy, kept for compat)
  followDuo(p1x, p1y, p1alive, p2x, p2y, p2alive, dt) {
    this.followGroup([
      { cx: p1x, cy: p1y, alive: p1alive },
      { cx: p2x, cy: p2y, alive: p2alive }
    ], dt);
  }
  // N-player camera: follow X centroid only (belt-scroll: no vertical tracking)
  followGroup(players, dt) {
    const alive = players.filter(p => p.alive);
    let tx;
    if (alive.length > 0) {
      tx = alive.reduce((s, p) => s + p.cx, 0) / alive.length;
    } else {
      tx = players.reduce((s, p) => s + p.cx, 0) / players.length;
    }

    const desiredX = tx - CFG.W * 0.5;
    const dx = desiredX - this.targetX;
    if (Math.abs(dx) > this.deadZoneX) {
      this.targetX += (dx - Math.sign(dx) * this.deadZoneX);
    }

    this.x += (this.targetX - this.x) * CFG.CAM_LERP;
    this.y = 0; // belt-scroll: camera.y always 0

    this.x = Math.max(0, Math.min(this.x, this.maxX));

    if (this.shakeMag > 0.5) {
      this.shakeX = (Math.random() - 0.5) * this.shakeMag;
      this.shakeY = (Math.random() - 0.5) * this.shakeMag;
      this.shakeMag *= CFG.SHAKE_DECAY;
    } else {
      this.shakeX = 0; this.shakeY = 0; this.shakeMag = 0;
    }
  }
  shake(magnitude) {
    this.shakeMag = Math.max(this.shakeMag, magnitude);
  }
  get scrollX() { return Math.round(this.x + this.shakeX); }
  get scrollY() { return Math.round(this.y + this.shakeY); }
}

// --- Particle System ---
const PARTICLE_DUST    = 0;
const PARTICLE_SPARKLE = 1;
const PARTICLE_TEXT    = 2;
const PARTICLE_BURST   = 3;

class Particle {
  constructor() { this.alive = false; }
}

class ParticleSystem {
  constructor(maxParticles) {
    this.pool = [];
    for (let i = 0; i < maxParticles; i++) this.pool.push(new Particle());
  }
  emit(type, x, y, opts) {
    const p = this.pool.find(p => !p.alive);
    if (!p) return;
    p.alive = true;
    p.type = type;
    p.x = x; p.y = y;
    p.vx = opts.vx || 0;
    p.vy = opts.vy || 0;
    p.life = opts.life || 0.5;
    p.maxLife = p.life;
    p.size = opts.size || 3;
    p.color = opts.color || "#fff";
    p.text = opts.text || "";
    p.gravity = opts.gravity || 0;
    p.friction = opts.friction || 1;
    p.shrink = opts.shrink !== undefined ? opts.shrink : true;
    p.alpha = 1;
    return p;
  }
  // Emit a preset burst
  dustBurst(x, y, count) {
    for (let i = 0; i < count; i++) {
      this.emit(PARTICLE_DUST, x + (Math.random()-0.5)*10, y, {
        vx: (Math.random()-0.5) * 2,
        vy: -Math.random() * 2 - 0.5,
        life: 0.3 + Math.random() * 0.2,
        size: 2 + Math.random() * 2,
        color: "#c8b090",
        gravity: 0.05,
        friction: 0.97,
      });
    }
  }
  sparkleBurst(x, y, count) {
    const colors = ["#ffff44","#ffaa00","#ffffff","#ff88ff","#88ffff"];
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = Math.random() * 3 + 1;
      this.emit(PARTICLE_SPARKLE, x, y, {
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 0.4 + Math.random() * 0.3,
        size: 2 + Math.random() * 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        gravity: -0.02,
        friction: 0.96,
      });
    }
  }
  impactBurst(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = Math.random() * 4 + 1;
      this.emit(PARTICLE_BURST, x, y, {
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 0.2 + Math.random() * 0.2,
        size: 2 + Math.random() * 3,
        color: color || "#ff4444",
        gravity: 0.1,
        friction: 0.94,
      });
    }
  }
  floatingText(x, y, text, color) {
    this.emit(PARTICLE_TEXT, x, y, {
      vx: 0, vy: -1.5,
      life: 0.8,
      color: color || "#ffff44",
      text: text,
      gravity: 0,
      friction: 0.98,
    });
  }
  update(dt) {
    for (const p of this.pool) {
      if (!p.alive) continue;
      p.life -= dt;
      if (p.life <= 0) { p.alive = false; continue; }
      p.vy += p.gravity;
      p.vx *= p.friction;
      p.vy *= p.friction;
      p.x += p.vx;
      p.y += p.vy;
      p.alpha = Math.min(1, p.life / (p.maxLife * 0.3));
      if (p.shrink) p.size *= 0.995;
    }
  }
  draw(ctx, camX, camY) {
    for (const p of this.pool) {
      if (!p.alive) continue;
      const sx = p.x - camX;
      const sy = p.y - camY;
      if (sx < -20 || sx > CFG.W+20 || sy < -20 || sy > CFG.H+20) continue;

      ctx.globalAlpha = p.alpha;
      if (p.type === PARTICLE_TEXT) {
        ctx.font = "bold 10px monospace";
        ctx.fillStyle = p.color;
        ctx.textAlign = "center";
        ctx.fillText(p.text, sx, sy);
      } else if (p.type === PARTICLE_SPARKLE) {
        // Diamond shape
        ctx.fillStyle = p.color;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(Math.PI/4);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
      } else {
        // Dust or burst - circle
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(sx, sy, p.size, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
//  SECTION 3: ENTITIES
// ============================================================

// --- Base Entity ---
class Entity {
  constructor(x, y, w, h) {
    this.x = x;
    this.w = w; this.h = h;
    this.vx = 0;
    this.alive = true;
    // Belt-scroll: y is legacy alias for screenY; real position is floorY + z
    this.floorY = y !== undefined ? (y + h) : CFG.FLOOR_Y_MAX; // depth on floor plane (feet)
    this.z = 0;       // height above floor (0 = on floor)
    this.vz = 0;      // vertical velocity (jump/fall on Z axis)
    this.vFloorY = 0; // depth velocity
    // Legacy vy kept for compatibility during transition but unused in belt-scroll
    this.vy = 0;
  }
  // Screen Y = where to draw (floorY minus height above floor, minus entity height)
  get screenY() { return this.floorY - this.z - this.h; }
  // Sort Y = depth for Y-sort draw order (entities closer to camera draw on top)
  get sortY() { return this.floorY; }
  // Legacy getters (now computed from belt-scroll coords)
  get y() { return this.screenY; }
  set y(v) { /* legacy set: interpret as setting floorY from old-style y + h */ this.floorY = v + this.h + this.z; }
  get cx() { return this.x + this.w/2; }
  get cy() { return this.screenY + this.h/2; }
  get left() { return this.x; }
  get right() { return this.x + this.w; }
  get top() { return this.screenY; }
  get bottom() { return this.screenY + this.h; }
  // Belt-scroll collision: X overlap + depth proximity + Z overlap
  overlaps(other) {
    // X overlap
    if (this.right <= other.left || this.left >= other.right) return false;
    // Depth proximity (floorY)
    if (Math.abs(this.floorY - other.floorY) > CFG.DEPTH_OVERLAP) return false;
    // Z overlap (screen space vertical)
    const thisTop = this.floorY - this.z - this.h;
    const thisBot = this.floorY - this.z;
    const otherTop = other.floorY - other.z - other.h;
    const otherBot = other.floorY - other.z;
    return thisBot > otherTop && thisTop < otherBot;
  }
  overlapsPad(other, px, py) {
    if (this.right - px <= other.left || this.left + px >= other.right) return false;
    if (Math.abs(this.floorY - other.floorY) > CFG.DEPTH_OVERLAP + Math.abs(py)) return false;
    const thisTop = this.floorY - this.z - this.h;
    const thisBot = this.floorY - this.z;
    const otherTop = other.floorY - other.z - other.h;
    const otherBot = other.floorY - other.z;
    return thisBot - py > otherTop && thisTop + py < otherBot;
  }
  // Is this entity on the floor?
  get onFloor() { return this.z <= 0; }
}

// --- Player ---
class Player extends Entity {
  constructor(x, y, playerSlot) {
    super(x, y, CFG.PLAYER_W, CFG.PLAYER_H);
    this.playerSlot = playerSlot || 1;
    this.characterId = "unicorn";
    this.characterDef = CHARACTER_DEFS.unicorn;
    this.facing = 1;
    this.onGround = true;      // belt-scroll: z <= 0
    this.wasOnGround = true;
    this.canDoubleJump = true;
    this.canTripleJump = true;
    this.hasWings = true;
    this.growWingsTimer = 0;
    this.coyoteTimer = 0;
    this.jumpBufferTimer = 0;
    this.speedX = 0;
    this.speedFloorY = 0;      // belt-scroll: smoothed depth speed
    this.animState = "idle";
    this.animFrame = 0;
    this.animTimer = 0;
    this.invTimer = 0;
    this.hp = CFG.PLAYER_MAX_HP;
    this.maxHp = CFG.PLAYER_MAX_HP;
    this.stars = 0;
    this.lives = CFG.LIVES;
    this._deathHandled = false;
    this.respawnTimer = 0;
    this.landImpact = 0;
    this.squash = 0;
    this.runDust = 0;
    this.poopTimer = 0;
    this.poopCooldown = 0;
    this.isStandPooping = false;
    this.jumpType = "first";
    this.flowersRevived = 0;
    this.flowersForRainbow = 0;
    this.isBig = false;
    this.hasRainbow = false;
    this.shootCooldown = 0;
    this.isMermaid = false;
    this.mermaidTransformTimer = 0;
    this.isKittycorn = false;
    this.kittycornTransformTimer = 0;
    this.isPiggicorn = false;
    this.piggicornTransformTimer = 0;
    this.isMouseicorn = false;
    this.mousicornTransformTimer = 0;
    this.growBigTimer = 0;
    this.shrinkTimer = 0;
    this.loseFormTimer = 0;
    this.isUnderwater = false;
    this._deathType = null;
  }
  setCharacter(charId) {
    const def = CHARACTER_DEFS[charId];
    if (!def) return;
    this.characterId = charId;
    this.characterDef = def;
    // Apply base form flags
    this.isKittycorn = !!def.startForm.isKittycorn;
    this.isPiggicorn = !!def.startForm.isPiggicorn;
    this.isMouseicorn = !!def.startForm.isMouseicorn;
  }
  collectWings(audio, particles) {
    this.hasWings = true;
    this.canTripleJump = true;
    this.growWingsTimer = CFG.GROW_WINGS_DURATION;
    this.animState = "growWings";
    this.animFrame = 0;
    this.animTimer = 0;
    audio.collectSound();
    particles.sparkleBurst(this.cx, this.cy, 15);
    particles.floatingText(this.cx, this.cy - 20, "WINGS!", "#cc88ff");
  }
  collectMermaid(particles, audio) {
    this.isMermaid = true;
    this.mermaidTransformTimer = CFG.MERMAID_TRANSFORM_DURATION;
    this.animState = "mermaidTransform";
    this.animFrame = 0;
    this.animTimer = 0;
    audio.collectSound();
    particles.sparkleBurst(this.cx, this.cy, 20);
    particles.floatingText(this.cx, this.cy - 20, "MERMICORN!", "#ff44aa");
    // Rainbow sparkle burst
    const rc = ["#ff0044","#ff8800","#ffdd00","#00dd44","#0088ff","#8844ff"];
    for (let i = 0; i < 12; i++) {
      particles.emit(0, this.cx, this.cy, {
        vx: (Math.random()-0.5) * 3, vy: (Math.random()-0.5) * 3,
        life: 0.6, size: 3, color: rc[i % rc.length], gravity: -0.02, friction: 0.95
      });
    }
  }
  collectKittycorn(particles, audio) {
    this.isPiggicorn = false;
    this.isMouseicorn = false;
    this.isKittycorn = true;
    this.kittycornTransformTimer = CFG.KITTYCORN_TRANSFORM_DURATION;
    this.animState = "kittycornTransform";
    this.animFrame = 0;
    this.animTimer = 0;
    audio.collectSound();
    particles.sparkleBurst(this.cx, this.cy, 20);
    particles.floatingText(this.cx, this.cy - 20, "KITTYCORN!", "#ff88cc");
    const rc = ["#ff88cc","#ffaadd","#ff44aa","#cc66ff","#ff66bb","#ffccee"];
    for (let i = 0; i < 12; i++) {
      particles.emit(0, this.cx, this.cy, {
        vx: (Math.random()-0.5) * 3, vy: (Math.random()-0.5) * 3,
        life: 0.6, size: 3, color: rc[i % rc.length], gravity: -0.02, friction: 0.95
      });
    }
  }
  collectPiggicorn(particles, audio) {
    this.isKittycorn = false;
    this.isMouseicorn = false;
    this.isPiggicorn = true;
    this.piggicornTransformTimer = CFG.PIXICORN_TRANSFORM_DURATION;
    this.animState = "piggicornTransform";
    this.animFrame = 0;
    this.animTimer = 0;
    audio.collectSound();
    particles.sparkleBurst(this.cx, this.cy, 20);
    particles.floatingText(this.cx, this.cy - 20, "PIGGICORN!", "#ffaa88");
    const rc = ["#ffaa88","#ff9977","#ffbb99","#ff8866","#ffccaa","#ee8855"];
    for (let i = 0; i < 12; i++) {
      particles.emit(0, this.cx, this.cy, {
        vx: (Math.random()-0.5) * 3, vy: (Math.random()-0.5) * 3,
        life: 0.6, size: 3, color: rc[i % rc.length], gravity: -0.02, friction: 0.95
      });
    }
  }
  collectMouseicorn(particles, audio) {
    this.isKittycorn = false;
    this.isPiggicorn = false;
    this.isMouseicorn = true;
    this.mousicornTransformTimer = CFG.MOUSICORN_TRANSFORM_DURATION;
    this.animState = "mousicornTransform";
    this.animFrame = 0;
    this.animTimer = 0;
    audio.collectSound();
    particles.sparkleBurst(this.cx, this.cy, 20);
    particles.floatingText(this.cx, this.cy - 20, "MOUSICORN!", "#aa8866");
    const rc = ["#aa8866","#cc9977","#886644","#bbaa88","#997755","#ddbb99"];
    for (let i = 0; i < 12; i++) {
      particles.emit(0, this.cx, this.cy, {
        vx: (Math.random()-0.5) * 3, vy: (Math.random()-0.5) * 3,
        life: 0.6, size: 3, color: rc[i % rc.length], gravity: -0.02, friction: 0.95
      });
    }
  }
  update(dt, level, input, audio, particles, camera) {
    const prevVZ = this.vz;
    this.wasOnGround = this.onGround;

    // Grow wings transformation (freezes player briefly)
    if (this.growWingsTimer > 0) {
      this.growWingsTimer -= dt;
      this.animTimer += dt;
      const frameDur = CFG.GROW_WINGS_DURATION / CFG.SPRITE_GROW_WINGS_FRAMES;
      this.animFrame = Math.min(CFG.SPRITE_GROW_WINGS_FRAMES - 1,
        Math.floor(this.animTimer / frameDur));
      if (this.growWingsTimer <= 0) {
        this.animState = "idle";
        this.animFrame = 0;
        this.animTimer = 0;
      }
      return;
    }

    // Mermaid transformation (freezes player briefly)
    if (this.mermaidTransformTimer > 0) {
      this.mermaidTransformTimer -= dt;
      this.animTimer += dt;
      if (this.mermaidTransformTimer <= 0) { this.animState = "idle"; this.animFrame = 0; this.animTimer = 0; }
      return;
    }

    // Kittycorn transformation
    if (this.kittycornTransformTimer > 0) {
      this.kittycornTransformTimer -= dt;
      this.animTimer += dt;
      if (this.kittycornTransformTimer <= 0) { this.animState = "idle"; this.animFrame = 0; this.animTimer = 0; }
      return;
    }

    // Piggicorn transformation
    if (this.piggicornTransformTimer > 0) {
      this.piggicornTransformTimer -= dt;
      this.animTimer += dt;
      if (this.piggicornTransformTimer <= 0) { this.animState = "idle"; this.animFrame = 0; this.animTimer = 0; }
      return;
    }

    // Mousicorn transformation
    if (this.mousicornTransformTimer > 0) {
      this.mousicornTransformTimer -= dt;
      this.animTimer += dt;
      if (this.mousicornTransformTimer <= 0) { this.animState = "idle"; this.animFrame = 0; this.animTimer = 0; }
      return;
    }

    // Grow big freeze
    if (this.growBigTimer > 0) {
      this.growBigTimer -= dt;
      if (this.growBigTimer <= 0) { this.animState = "idle"; this.animFrame = 0; this.animTimer = 0; }
      return;
    }

    // Shrink freeze
    if (this.shrinkTimer > 0) {
      this.shrinkTimer -= dt;
      if (this.shrinkTimer <= 0) { this.animState = "idle"; this.animFrame = 0; this.animTimer = 0; }
      return;
    }

    // Lose form freeze
    if (this.loseFormTimer > 0) {
      this.loseFormTimer -= dt;
      if (this.loseFormTimer <= 0) { this.animState = "idle"; this.animFrame = 0; this.animTimer = 0; }
      return;
    }

    // Dynamic hitbox
    const isKittySmall = this.isKittycorn;
    const isSmall = !this.isBig && !this.isMermaid && !this.isKittycorn && !this.isPiggicorn && !this.isMouseicorn;
    const sizeMult = isKittySmall ? 0.5 : (isSmall ? 0.75 : 1.0);
    this.w = Math.floor(CFG.PLAYER_W * sizeMult);
    this.h = Math.floor(CFG.PLAYER_H * sizeMult);

    // Speed modifiers
    const underwater = this.isUnderwater;
    const maxSpeed = underwater
      ? (this.isMermaid ? CFG.MERMAID_SPEED : CFG.UNDERWATER_SPEED)
      : (this.isMouseicorn ? CFG.MOUSICORN_SPEED : (this.isKittycorn ? CFG.PLAYER_SPEED * 1.1 : CFG.PLAYER_SPEED));
    const accel = underwater ? (this.isMermaid ? CFG.MERMAID_ACCEL : CFG.UNDERWATER_ACCEL) : CFG.PLAYER_ACCEL;
    const decel = underwater ? CFG.PLAYER_DECEL * 0.4 : CFG.PLAYER_DECEL;

    // === Horizontal movement (left/right) ===
    let moveDir = 0;
    if (input.left) moveDir = -1;
    if (input.right) moveDir = 1;
    if (moveDir !== 0) {
      this.speedX += moveDir * accel;
      this.speedX = Math.max(-maxSpeed, Math.min(maxSpeed, this.speedX));
      this.facing = moveDir;
    } else {
      if (this.speedX > 0) this.speedX = Math.max(0, this.speedX - decel);
      else if (this.speedX < 0) this.speedX = Math.min(0, this.speedX + decel);
    }
    this.vx = this.speedX;

    // === Depth movement (up/down on floor plane) ===
    let depthDir = 0;
    if (input.up) depthDir = -1;     // walk away from camera (decrease floorY)
    if (input.down) depthDir = 1;    // walk toward camera (increase floorY)
    if (depthDir !== 0) {
      this.speedFloorY += depthDir * CFG.DEPTH_ACCEL;
      this.speedFloorY = Math.max(-CFG.DEPTH_SPEED, Math.min(CFG.DEPTH_SPEED, this.speedFloorY));
    } else {
      if (this.speedFloorY > 0) this.speedFloorY = Math.max(0, this.speedFloorY - CFG.DEPTH_DECEL);
      else if (this.speedFloorY < 0) this.speedFloorY = Math.min(0, this.speedFloorY + CFG.DEPTH_DECEL);
    }
    this.vFloorY = this.speedFloorY;

    // === Coyote time (z-axis) ===
    if (this.onGround) {
      this.coyoteTimer = CFG.COYOTE_TIME;
      this.canDoubleJump = this.hasWings;
      this.canTripleJump = this.hasWings;
    } else {
      this.coyoteTimer -= dt;
    }

    // Jump buffer
    if (input.jump) {
      this.jumpBufferTimer = CFG.JUMP_BUFFER;
    } else {
      this.jumpBufferTimer -= dt;
    }

    // === Jump (Z axis) ===
    const jumpForce = CFG.BELT_JUMP_FORCE;
    const baseDblJump = this.isKittycorn ? CFG.DOUBLE_JUMP_FORCE * 1.3 : CFG.DOUBLE_JUMP_FORCE;

    if (this.jumpBufferTimer > 0 && this.coyoteTimer > 0) {
      this.vz = jumpForce;
      this.onGround = false;
      this.coyoteTimer = 0;
      this.jumpBufferTimer = 0;
      this.jumpType = "first";
      audio.jumpSound();
    } else if (input.jump && !this.onGround && this.canDoubleJump) {
      this.vz = baseDblJump;
      this.canDoubleJump = false;
      this.jumpType = "double";
      audio.doubleJumpSound();
      particles.sparkleBurst(this.cx, this.cy, 6);
    } else if (input.jump && !this.onGround && !this.canDoubleJump && this.canTripleJump) {
      this.vz = CFG.TRIPLE_JUMP_FORCE;
      this.canTripleJump = false;
      this.jumpType = "triple";
      audio.doubleJumpSound();
      particles.sparkleBurst(this.cx, this.cy, 10);
      particles.floatingText(this.cx, this.cy - 15, "WING BOOST!", "#cc88ff");
    }

    // Variable jump height
    if (!input.jumpHeld && this.vz < -2) {
      this.vz *= 0.4;
    }

    // === Poop ===
    if (this.poopCooldown > 0) this.poopCooldown -= dt;
    if (input.poop && this.poopCooldown <= 0 && this.poopTimer <= 0) {
      this.isStandPooping = this.onGround && Math.abs(this.speedX) < 0.3;
      this.poopTimer = this.isStandPooping ? 0.6 : 0.15;
      this.poopCooldown = 1.0;
      this.animFrame = 0;
      this.animTimer = 0;
      if (!this.isStandPooping) {
        this._spawnPoop = true;
      }
    }
    if (this.poopTimer > 0) {
      this.poopTimer -= dt;
      this.animTimer += dt;
      if (this.isStandPooping) {
        const maxFrames = this.hasWings ? CFG.SPRITE_STAND_POOP_WINGS_FRAMES : CFG.SPRITE_STAND_POOP_FRAMES;
        const frameDur = 0.6 / maxFrames;
        this.animFrame = Math.min(maxFrames - 1, Math.floor(this.animTimer / frameDur));
        if (this.poopTimer <= 0) {
          this._spawnStandPoop = true;
        }
      }
    }

    // Rainbow shoot
    if (this.shootCooldown > 0) this.shootCooldown -= dt;
    if (input.shoot && this.hasRainbow && this.shootCooldown <= 0) {
      this.shootCooldown = 0.3;
      this._spawnRainbow = true;
    }

    // === Gravity on Z axis ===
    let grav = CFG.BELT_GRAVITY;
    if (this.isKittycorn && this.vz < 0) grav *= 0.85; // floatier while rising
    this.vz += grav;
    if (this.vz > CFG.BELT_MAX_FALL) this.vz = CFG.BELT_MAX_FALL;

    // === Move and collide (belt-scroll) ===
    this.moveAndCollide(level);

    // === Landing detection ===
    if (this.onGround && !this.wasOnGround) {
      this.landImpact = Math.abs(prevVZ);
      if (this.landImpact > 2) {
        particles.dustBurst(this.cx, this.floorY, Math.min(8, Math.floor(this.landImpact)));
        audio.landSound();
        if (this.landImpact > 5) {
          camera.shake(this.landImpact * 0.8);
        }
      }
      this.squash = Math.min(0.3, this.landImpact * 0.04);
    }

    // Squash/stretch decay
    if (this.squash > 0) {
      this.squash *= 0.85;
      if (this.squash < 0.01) this.squash = 0;
    }

    // Running dust
    if (this.onGround && Math.abs(this.speedX) > 1.5) {
      this.runDust += dt;
      if (this.runDust > 0.08) {
        this.runDust = 0;
        particles.emit(PARTICLE_DUST, this.cx + (Math.random()-0.5)*6, this.floorY, {
          vx: -this.facing * 0.5, vy: -Math.random()*0.5,
          life: 0.2, size: 1.5, color: "#a08060", gravity: 0.02, friction: 0.95
        });
      }
    }

    // Invincibility timer
    if (this.invTimer > 0) this.invTimer -= dt;

    // Animation state
    this.updateAnim(dt);
  }
  moveAndCollide(level) {
    // Belt-scroll: no tile collision, just clamp to bounds

    // Horizontal
    this.x += this.vx;
    if (this.x < 0) { this.x = 0; this.speedX = 0; }
    if (this.x + this.w > level.width) { this.x = level.width - this.w; this.speedX = 0; }

    // Depth (floorY)
    this.floorY += this.vFloorY;
    if (this.floorY < CFG.FLOOR_Y_MIN) { this.floorY = CFG.FLOOR_Y_MIN; this.speedFloorY = 0; }
    if (this.floorY > CFG.FLOOR_Y_MAX) { this.floorY = CFG.FLOOR_Y_MAX; this.speedFloorY = 0; }

    // Z axis (jump/fall)
    this.z -= this.vz; // vz is negative when jumping up, z increases upward
    this.onGround = false;
    if (this.z <= 0) {
      this.z = 0;
      this.vz = 0;
      this.onGround = true;
    }
  }
  updateAnim(dt) {
    // Poop animation takes priority
    if (this.poopTimer > 0 && this.isStandPooping && this.animState !== "growWings" && this.animState !== "hoopClear") {
      this.animState = "standPoop";
      return;
    }
    if (this.z > 0) {
      this.animState = this.vz < 0 ? "jump" : "fall";
    } else if (Math.abs(this.speedX) > 0.3 || Math.abs(this.speedFloorY) > 0.3) {
      this.animState = "run";
    } else {
      this.animState = "idle";
    }
    this.animTimer += dt;
    if (this.animState === "run") {
      if (this.animTimer > 0.08) {
        this.animTimer = 0;
        this.animFrame = (this.animFrame + 1) % CFG.SPRITE_RUN_FRAMES;
      }
    } else if (this.animState === "idle") {
      this.animFrame = 0;
    }
  }
  hurt(particles, audio) {
    if (this.invTimer > 0) return;
    this.hp--;
    particles.impactBurst(this.cx, this.cy, 10, "#ff6666");
    audio.hurtSound();

    if (this.hp <= 0) {
      // Dead — lives decremented by state machine (shared pool in co-op)
      this.hp = 0;
      this._deathType = "contact";
      this.die();
    } else {
      // Took a hit but still alive — invincibility frames + knockback
      this.invTimer = 1.5;
      this.vz = CFG.BELT_JUMP_FORCE * 0.4; // small knockback bounce
      particles.floatingText(this.cx, this.cy - 15, "-1", "#ff4444");
    }
  }
  die() {
    this.alive = false;
    this.isBig = false;
    // hasWings stays true — all characters permanently have wings
    this.hasRainbow = false;
    this.canTripleJump = false;
    this.canDoubleJump = false;
    this.isMermaid = false;
    const baseDef = this.characterDef.startForm;
    this.isKittycorn = !!baseDef.isKittycorn;
    this.isPiggicorn = !!baseDef.isPiggicorn;
    this.isMouseicorn = !!baseDef.isMouseicorn;
  }
  reset(x, y) {
    this.x = x;
    this.floorY = y !== undefined ? y : ((CFG.FLOOR_Y_MIN + CFG.FLOOR_Y_MAX) / 2);
    this.z = 0;
    this.vx = 0; this.vz = 0; this.vFloorY = 0; this.vy = 0;
    this.speedX = 0;
    this.speedFloorY = 0;
    this.onGround = true;
    this.alive = true;
    this.hp = CFG.PLAYER_MAX_HP;
    this.invTimer = 1.0;
    this.facing = 1;
    this.coyoteTimer = 0;
    this.jumpBufferTimer = 0;
    this.canDoubleJump = this.hasWings;
    this.canTripleJump = this.hasWings;
    this.growWingsTimer = 0;
    this.squash = 0;
    this.animState = "idle";
    this.animFrame = 0;
    this.animTimer = 0;
    this.poopTimer = 0;
    this.poopCooldown = 0;
    this.isStandPooping = false;
    this.jumpType = "first";
    this.shootCooldown = 0;
    this._spawnPoop = false;
    this._spawnStandPoop = false;
    this._spawnRainbow = false;
    this.mermaidTransformTimer = 0;
    this.piggicornTransformTimer = 0;
    this.mousicornTransformTimer = 0;
    this.growBigTimer = 0;
    this.shrinkTimer = 0;
    this.loseFormTimer = 0;
    this._deathType = null;
    this._deathHandled = false;
    this.respawnTimer = 0;
    const baseDef = this.characterDef.startForm;
    this.isKittycorn = !!baseDef.isKittycorn;
    this.isPiggicorn = !!baseDef.isPiggicorn;
    this.isMouseicorn = !!baseDef.isMouseicorn;
    this.isMermaid = false;
  }
}

// --- Star (Collectible) ---
class Star extends Entity {
  constructor(x, y) {
    super(x, y, 14, 14);
    this.baseFloorY = this.floorY;
    this.z = 20; // float above floor
    this.phase = Math.random() * Math.PI * 2;
    this.glowPhase = Math.random() * Math.PI * 2;
    this.collected = false;
    this.collectTimer = 0;
  }
  update(dt, gt) {
    if (this.collected) {
      this.collectTimer -= dt;
      if (this.collectTimer <= 0) this.alive = false;
      return;
    }
    this.z = 20 + Math.sin(gt * CFG.STAR_FLOAT_SPD + this.phase) * CFG.STAR_FLOAT_AMP;
    this.glowPhase += dt * 4;
  }
  collect() {
    this.collected = true;
    this.collectTimer = 0.3;
  }
}

// --- Fly (Enemy) ---
class Fly extends Entity {
  constructor(x, y, patrolDist) {
    super(x, y, 18, 14);
    this.startX = x;
    this.endX = x + patrolDist;
    this.dir = 1;
    this.phase = Math.random() * Math.PI * 2;
    this.wingPhase = 0;
    this.baseFloorY = this.floorY;
    this.z = 30; // hover height above floor
    this.speed = CFG.FLY_PATROL_SPD;
    this.hp = CFG.ENEMY_HP;
  }
  update(dt, gt) {
    this.x += this.dir * this.speed;
    if (this.x >= this.endX) { this.x = this.endX; this.dir = -1; }
    if (this.x <= this.startX) { this.x = this.startX; this.dir = 1; }
    this.z = 30 + Math.sin(gt * CFG.FLY_BOB_SPD + this.phase) * CFG.FLY_BOB_AMP;
    // Slight depth wander on floor plane
    this.floorY = this.baseFloorY + Math.sin(gt * 0.7 + this.phase) * 8;
    this.floorY = Math.max(CFG.FLOOR_Y_MIN, Math.min(CFG.FLOOR_Y_MAX, this.floorY));
    this.wingPhase += dt * 30;
  }
}

// --- Gnome (Ground Enemy) ---
class Gnome extends Entity {
  constructor(x, y, patrolDist) {
    super(x, y, 14, 28);
    this.startX = x;
    this.endX = x + patrolDist;
    this.dir = 1;
    this.speed = CFG.GNOME_PATROL_SPD;
    this.animTimer = 0;
    this.animFrame = 0;
    this.baseFloorY = this.floorY;
    this.z = 0; // ground-based
    this.hp = CFG.ENEMY_HP;
  }
  update(dt, gt) {
    this.x += this.dir * this.speed;
    if (this.x >= this.endX) { this.x = this.endX; this.dir = -1; }
    if (this.x <= this.startX) { this.x = this.startX; this.dir = 1; }
    // Slight depth wander on floor plane
    this.floorY = this.baseFloorY + Math.sin(gt * 0.5 + this.x * 0.01) * 6;
    this.floorY = Math.max(CFG.FLOOR_Y_MIN, Math.min(CFG.FLOOR_Y_MAX, this.floorY));
    this.animTimer += dt;
    if (this.animTimer > 0.12) {
      this.animTimer = 0;
      this.animFrame = (this.animFrame + 1) % CFG.SPRITE_GNOME_FRAMES;
    }
  }
}

// --- Wing Crystal (Power-up) ---
class WingCrystal extends Entity {
  constructor(x, y) {
    super(x, y, 16, 16);
    this.baseFloorY = this.floorY;
    this.z = 20; // float above floor
    this.phase = Math.random() * Math.PI * 2;
    this.collected = false;
  }
  update(dt, gt) {
    if (this.collected) return;
    this.z = 20 + Math.sin(gt * 2.5 + this.phase) * 5;
  }
}

// --- Hoop (Goal) ---
class Hoop extends Entity {
  constructor(x, y) {
    super(x, y, 20, 60);
    this.pulsePhase = 0;
  }
  update(dt, gt) {
    this.pulsePhase = gt;
  }
}

// --- Poop (Projectile/Dropped) ---
class Poop extends Entity {
  constructor(x, y, vx, vy, floorY) {
    super(x, y, 18, 18);
    this.vx = vx;
    this.vz = vy; // vy becomes vz (arc height)
    if (floorY !== undefined) this.floorY = floorY;
    this.landed = false;
    this.landedTimer = 0;
    this.animTimer = 0;
    this.fadeTime = 6.0; // disappear after landing
  }
  update(dt, level) {
    this.animTimer += dt;
    if (this.landed) {
      this.landedTimer += dt;
      if (this.landedTimer > this.fadeTime) this.alive = false;
      return;
    }
    // Belt-scroll gravity on z axis
    this.vz += CFG.BELT_GRAVITY * 0.8;
    if (this.vz > CFG.BELT_MAX_FALL) this.vz = CFG.BELT_MAX_FALL;
    this.x += this.vx;
    this.z -= this.vz;
    // Land on floor
    if (this.z <= 0) {
      this.z = 0;
      this.vz = 0;
      this.vx = 0;
      this.landed = true;
    }
  }
}

// --- Dead Flower (brown, poop to revive) ---
class DeadFlower extends Entity {
  constructor(x, y) {
    super(x, y, 14, 16);
    this.revived = false;
    this.reviveTimer = 0; // animation timer when revived
  }
  update(dt, gt) {
    if (this.revived) {
      this.reviveTimer += dt;
    }
  }
}

// --- Black Flower (poop to spawn hay bale) ---
class BlackFlower extends Entity {
  constructor(x, y) {
    super(x, y, 14, 16);
    this.used = false;
    this.spawnHayBale = false; // flag for Game to read
  }
  update(dt, gt) {}
}

// --- Hay Bale (collect to grow big, like Mario mushroom) ---
class HayBale extends Entity {
  constructor(x, y) {
    super(x, y, 16, 14);
    this.vz = -3; // pop up from flower (z axis)
    this.vx = 1;  // move right like mushroom
    this.onGround = false;
    this.bobTimer = 0;
  }
  update(dt, level) {
    this.bobTimer += dt;
    // Belt-scroll gravity on z axis
    this.vz += CFG.BELT_GRAVITY * 0.7;
    if (this.vz > CFG.BELT_MAX_FALL) this.vz = CFG.BELT_MAX_FALL;
    this.z -= this.vz;
    this.x += this.vx;
    // Land on floor
    if (this.z <= 0) {
      this.z = 0;
      this.vz = 0;
      this.onGround = true;
    }
    // Clamp to level bounds (no wall collision in belt-scroll)
    if (this.x <= 0 || this.x >= level.width) {
      this.vx = -this.vx;
    }
  }
}

// --- Rainbow Bolt (horn shooter projectile) ---
class RainbowBolt extends Entity {
  constructor(x, y, facing, floorY) {
    super(x, y, 16, 8);
    this.vx = facing * 5;
    this.vz = 0;
    this.facing = facing;
    this.timer = 0;
    this.lifeSpan = 2.0; // disappears after 2 seconds
    if (floorY !== undefined) this.floorY = floorY;
  }
  update(dt, level) {
    this.timer += dt;
    this.x += this.vx;
    this.vz += 0.02; // very slight arc downward
    this.z -= this.vz;
    if (this.z < 0) this.z = 0;
    // Die after lifespan or off screen
    if (this.timer > this.lifeSpan || this.x < -20 || this.x > level.width + 20) {
      this.alive = false;
    }
  }
}

// --- Boss (Gnome King - stomp or shoot 3 times to defeat) ---
class Boss extends Entity {
  constructor(x, y) {
    super(x, y, 40, 50);
    this.hp = CFG.BOSS_HP;
    this.maxHp = CFG.BOSS_HP;
    this.invTimer = 0;
    this.dir = -1;
    this.speed = 1.0;
    this.baseSpeed = 1.0;
    this.phase = "patrol"; // patrol, charge, stunned, defeated
    this.chargeTimer = 0;
    this.stunTimer = 0;
    this.patrolTimer = 0;
    this.arenaLeft = 0;
    this.arenaRight = 0;
    this.onGround = false;
    this.jumpTimer = 0;
    this.animTimer = 0;
    this.defeated = false;
    this.defeatTimer = 0;
    // Hawk-specific properties
    this.flyHeight = 0;       // set after arena is known
    this.swoopTargetX = 0;
    this.swoopTargetY = 0;
    this.swoopVX = 0;
    this.swoopVY = 0;
    this.swoopVZ = 0;
    this.riseTimer = 0;       // timer for rising back to cruise altitude after stun
    this.bossType = "gnome";  // default, overwritten after construction
    this.baseFloorY = this.floorY;
    // Flower-specific properties
    this.fireballTimer = 0;
    this.flowerPhase = 0;
    this.wantsToShoot = false;
    // Pharaoh cat specific
    this.pounceTargetX = 0;
    this.pounceTargetY = 0;
    this.scratchCount = 0;
    this.scratchTimer = 0;
    this.hissTimer = 0;
    this.catPhase = "patrol"; // patrol, pounce, scratch, hiss
    // Storm dragon specific
    this.dragonPhase = "fly"; // fly, dive, breathe, rise
    this.breathTimer = 0;
    this.breathCount = 0;
    this.diveTimer = 0;
    this.wingAngle = 0;
    // Shadow queen specific
    this.queenPhase = "float"; // float, dash, nova, teleport
    this.novaTimer = 0;
    this.novaCount = 0;
    this.dashTimer = 0;
    this.teleportTimer = 0;
    this.queenGlow = 0;
  }
  setArena(left, right) {
    this.arenaLeft = left;
    this.arenaRight = right;
  }
  hit(particles, audio, game) {
    if (this.invTimer > 0 || this.defeated) return false;
    this.hp--;
    this.invTimer = 1.5;
    this.stunTimer = 1.0;
    this.phase = "stunned";
    this.speed = 0;
    audio.hurtSound();
    particles.impactBurst(this.cx, this.cy, 15, "#ff4444");
    particles.floatingText(this.cx, this.cy - 30, this.hp > 0 ? "HIT! " + this.hp + " LEFT" : "K.O.!", "#ff4444");
    // Score
    if (game) {
      if (this.hp <= 0) {
        game.addScore(1000, this.cx, this.cy - 40, "#ffaa00");
        game.camera.shake(8);
      } else {
        game.addScore(500, this.cx, this.cy - 40, "#ffaa00");
        game.camera.shake(6);
      }
    }
    if (this.hp <= 0) {
      this.defeated = true;
      this.defeatTimer = 0;
      this.phase = "defeated";
    } else {
      this.baseSpeed += 0.15;
      // Rage mode when HP drops to threshold — boss speeds up significantly
      if (this.hp <= CFG.BOSS_RAGE_HP && this.hp + 1 > CFG.BOSS_RAGE_HP) {
        this.baseSpeed += 0.8; // big speed boost entering rage
        if (particles) particles.floatingText(this.cx, this.cy - 40, "ENRAGED!!", "#ff0000");
      }
    }
    return true;
  }
  update(dt, level, playerX, playerY) {
    if (this.defeated) {
      this.defeatTimer += dt;
      return;
    }
    this.animTimer += dt;
    if (this.invTimer > 0) this.invTimer -= dt;

    // Hawk boss — flying behavior (z axis height, no gravity except when stunned)
    if (this.bossType === "hawk") {
      // Set flyHeight as z-height above floor on first update
      if (this.flyHeight === 0) {
        this.flyHeight = 80;
      }

      if (this.phase === "stunned") {
        // Fall with gravity when stunned (z axis)
        this.vz += CFG.BELT_GRAVITY;
        if (this.vz > CFG.BELT_MAX_FALL) this.vz = CFG.BELT_MAX_FALL;
        this.z -= this.vz;
        if (this.z <= 0) { this.z = 0; this.vz = 0; }
        this.stunTimer -= dt;
        if (this.stunTimer <= 0) {
          this.phase = "rise";
          this.riseTimer = 0;
          this.speed = this.baseSpeed;
        }
        return;
      }

      if (this.phase === "rise") {
        // Fly back up to cruising altitude (increase z)
        this.riseTimer += dt;
        this.z += 2.5;
        this.vz = 0;
        this.x += this.dir * this.speed * 0.5;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        if (this.z >= this.flyHeight || this.riseTimer > 2.0) {
          this.z = this.flyHeight;
          this.vz = 0;
          this.phase = "fly";
          this.patrolTimer = 0;
        }
        return;
      }

      if (this.phase === "fly" || this.phase === "patrol") {
        this.phase = "fly"; // normalize
        // Cruise back and forth with sinusoidal bobbing on z
        this.x += this.dir * this.speed;
        this.z = this.flyHeight + Math.sin(this.animTimer * 2.0) * 8;
        this.vz = 0;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        // Track player depth slightly
        if (playerY !== undefined) this.floorY += (playerY - this.floorY) * 0.02;
        this.floorY = Math.max(CFG.FLOOR_Y_MIN, Math.min(CFG.FLOOR_Y_MAX, this.floorY));
        this.patrolTimer += dt;
        // Swoop at player periodically
        if (this.patrolTimer > 2.5) {
          this.phase = "swoop";
          this.chargeTimer = 0;
          this.swoopTargetX = playerX || this.cx;
          const dx = this.swoopTargetX - this.cx;
          const dz = -(this.z - 5); // dive to near ground (z=5)
          const dist = Math.sqrt(dx * dx + dz * dz) || 1;
          const swoopSpeed = this.baseSpeed * 2.5;
          this.swoopVX = (dx / dist) * swoopSpeed;
          this.swoopVZ = (dz / dist) * swoopSpeed;
          this.dir = dx > 0 ? 1 : -1;
        }
        return;
      }

      if (this.phase === "swoop" || this.phase === "charge") {
        this.phase = "swoop"; // normalize
        // Dive toward target position (decrease z)
        this.x += this.swoopVX;
        this.z += this.swoopVZ;
        if (this.z < 0) this.z = 0;
        this.vz = 0;
        this.chargeTimer += dt;
        // Clamp to arena bounds
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        // End swoop after reaching ground or timer expires
        if (this.chargeTimer > 1.5 || this.z <= 5) {
          this.phase = "rise";
          this.riseTimer = 0;
          this.vz = 0;
        }
        return;
      }

      return; // hawk handled
    }

    // Flower boss — stationary, shoots fireballs
    if (this.bossType === "flower") {
      this.flowerPhase += dt;
      this.fireballTimer += dt;
      if (this.phase === "stunned") {
        this.stunTimer -= dt;
        if (this.stunTimer <= 0) { this.phase = "patrol"; this.speed = 0; }
        return;
      }
      // Shoot fireballs periodically (faster after hits)
      const interval = CFG.FLOWER_FIREBALL_INTERVAL - (this.maxHp - this.hp) * 0.3;
      if (this.fireballTimer >= interval && this.phase !== "stunned") {
        this.fireballTimer = 0;
        this.phase = "charge";
        this.chargeTimer = 0;
        this.wantsToShoot = true;
      }
      if (this.phase === "charge") {
        this.chargeTimer += dt;
        if (this.chargeTimer > 0.3) { this.phase = "patrol"; this.chargeTimer = 0; }
      }
      return;
    }

    // Rat boss — ground-based scurrier with z-axis jumping
    if (this.bossType === "rat") {
      // Belt-scroll gravity on z axis
      this.vz += CFG.BELT_GRAVITY;
      if (this.vz > CFG.BELT_MAX_FALL) this.vz = CFG.BELT_MAX_FALL;
      this.z -= this.vz;
      this.onGround = false;
      if (this.z <= 0) { this.z = 0; this.vz = 0; this.onGround = true; }

      // Track player depth slightly
      if (playerY !== undefined) this.floorY += (playerY - this.floorY) * 0.03;
      this.floorY = Math.max(CFG.FLOOR_Y_MIN, Math.min(CFG.FLOOR_Y_MAX, this.floorY));

      if (this.phase === "stunned") {
        this.stunTimer -= dt;
        if (this.stunTimer <= 0) {
          this.phase = "patrol";
          this.speed = this.baseSpeed;
          this.patrolTimer = 0;
        }
        return;
      }

      // Speed up intervals after hits
      const hitBonus = (this.maxHp - this.hp) * 0.4;
      const chargeInterval = Math.max(0.8, CFG.RAT_CHARGE_INTERVAL - hitBonus);
      const jumpInterval = Math.max(1.2, CFG.RAT_JUMP_INTERVAL - hitBonus);

      if (this.phase === "patrol") {
        this.x += this.dir * this.speed;
        this.patrolTimer += dt;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        if (this.patrolTimer > chargeInterval) {
          this.phase = "charge";
          this.chargeTimer = 0;
          this.dir = playerX > this.cx ? 1 : -1;
          this.speed = this.baseSpeed * CFG.RAT_CHARGE_SPEED_MULT;
        }
        this.jumpTimer += dt;
        if (this.jumpTimer > jumpInterval && this.onGround) {
          this.vz = CFG.RAT_JUMP_FORCE;
          this.jumpTimer = 0;
        }
      }

      if (this.phase === "charge") {
        this.x += this.dir * this.speed;
        this.chargeTimer += dt;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        this.jumpTimer += dt;
        if (this.jumpTimer > jumpInterval * 0.6 && this.onGround) {
          this.vz = CFG.RAT_JUMP_FORCE * 1.2;
          this.jumpTimer = 0;
        }
        if (this.chargeTimer > 1.5) {
          this.phase = "patrol";
          this.speed = this.baseSpeed;
          this.patrolTimer = 0;
        }
      }
      return; // rat handled
    }

    // Storm Dragon boss — flying with fire breath (z axis height)
    if (this.bossType === "storm_dragon") {
      if (this.flyHeight === 0) {
        this.flyHeight = 90; // z height above floor
      }
      this.wingAngle += dt * 4;

      if (this.phase === "stunned") {
        this.vz += CFG.BELT_GRAVITY;
        if (this.vz > CFG.BELT_MAX_FALL) this.vz = CFG.BELT_MAX_FALL;
        this.z -= this.vz;
        if (this.z <= 0) { this.z = 0; this.vz = 0; }
        this.stunTimer -= dt;
        if (this.stunTimer <= 0) {
          this.phase = "rise";
          this.dragonPhase = "rise";
          this.riseTimer = 0;
          this.speed = this.baseSpeed;
        }
        return;
      }

      const hitBonus = (this.maxHp - this.hp) * 0.4;

      if (this.dragonPhase === "rise") {
        this.riseTimer += dt;
        this.z += 2.8;
        this.vz = 0;
        this.x += this.dir * this.speed * 0.5;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        if (this.z >= this.flyHeight || this.riseTimer > 2.0) {
          this.z = this.flyHeight;
          this.vz = 0;
          this.phase = "fly";
          this.dragonPhase = "fly";
          this.patrolTimer = 0;
        }
        return;
      }

      if (this.dragonPhase === "fly") {
        this.phase = "fly";
        this.x += this.dir * this.speed * 1.2;
        this.z = this.flyHeight + Math.sin(this.animTimer * 1.8) * 10;
        this.vz = 0;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        // Track player depth
        if (playerY !== undefined) this.floorY += (playerY - this.floorY) * 0.02;
        this.floorY = Math.max(CFG.FLOOR_Y_MIN, Math.min(CFG.FLOOR_Y_MAX, this.floorY));
        this.patrolTimer += dt;
        const actionInterval = Math.max(1.5, 2.8 - hitBonus);
        if (this.patrolTimer > actionInterval) {
          if (this.breathCount % 2 === 0) {
            this.dragonPhase = "dive";
            this.phase = "swoop";
            this.chargeTimer = 0;
            this.swoopTargetX = playerX || this.cx;
            const dx = this.swoopTargetX - this.cx;
            const dz = -(this.z - 5);
            const dist = Math.sqrt(dx * dx + dz * dz) || 1;
            const swoopSpeed = this.baseSpeed * 2.8;
            this.swoopVX = (dx / dist) * swoopSpeed;
            this.swoopVZ = (dz / dist) * swoopSpeed;
            this.dir = dx > 0 ? 1 : -1;
          } else {
            this.dragonPhase = "breathe";
            this.phase = "charge";
            this.breathTimer = 0;
            this.dir = playerX > this.cx ? 1 : -1;
            this.wantsToShoot = true;
          }
          this.breathCount++;
        }
        return;
      }

      if (this.dragonPhase === "dive") {
        this.x += this.swoopVX;
        this.z += this.swoopVZ;
        if (this.z < 0) this.z = 0;
        this.vz = 0;
        this.chargeTimer += dt;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        if (this.chargeTimer > 1.5 || this.z <= 5) {
          this.dragonPhase = "rise";
          this.phase = "rise";
          this.riseTimer = 0;
          this.vz = 0;
        }
        return;
      }

      if (this.dragonPhase === "breathe") {
        this.breathTimer += dt;
        this.z = this.flyHeight + Math.sin(this.animTimer * 3) * 4;
        const shootInterval = Math.max(0.3, 0.6 - hitBonus * 0.1);
        if (this.wantsToShoot) {
          this.wantsToShoot = false;
          this.fireballTimer = 0;
        }
        this.fireballTimer += dt;
        if (this.fireballTimer >= shootInterval) {
          this.fireballTimer = 0;
          this.wantsToShoot = true;
        }
        if (this.breathTimer > 2.0) {
          this.dragonPhase = "fly";
          this.phase = "fly";
          this.patrolTimer = 0;
          this.wantsToShoot = false;
        }
        return;
      }
      return; // storm_dragon handled
    }

    // Shadow Queen boss — teleporting magic user (z axis height)
    if (this.bossType === "shadow_queen") {
      this.queenGlow += dt;

      if (this.phase === "stunned") {
        this.vz += CFG.BELT_GRAVITY * 0.5;
        if (this.vz > 3) this.vz = 3;
        this.z -= this.vz;
        if (this.z <= 0) { this.z = 0; this.vz = 0; }
        this.stunTimer -= dt;
        if (this.stunTimer <= 0) {
          this.phase = "patrol";
          this.queenPhase = "float";
          this.speed = this.baseSpeed;
          this.patrolTimer = 0;
        }
        return;
      }

      const hitBonus = (this.maxHp - this.hp) * 0.5;
      if (this.flyHeight === 0) {
        this.flyHeight = 60; // z height above floor
      }

      if (this.queenPhase === "float") {
        this.phase = "patrol";
        this.x += this.dir * this.speed * 0.8;
        this.z = this.flyHeight + Math.sin(this.animTimer * 2.5) * 6;
        this.vz = 0;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        // Track player depth
        if (playerY !== undefined) this.floorY += (playerY - this.floorY) * 0.02;
        this.floorY = Math.max(CFG.FLOOR_Y_MIN, Math.min(CFG.FLOOR_Y_MAX, this.floorY));
        this.patrolTimer += dt;
        const actionInterval = Math.max(1.2, 2.2 - hitBonus);
        if (this.patrolTimer > actionInterval) {
          const attack = this.novaCount % 3;
          if (attack === 0) {
            this.queenPhase = "dash";
            this.phase = "charge";
            this.dashTimer = 0;
            this.dir = playerX > this.cx ? 1 : -1;
            this.speed = this.baseSpeed * 3.5;
          } else if (attack === 1) {
            this.queenPhase = "nova";
            this.phase = "charge";
            this.novaTimer = 0;
            this.wantsToShoot = true;
          } else {
            this.queenPhase = "teleport";
            this.teleportTimer = 0;
            this.swoopTargetX = playerX + (playerX > this.cx ? -60 : 60);
            // Teleport changes depth too
            if (playerY !== undefined) this.floorY = playerY;
          }
          this.novaCount++;
        }
        return;
      }

      if (this.queenPhase === "dash") {
        this.dashTimer += dt;
        this.x += this.dir * this.speed;
        this.z = this.flyHeight + Math.sin(this.animTimer * 6) * 3;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        if (this.dashTimer > 1.0) {
          this.queenPhase = "float";
          this.phase = "patrol";
          this.speed = this.baseSpeed;
          this.patrolTimer = 0;
        }
        return;
      }

      if (this.queenPhase === "nova") {
        this.novaTimer += dt;
        this.z = this.flyHeight + Math.sin(this.animTimer * 4) * 2;
        const shootInterval = Math.max(0.25, 0.5 - hitBonus * 0.1);
        if (this.wantsToShoot) {
          this.wantsToShoot = false;
          this.fireballTimer = 0;
        }
        this.fireballTimer += dt;
        if (this.fireballTimer >= shootInterval) {
          this.fireballTimer = 0;
          this.wantsToShoot = true;
        }
        if (this.novaTimer > 2.0) {
          this.queenPhase = "float";
          this.phase = "patrol";
          this.patrolTimer = 0;
          this.wantsToShoot = false;
        }
        return;
      }

      if (this.queenPhase === "teleport") {
        this.teleportTimer += dt;
        if (this.teleportTimer < 0.3) {
          // fading out (handled in draw)
        } else if (this.teleportTimer < 0.5) {
          const targetX = Math.max(this.arenaLeft, Math.min(this.arenaRight - this.w, this.swoopTargetX));
          this.x = targetX;
          this.dir = playerX > this.cx ? 1 : -1;
        }
        if (this.teleportTimer > 0.8) {
          this.queenPhase = "float";
          this.phase = "patrol";
          this.patrolTimer = 0;
          this.speed = this.baseSpeed;
        }
        return;
      }
      return; // shadow_queen handled
    }

    // Pharaoh's Cat boss — ground-based pouncer (z axis jumping)
    if (this.bossType === "pharaoh_cat") {
      this.vz += CFG.BELT_GRAVITY;
      if (this.vz > CFG.BELT_MAX_FALL) this.vz = CFG.BELT_MAX_FALL;
      this.z -= this.vz;
      this.onGround = false;
      if (this.z <= 0) { this.z = 0; this.vz = 0; this.onGround = true; }

      // Track player depth
      if (playerY !== undefined) this.floorY += (playerY - this.floorY) * 0.03;
      this.floorY = Math.max(CFG.FLOOR_Y_MIN, Math.min(CFG.FLOOR_Y_MAX, this.floorY));

      if (this.phase === "stunned") {
        this.stunTimer -= dt;
        if (this.stunTimer <= 0) {
          this.phase = "patrol";
          this.catPhase = "patrol";
          this.speed = this.baseSpeed;
          this.patrolTimer = 0;
        }
        return;
      }

      const hitBonus = (this.maxHp - this.hp) * 0.5;

      if (this.catPhase === "patrol") {
        this.x += this.dir * this.speed;
        this.patrolTimer += dt;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        const pounceInterval = Math.max(1.2, 2.5 - hitBonus);
        if (this.patrolTimer > pounceInterval) {
          this.catPhase = "pounce";
          this.phase = "charge";
          this.chargeTimer = 0;
          this.dir = playerX > this.cx ? 1 : -1;
          this.pounceTargetX = playerX;
          // Leap arc via z axis
          this.vz = -7.0;
          this.speed = this.baseSpeed * 3.0;
        }
      }

      if (this.catPhase === "pounce") {
        this.x += this.dir * this.speed;
        this.chargeTimer += dt;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        if (this.onGround && this.chargeTimer > 0.3) {
          this.catPhase = "scratch";
          this.phase = "charge";
          this.scratchCount = 0;
          this.scratchTimer = 0;
          this.speed = this.baseSpeed * 2.0;
          this.dir = playerX > this.cx ? 1 : -1;
        }
        if (this.chargeTimer > 2.0) {
          this.catPhase = "patrol";
          this.phase = "patrol";
          this.speed = this.baseSpeed;
          this.patrolTimer = 0;
        }
      }

      if (this.catPhase === "scratch") {
        this.x += this.dir * this.speed * 0.5;
        this.scratchTimer += dt;
        if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
        if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
        if (this.scratchTimer > 0.25) {
          this.scratchCount++;
          this.scratchTimer = 0;
          if (this.scratchCount >= 3) {
            this.catPhase = "hiss";
            this.hissTimer = 0;
            this.wantsToShoot = true;
          }
        }
      }

      if (this.catPhase === "hiss") {
        this.hissTimer += dt;
        this.speed = 0;
        if (this.wantsToShoot) {
          this.wantsToShoot = false;
          this.fireballTimer = 0;
        }
        this.fireballTimer += dt;
        const shootInterval = Math.max(0.4, 0.8 - hitBonus * 0.15);
        if (this.fireballTimer >= shootInterval) {
          this.fireballTimer = 0;
          this.wantsToShoot = true;
        }
        if (this.hissTimer > 1.8) {
          this.catPhase = "patrol";
          this.phase = "patrol";
          this.speed = this.baseSpeed;
          this.patrolTimer = 0;
          this.wantsToShoot = false;
        }
      }
      return; // pharaoh_cat handled
    }

    // --- Ground bosses (gnome/squid) below --- z axis gravity

    this.vz += CFG.BELT_GRAVITY;
    if (this.vz > CFG.BELT_MAX_FALL) this.vz = CFG.BELT_MAX_FALL;
    this.z -= this.vz;
    this.onGround = false;
    if (this.z <= 0) { this.z = 0; this.vz = 0; this.onGround = true; }

    // Track player depth
    if (playerY !== undefined) this.floorY += (playerY - this.floorY) * 0.03;
    this.floorY = Math.max(CFG.FLOOR_Y_MIN, Math.min(CFG.FLOOR_Y_MAX, this.floorY));

    if (this.phase === "stunned") {
      this.stunTimer -= dt;
      if (this.stunTimer <= 0) {
        this.phase = "patrol";
        this.speed = this.baseSpeed;
        this.patrolTimer = 0;
      }
      return;
    }

    if (this.phase === "patrol") {
      this.x += this.dir * this.speed;
      this.patrolTimer += dt;
      if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
      if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
      if (this.patrolTimer > 2.5) {
        this.phase = "charge";
        this.chargeTimer = 0;
        this.dir = playerX > this.cx ? 1 : -1;
        this.speed = this.baseSpeed * 2.5;
      }
      this.jumpTimer += dt;
      if (this.jumpTimer > 2.0 && this.onGround) {
        this.vz = -5.5;
        this.jumpTimer = 0;
      }
    }

    if (this.phase === "charge") {
      this.x += this.dir * this.speed;
      this.chargeTimer += dt;
      if (this.x <= this.arenaLeft) { this.x = this.arenaLeft; this.dir = 1; }
      if (this.right >= this.arenaRight) { this.x = this.arenaRight - this.w; this.dir = -1; }
      if (this.chargeTimer > 1.5) {
        this.phase = "patrol";
        this.speed = this.baseSpeed;
        this.patrolTimer = 0;
      }
    }
  }
}
