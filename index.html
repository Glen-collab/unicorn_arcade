      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h*0.4, w/2, h*0.4, 0, Math.PI, 0);
      ctx.fill();
      // Spots
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.fillRect(x + w/2 - 1, y + h*0.2, 2, 2);
      break;
    }
    case "rock": {
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.moveTo(x + 2, y + h);
      ctx.lineTo(x, y + h * 0.5);
      ctx.lineTo(x + w * 0.3, y + 1);
      ctx.lineTo(x + w * 0.7, y);
      ctx.lineTo(x + w, y + h * 0.4);
      ctx.lineTo(x + w - 1, y + h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = def.darkColor || "rgba(0,0,0,0.15)";
      ctx.fillRect(x + 2, y + h * 0.5, w * 0.4, h * 0.3);
      break;
    }
    case "flowers": {
      const sway = Math.sin(gt * 2 + x * 0.1) * 1.5;
      const colors = [def.color, "#ffffff", "#ffdd44"];
      for (let i = 0; i < 3; i++) {
        const fx = x + i * (w/3) + 1;
        // Stem
        ctx.fillStyle = "#44aa44";
        ctx.fillRect(fx + 1 + sway * 0.5, y + h * 0.4, 1, h * 0.6);
        // Petal
        ctx.fillStyle = colors[i % colors.length];
        ctx.beginPath();
        ctx.arc(fx + 1.5 + sway, y + h * 0.35, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case "log": {
      ctx.fillStyle = def.color;
      ctx.fillRect(x, y + 2, w, h - 2);
      // Rings on end
      ctx.fillStyle = def.darkColor || "#5a3a0a";
      ctx.beginPath();
      ctx.ellipse(x, y + h/2 + 1, 3, h/2 - 1, 0, 0, Math.PI*2);
      ctx.fill();
      // Bark lines
      ctx.fillStyle = "rgba(0,0,0,0.1)";
      ctx.fillRect(x + 4, y + 3, w - 8, 1);
      ctx.fillRect(x + 3, y + h - 2, w - 6, 1);
      break;
    }
    case "sign": {
      // Post
      ctx.fillStyle = def.color;
      ctx.fillRect(x + w/2 - 1, y + h * 0.4, 2, h * 0.6);
      // Board
      ctx.fillStyle = "#C4A456";
      ctx.fillRect(x - 1, y, w + 2, h * 0.45);
      ctx.strokeStyle = "#8B6914";
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x - 1, y, w + 2, h * 0.45);
      // Star icon
      ctx.fillStyle = "#ffdd44";
      ctx.font = "bold 6px monospace";
      ctx.textAlign = "center";
      ctx.fillText("\u2605", x + w/2, y + h * 0.35);
      break;
    }
    case "crystal": {
      // Glow
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = def.glowColor || def.color;
      ctx.beginPath();
      ctx.arc(x + w/2, y + h/2, w, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      // Crystal body
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y);
      ctx.lineTo(x + w, y + h * 0.6);
      ctx.lineTo(x + w * 0.7, y + h);
      ctx.lineTo(x + w * 0.3, y + h);
      ctx.lineTo(x, y + h * 0.6);
      ctx.closePath();
      ctx.fill();
      // Highlight
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.beginPath();
      ctx.moveTo(x + w/2, y + 1);
      ctx.lineTo(x + w * 0.65, y + h * 0.5);
      ctx.lineTo(x + w/2, y + h * 0.7);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case "stalagmite": {
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x, y + h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = def.darkColor || "rgba(0,0,0,0.1)";
      ctx.fillRect(x + w * 0.3, y + h * 0.3, w * 0.15, h * 0.5);
      break;
    }
    case "stump": {
      ctx.fillStyle = def.color;
      ctx.fillRect(x + 2, y + 3, w - 4, h - 3);
      // Top
      ctx.fillStyle = def.darkColor || "#4a2e1a";
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + 3, w/2 - 1, 3, 0, 0, Math.PI*2);
      ctx.fill();
      // Rings
      ctx.strokeStyle = "rgba(0,0,0,0.15)";
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + 3, w/4, 1.5, 0, 0, Math.PI*2);
      ctx.stroke();
      break;
    }
    case "berry_bush": {
      // Bush
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h * 0.6, w/2, h * 0.5, 0, 0, Math.PI*2);
      ctx.fill();
      // Berries
      ctx.fillStyle = def.berryColor || "#ff4444";
      for (let i = 0; i < 4; i++) {
        const bx = x + 3 + ((i * 7 + x) % (w - 6));
        const by = y + h * 0.3 + ((i * 5) % (h * 0.4));
        ctx.beginPath();
        ctx.arc(bx, by, 1.5, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case "coral": {
      ctx.fillStyle = def.color;
      // Branch shapes
      for (let i = 0; i < 3; i++) {
        const cx = x + i * (w/3) + 1;
        const ch = h * (0.5 + (i * 0.2));
        ctx.fillRect(cx, y + h - ch, 3, ch);
        ctx.beginPath();
        ctx.arc(cx + 1.5, y + h - ch, 2.5, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
  }
}

// --- Level ---
class Level {
  constructor(levelDef) {
    this.levelDef = levelDef || LEVEL_DEFS[0];
    this.cols = this.levelDef.cols;
    this.rows = CFG.ROWS;
    this.tiles = new Uint8Array(this.cols * this.rows);
    this.stars = [];
    this.flies = [];
    this.wingCrystals = [];
    this.gnomes = [];
    this.poops = [];
    this.deadFlowers = [];
    this.blackFlowers = [];
    this.hayBales = [];
    this.rainbowBolts = [];
    this.fish = [];
    this.jellyfish = [];
    this.narwhals = [];
    this.mermaidGems = [];
    this.birds = [];
    this.kittycornGems = [];
    this.pixicornGems = [];
    this.mousicornGems = [];
    this.props = [];
    this.fireballs = [];
    this.formGates = [];
    this.hoop = null;
    this.boss = null;
    this.spawnX = 3 * CFG.TILE;
    this.spawnY = (this.rows - 4) * CFG.TILE;
  }
  get width() { return this.cols * CFG.TILE; }
  get height() { return this.rows * CFG.TILE; }
  getZoneAtCol(col) {
    if (!this.levelDef.zones) return this.levelDef;
    const zones = this.levelDef.zones;
    for (let i = zones.length - 1; i >= 0; i--) {
      if (col >= zones[i].startCol) return zones[i];
    }
    return zones[0];
  }
  getZoneEndCol(zoneIndex) {
    const zones = this.levelDef.zones;
    if (!zones) return this.cols;
    if (zoneIndex < zones.length - 1) return zones[zoneIndex + 1].startCol;
    return this.cols;
  }
  get(c, r) {
    if (c < 0 || c >= this.cols || r < 0 || r >= this.rows) return TILE_EMPTY;
    return this.tiles[r * this.cols + c];
  }
  set(c, r, v) {
    if (c < 0 || c >= this.cols || r < 0 || r >= this.rows) return;
    this.tiles[r * this.cols + c] = v;
  }
  solidAt(px, py) {
    const c = Math.floor(px / CFG.TILE);
    const r = Math.floor(py / CFG.TILE);
    const t = this.get(c, r);
    return t === TILE_GRASS || t === TILE_DIRT;
  }
  generate() {
    const def = this.levelDef;
    const rng = new SeededRNG(def.seed);
    const T = CFG.TILE;
    const groundRow = this.rows - 1;
    const grassRow = this.rows - 2;
    const tw = def.terrain; // terrain weights (fallback for non-zoned levels)
    const hasZones = !!def.zones;

    // Fill bottom two rows as ground
    for (let c = 0; c < this.cols; c++) {
      this.set(c, groundRow, TILE_DIRT);
      this.set(c, grassRow, TILE_GRASS);
    }

    // Helper: does a bgTheme need ceiling?
    const needsCeiling = (theme) => theme === "cave" || theme === "pyramid_interior" || theme === "pyramid_boss";
    const isSewer = (theme) => theme === "sewer" || theme === "sewer_flood" || theme === "sewer_deep" || theme === "sewer_boss";

    // Cave/pyramid/sewer ceiling tiles (zone-aware)
    if (hasZones) {
      for (let c = 5; c < this.cols - 5; c++) {
        const zone = this.getZoneAtCol(c);
        const zt = zone.bgTheme;
        if (needsCeiling(zt)) {
          this.set(c, 0, TILE_DIRT);
          if (rng.next() < 0.65) this.set(c, 1, TILE_DIRT);
          if (rng.next() < 0.12) {
            this.set(c, 2, TILE_DIRT);
            if (rng.next() < 0.4) this.set(c, 3, TILE_DIRT);
          }
        } else if (isSewer(zt)) {
          this.set(c, 0, TILE_DIRT);
          if (rng.next() < 0.55) this.set(c, 1, TILE_DIRT);
          if (rng.next() < 0.08) this.set(c, 2, TILE_DIRT);
        } else {
          // consume the same random calls to keep RNG deterministic
          rng.next(); rng.next(); rng.next();
        }
      }
    } else {
      // Non-zoned: original cave/sewer ceiling logic
      if (def.bgTheme === "cave") {
        for (let c = 5; c < this.cols - 5; c++) {
          this.set(c, 0, TILE_DIRT);
          if (rng.next() < 0.65) this.set(c, 1, TILE_DIRT);
          if (rng.next() < 0.12) {
            this.set(c, 2, TILE_DIRT);
            if (rng.next() < 0.4) this.set(c, 3, TILE_DIRT);
          }
        }
      }
      const isSewerLevel = isSewer(def.bgTheme);
      if (isSewerLevel) {
        for (let c = 5; c < this.cols - 5; c++) {
          this.set(c, 0, TILE_DIRT);
          if (rng.next() < 0.55) this.set(c, 1, TILE_DIRT);
          if (rng.next() < 0.08) this.set(c, 2, TILE_DIRT);
        }
      }
    }

    // Boss arena: reserve last section for boss fight
    const bossArenaStart = def.isBoss ? this.cols - 45 : this.cols;

    // Generate terrain features
    let col = 10;
    const endCol = def.isBoss ? bossArenaStart - 5 : this.cols - 15;
    while (col < endCol) {
      // Zone-aware terrain weights
      const curTw = hasZones ? (this.getZoneAtCol(col).terrain || tw) : tw;
      const curTheme = hasZones ? this.getZoneAtCol(col).bgTheme : def.bgTheme;
      const roll = rng.next();
      if (roll < curTw.pit) {
        // Pit (gap in ground)
        const pitW = rng.nextInt(3, curTheme === "clouds" ? 7 : 5);
        for (let i = 0; i < pitW; i++) {
          this.set(col + i, groundRow, TILE_EMPTY);
          this.set(col + i, grassRow, TILE_EMPTY);
        }
        col += pitW + 2;
      } else if (roll < curTw.platform) {
        // Floating platform
        const platW = rng.nextInt(3, 7);
        const platRow = rng.nextInt(grassRow - 5, grassRow - 3);
        for (let i = 0; i < platW; i++) {
          this.set(col + i, platRow, TILE_GRASS);
        }
        if (rng.next() < 0.6) {
          this.stars.push(new Star(
            (col + Math.floor(platW/2)) * T + T/2 - 7,
            (platRow - 2) * T
          ));
        }
        col += platW + 2;
      } else if (roll < curTw.stairs) {
        // Stairs
        const steps = curTheme === "forest" ? 4 : 3;
        for (let s = 0; s < steps; s++) {
          const sw = rng.nextInt(2, 3);
          const sr = grassRow - 2 - s * 2;
          for (let i = 0; i < sw; i++) {
            this.set(col + s * 3 + i, sr, TILE_GRASS);
          }
        }
        col += steps * 3 + 2;
      } else if (roll < curTw.twotier) {
        // Two-tiered platform
        const lowW = rng.nextInt(3, 6);
        const lowRow = grassRow - 3;
        for (let i = 0; i < lowW; i++) {
          this.set(col + i, lowRow, TILE_GRASS);
        }
        const hiW = rng.nextInt(2, 4);
        const hiRow = lowRow - 3;
        for (let i = 0; i < hiW; i++) {
          this.set(col + 1 + i, hiRow, TILE_GRASS);
        }
        if (rng.next() < 0.5) {
          this.stars.push(new Star(
            (col + 1 + Math.floor(hiW/2)) * T + T/2 - 7,
            (hiRow - 2) * T
          ));
        }
        col += lowW + 3;
      } else {
        // Flat stretch with possible raised section
        const stretchW = rng.nextInt(5, 10);
        if (rng.next() < 0.4) {
          const raiseRow = grassRow - 1;
          for (let i = 0; i < stretchW; i++) {
            this.set(col + i, raiseRow, TILE_GRASS);
            this.set(col + i, grassRow, TILE_DIRT);
          }
        }
        col += stretchW + 1;
      }

      // Spawn fly enemies near platforms (not underwater — fish/narwhals handle that)
      const colIsUnderwater = hasZones ? !!this.getZoneAtCol(col).isUnderwater : def.isUnderwater;
      if (!colIsUnderwater && rng.next() < 0.35) {
        const flyX = (col - 3) * T;
        const flyRow = rng.nextInt(grassRow - 6, grassRow - 3);
        const flyY = flyRow * T;
        const patrol = rng.nextInt(40, 100);
        this.flies.push(new Fly(flyX, flyY, patrol));
      }

      col += rng.nextInt(1, 3);
    }

    // Zone wall entries — build a tall barrier the player climbs then jumps off into water
    if (hasZones) {
      for (let zi = 1; zi < def.zones.length; zi++) {
        const zone = def.zones[zi];
        if (!zone.wallEntry) continue;
        const wallW = 2;                     // 2 cols thick
        const wallH = 9;                     // 9 rows tall
        const wallCol = zone.startCol - wallW; // wall sits in the land zone, right before water

        // Build the wall — solid dirt with grass cap
        for (let c = wallCol; c < wallCol + wallW; c++) {
          for (let r = grassRow - wallH; r <= grassRow; r++) {
            this.set(c, r, TILE_DIRT);
          }
          this.set(c, grassRow - wallH, TILE_GRASS); // grass cap on top
        }

        // Stair-step platforms on the forest side (left) so player can climb up
        const steps = [
          { col: wallCol - 9, row: grassRow - 2, w: 3 },  // low step
          { col: wallCol - 7, row: grassRow - 4, w: 3 },  // mid-low step
          { col: wallCol - 5, row: grassRow - 6, w: 3 },  // mid-high step
          { col: wallCol - 3, row: grassRow - 8, w: 3 },  // high step (near wall top)
        ];
        for (const s of steps) {
          for (let i = 0; i < s.w; i++) {
            this.set(s.col + i, s.row, TILE_GRASS);
          }
        }

        // Clear ground on the water side so player drops straight into water
        for (let c = zone.startCol; c < zone.startCol + 6; c++) {
          this.set(c, grassRow, TILE_EMPTY);
          this.set(c, groundRow, TILE_EMPTY);
        }
      }
    }

    // === Boss arena (x-4 levels) ===
    if (def.isBoss) {
      // Flat platform for boss arena
      for (let c = bossArenaStart; c < this.cols; c++) {
        this.set(c, grassRow, TILE_GRASS);
        this.set(c, groundRow, TILE_DIRT);
        // Clear any ceiling for arena
        for (let r = 0; r < grassRow; r++) this.set(c, r, TILE_EMPTY);
      }
      // Walls at arena edges
      for (let r = grassRow - 6; r < grassRow; r++) {
        this.set(bossArenaStart, r, TILE_DIRT);
        this.set(this.cols - 1, r, TILE_DIRT);
      }
      this.set(bossArenaStart, grassRow - 6, TILE_GRASS);
      this.set(this.cols - 1, grassRow - 6, TILE_GRASS);
      // Small platform in arena for player to jump to
      const midArena = bossArenaStart + 20;
      for (let i = 0; i < 4; i++) {
        this.set(midArena + i, grassRow - 4, TILE_GRASS);
      }
      // Kittycorn alcoves for pharaoh cat boss (2-tile-high gaps only kittycorn fits)
      if (def.world === 6 && def.isBoss) {
        // Left alcove
        const alcove1 = bossArenaStart + 6;
        for (let i = 0; i < 3; i++) this.set(alcove1 + i, grassRow - 2, TILE_GRASS);
        this.set(alcove1, grassRow - 1, TILE_DIRT);
        this.set(alcove1 + 2, grassRow - 1, TILE_DIRT);
        // Right alcove
        const alcove2 = this.cols - 8;
        for (let i = 0; i < 3; i++) this.set(alcove2 + i, grassRow - 2, TILE_GRASS);
        this.set(alcove2, grassRow - 1, TILE_DIRT);
        this.set(alcove2 + 2, grassRow - 1, TILE_DIRT);
      }
      // Spawn boss
      const bossX = (bossArenaStart + 30) * T;
      const bossY = (grassRow - 4) * T;
      this.boss = new Boss(bossX, bossY);
      this.boss.bossType = def.world === 8 ? "shadow_queen" : (def.world === 7 ? "storm_dragon" : (def.world === 6 ? "pharaoh_cat" : (def.world === 5 ? "rat" : (def.isUnderwater ? "squid" : (def.world === 3 ? "hawk" : (def.world === 4 ? "flower" : "gnome"))))));
      this.boss.setArena((bossArenaStart + 2) * T, (this.cols - 2) * T);
    }

    // Ensure minimum star count
    while (this.stars.length < def.starCount) {
      const sc = rng.nextInt(15, endCol - 5);
      const sr = grassRow - 2;
      if (this.get(sc, grassRow) !== TILE_EMPTY) {
        this.stars.push(new Star(sc * T + T/2 - 7, sr * T));
      }
    }

    // Ensure minimum fly count
    while (this.flies.length < def.flyCount) {
      const fc = rng.nextInt(20, endCol - 10);
      const fr = rng.nextInt(grassRow - 6, grassRow - 2);
      const patrol = rng.nextInt(40, 80);
      this.flies.push(new Fly(fc * CFG.TILE, fr * CFG.TILE, patrol));
    }

    // Place wing crystals
    if (def.wingCrystals > 0) {
      const third = Math.floor(endCol / 3);
      for (let w = 0; w < def.wingCrystals; w++) {
        const minC = 20 + w * third;
        const maxC = minC + third - 10;
        const wc = rng.nextInt(minC, maxC);
        let placeRow = grassRow - 2;
        for (let r = grassRow - 6; r < grassRow - 1; r++) {
          if (this.get(wc, r) === TILE_GRASS) { placeRow = r - 2; break; }
        }
        if (this.get(wc, grassRow) !== TILE_EMPTY) {
          this.wingCrystals.push(new WingCrystal(wc * T + T/2 - 8, placeRow * T));
        }
      }
    }

    // Place gnomes (on actual ground surface — handles raised terrain sections)
    const gnomeSpacing = Math.max(15, Math.floor(endCol / (def.gnomeCount + 1)));
    for (let i = 0; i < def.gnomeCount; i++) {
      const gc = rng.nextInt(gnomeSpacing * (i + 1) - 10, gnomeSpacing * (i + 1) + 10);
      if (gc > 5 && gc < endCol) {
        const patrol = rng.nextInt(30, 60);
        const patrolCols = Math.ceil(patrol / T);
        // Find actual surface row at spawn column (scan upward from base grass)
        let surfaceRow = -1;
        for (let r = grassRow; r >= grassRow - 2; r--) {
          if (this.get(gc, r) === TILE_GRASS) { surfaceRow = r; break; }
        }
        if (surfaceRow < 0) continue;
        // Verify ground exists under entire patrol range at this surface height
        let hasGround = true;
        for (let cc = gc; cc <= Math.min(gc + patrolCols, this.cols - 1); cc++) {
          if (this.get(cc, surfaceRow) === TILE_EMPTY && this.get(cc, surfaceRow + 1) === TILE_EMPTY) {
            hasGround = false; break;
          }
        }
        if (hasGround) {
          const gy = surfaceRow * T - 28;  // gnome h=28, feet at top of surface tile
          this.gnomes.push(new Gnome(gc * T, gy, patrol));
        }
      }
    }

    // Helper: find surface row at a column with clearance above
    const findFlowerSpot = (col) => {
      for (let r = 0; r < this.rows; r++) {
        const tile = this.get(col, r);
        if (tile === TILE_GRASS || tile === TILE_DIRT) {
          let clearAbove = true;
          for (let cr = Math.max(0, r - 3); cr < r; cr++) {
            if (this.get(col, cr) === TILE_GRASS || this.get(col, cr) === TILE_DIRT) {
              clearAbove = false; break;
            }
          }
          if (clearAbove) return r;
        }
      }
      return -1;
    };

    // Place dead flowers
    const dfSpacing = Math.max(10, Math.floor(endCol / (def.deadFlowers + 1)));
    for (let i = 0; i < def.deadFlowers; i++) {
      const fc = rng.nextInt(dfSpacing * (i + 1) - 8, dfSpacing * (i + 1) + 8);
      if (fc > 5 && fc < endCol) {
        const surfaceRow = findFlowerSpot(fc);
        if (surfaceRow >= 0) {
          this.deadFlowers.push(new DeadFlower(fc * T + T/2 - 7, surfaceRow * T - 16));
        }
      }
    }

    // Place black flowers
    const bfSpacing = Math.max(15, Math.floor(endCol / (def.blackFlowers + 1)));
    for (let i = 0; i < def.blackFlowers; i++) {
      const fc = rng.nextInt(bfSpacing * (i + 1) - 10, bfSpacing * (i + 1) + 10);
      if (fc > 5 && fc < endCol) {
        const surfaceRow = findFlowerSpot(fc);
        if (surfaceRow >= 0) {
          this.blackFlowers.push(new BlackFlower(fc * T + T/2 - 7, surfaceRow * T - 16));
        }
      }
    }

    // Place fish (underwater levels + lakeside)
    const fishCount = def.fishCount || 0;
    if (fishCount > 0) {
      const fishSpacing = Math.max(12, Math.floor(endCol / (fishCount + 1)));
      for (let i = 0; i < fishCount; i++) {
        const fc = rng.nextInt(fishSpacing * (i + 1) - 8, fishSpacing * (i + 1) + 8);
        if (fc > 8 && fc < endCol) {
          const fr = rng.nextInt(grassRow - 7, grassRow - 2);
          const patrol = rng.nextInt(40, 100);
          this.fish.push(new Fish(fc * T, fr * T, patrol));
        }
      }
    }

    // Place jellyfish (deeper underwater levels)
    const jellyCount = def.jellyCount || 0;
    if (jellyCount > 0) {
      const jellySpacing = Math.max(15, Math.floor(endCol / (jellyCount + 1)));
      for (let i = 0; i < jellyCount; i++) {
        const jc = rng.nextInt(jellySpacing * (i + 1) - 10, jellySpacing * (i + 1) + 10);
        if (jc > 8 && jc < endCol) {
          const jr = rng.nextInt(grassRow - 8, grassRow - 3);
          this.jellyfish.push(new Jellyfish(jc * T, jr * T));
        }
      }
    }

    // Place narwhals (underwater levels)
    const narwhalCount = def.narwhalCount || 0;
    if (narwhalCount > 0) {
      const nwSpacing = Math.max(15, Math.floor(endCol / (narwhalCount + 1)));
      for (let i = 0; i < narwhalCount; i++) {
        const nc = rng.nextInt(nwSpacing * (i + 1) - 8, nwSpacing * (i + 1) + 8);
        if (nc > 8 && nc < endCol) {
          const nr = rng.nextInt(grassRow - 6, grassRow - 2);
          const patrol = rng.nextInt(50, 120);
          this.narwhals.push(new Narwhal(nc * T, nr * T, patrol));
        }
      }
    }

    // Place mermaid gems
    const mermaidCount = def.mermaidGems || 0;
    if (mermaidCount > 0) {
      const mermSpacing = Math.floor(endCol / (mermaidCount + 1));
      for (let i = 0; i < mermaidCount; i++) {
        const mc = rng.nextInt(mermSpacing * (i + 1) - 8, mermSpacing * (i + 1) + 8);
        if (mc > 10 && mc < endCol) {
          let placeRow = grassRow - 2;
          for (let r = grassRow - 6; r < grassRow - 1; r++) {
            if (this.get(mc, r) === TILE_GRASS) { placeRow = r - 2; break; }
          }
          if (this.get(mc, grassRow) !== TILE_EMPTY) {
            this.mermaidGems.push(new MermaidGem(mc * T + T/2 - 8, placeRow * T));
          }
        }
      }
    }

    // Place birds (treetop levels)
    const birdCount = def.birdCount || 0;
    if (birdCount > 0) {
      const birdSpacing = Math.max(15, Math.floor(endCol / (birdCount + 1)));
      for (let i = 0; i < birdCount; i++) {
        const bc = rng.nextInt(birdSpacing * (i + 1) - 8, birdSpacing * (i + 1) + 8);
        if (bc > 8 && bc < endCol) {
          const br = rng.nextInt(grassRow - 7, grassRow - 3);
          const patrol = rng.nextInt(60, 140);
          this.birds.push(new Bird(bc * T, br * T, patrol));
        }
      }
    }

    // Place kittycorn gems
    const kittycornCount = def.kittycornGems || 0;
    if (kittycornCount > 0) {
      const kittySpacing = Math.floor(endCol / (kittycornCount + 1));
      for (let i = 0; i < kittycornCount; i++) {
        const kc = rng.nextInt(kittySpacing * (i + 1) - 8, kittySpacing * (i + 1) + 8);
        if (kc > 10 && kc < endCol) {
          let placeRow = grassRow - 2;
          for (let r = grassRow - 6; r < grassRow - 1; r++) {
            if (this.get(kc, r) === TILE_GRASS) { placeRow = r - 2; break; }
          }
          if (this.get(kc, grassRow) !== TILE_EMPTY) {
            this.kittycornGems.push(new KittycornGem(kc * T + T/2 - 8, placeRow * T));
          }
        }
      }
    }

    // Place pixicorn gems
    const pixicornCount = def.pixicornGems || 0;
    if (pixicornCount > 0) {
      const pixieSpacing = Math.floor(endCol / (pixicornCount + 1));
      for (let i = 0; i < pixicornCount; i++) {
        const pc = rng.nextInt(pixieSpacing * (i + 1) - 8, pixieSpacing * (i + 1) + 8);
        if (pc > 10 && pc < endCol) {
          let placeRow = grassRow - 2;
          for (let r = grassRow - 6; r < grassRow - 1; r++) {
            if (this.get(pc, r) === TILE_GRASS) { placeRow = r - 2; break; }
          }
          if (this.get(pc, grassRow) !== TILE_EMPTY) {
            this.pixicornGems.push(new PixicornGem(pc * T + T/2 - 8, placeRow * T));
          }
        }
      }
    }

    // Place mousicorn gems (before any mousicorn gate so player gets gem first)
    const mousicornCount = def.mousicornGems || 0;
    if (mousicornCount > 0) {
      // If there's a mousicorn formGate, place gems before it
      let mouseEndCol = endCol;
      if (hasZones) {
        for (const z of def.zones) {
          if (z.formGate && z.formGate.form === "mousicorn") {
            mouseEndCol = Math.min(mouseEndCol, z.formGate.col - 5);
          }
        }
      }
      const mouseSpacing = Math.floor(mouseEndCol / (mousicornCount + 1));
      for (let i = 0; i < mousicornCount; i++) {
        const mc = rng.nextInt(mouseSpacing * (i + 1) - 8, mouseSpacing * (i + 1) + 8);
        if (mc > 10 && mc < mouseEndCol) {
          let placeRow = grassRow - 2;
          for (let r = grassRow - 6; r < grassRow - 1; r++) {
            if (this.get(mc, r) === TILE_GRASS) { placeRow = r - 2; break; }
          }
          if (this.get(mc, grassRow) !== TILE_EMPTY) {
            this.mousicornGems.push(new MousicornGem(mc * T + T/2 - 8, placeRow * T));
          }
        }
      }
    }

    // Zone-specific enemy placement (for zoned levels)
    if (hasZones) {
      for (let zi = 0; zi < def.zones.length; zi++) {
        const zone = def.zones[zi];
        const zoneStart = Math.max(10, zone.startCol);
        const zoneEnd = this.getZoneEndCol(zi);
        const zEndCol = Math.min(zoneEnd, endCol);

        // Gnomes in this zone
        const zGnomes = zone.gnomeCount || 0;
        if (zGnomes > 0) {
          const spacing = Math.max(10, Math.floor((zEndCol - zoneStart) / (zGnomes + 1)));
          for (let i = 0; i < zGnomes; i++) {
            const gc = rng.nextInt(zoneStart + spacing * (i + 1) - 5, zoneStart + spacing * (i + 1) + 5);
            if (gc > 5 && gc < zEndCol) {
              const patrol = rng.nextInt(30, 60);
              let surfaceRow = -1;
              for (let r = grassRow; r >= grassRow - 2; r--) {
                if (this.get(gc, r) === TILE_GRASS) { surfaceRow = r; break; }
              }
              if (surfaceRow >= 0 && this.get(gc, grassRow) !== TILE_EMPTY) {
                this.gnomes.push(new Gnome(gc * T, surfaceRow * T - 28, patrol));
              }
            }
          }
        }

        // Fish in this zone
        const zFish = zone.fishCount || 0;
        if (zFish > 0) {
          const spacing = Math.max(10, Math.floor((zEndCol - zoneStart) / (zFish + 1)));
          for (let i = 0; i < zFish; i++) {
            const fc = rng.nextInt(zoneStart + spacing * (i + 1) - 5, zoneStart + spacing * (i + 1) + 5);
            if (fc > 5 && fc < zEndCol) {
              const fr = rng.nextInt(grassRow - 7, grassRow - 2);
              const patrol = rng.nextInt(40, 100);
              this.fish.push(new Fish(fc * T, fr * T, patrol));
            }
          }
        }

        // Jellyfish in this zone
        const zJelly = zone.jellyCount || 0;
        if (zJelly > 0) {
          const spacing = Math.max(12, Math.floor((zEndCol - zoneStart) / (zJelly + 1)));
          for (let i = 0; i < zJelly; i++) {
            const jc = rng.nextInt(zoneStart + spacing * (i + 1) - 5, zoneStart + spacing * (i + 1) + 5);
            if (jc > 5 && jc < zEndCol) {
              const jr = rng.nextInt(grassRow - 8, grassRow - 3);
              this.jellyfish.push(new Jellyfish(jc * T, jr * T));
            }
          }
        }

        // Narwhals in this zone
        const zNarwhals = zone.narwhalCount || 0;
        if (zNarwhals > 0) {
          const spacing = Math.max(12, Math.floor((zEndCol - zoneStart) / (zNarwhals + 1)));
          for (let i = 0; i < zNarwhals; i++) {
            const nc = rng.nextInt(zoneStart + spacing * (i + 1) - 5, zoneStart + spacing * (i + 1) + 5);
            if (nc > 5 && nc < zEndCol) {
              const nr = rng.nextInt(grassRow - 6, grassRow - 2);
              const patrol = rng.nextInt(50, 120);
              this.narwhals.push(new Narwhal(nc * T, nr * T, patrol));
            }
          }
        }

        // Birds in this zone
        const zBirds = zone.birdCount || 0;
        if (zBirds > 0) {
          const spacing = Math.max(12, Math.floor((zEndCol - zoneStart) / (zBirds + 1)));
          for (let i = 0; i < zBirds; i++) {
            const bc = rng.nextInt(zoneStart + spacing * (i + 1) - 5, zoneStart + spacing * (i + 1) + 5);
            if (bc > 5 && bc < zEndCol) {
              const br = rng.nextInt(grassRow - 7, grassRow - 3);
              const patrol = rng.nextInt(60, 140);
              this.birds.push(new Bird(bc * T, br * T, patrol));
            }
          }
        }
      }
    }

    // Place form gates (zone-defined barriers)
    if (hasZones) {
      for (const zone of def.zones) {
        if (zone.formGate) {
          const fg = zone.formGate;
          const gateCol = fg.col;
          const gateH = fg.height || 80;
          const gateRows = Math.ceil(gateH / T);
          // Build a wall for the gate (fill from top down through ground rows)
          for (let r = grassRow - gateRows; r <= groundRow; r++) {
            this.set(gateCol, r, TILE_DIRT);
            this.set(gateCol + 1, r, TILE_DIRT);
          }
          this.set(gateCol, grassRow - gateRows, TILE_GRASS);
          this.set(gateCol + 1, grassRow - gateRows, TILE_GRASS);
          // Create gate entity (covers full height including ground)
          const gateX = gateCol * T;
          const gateY = (grassRow - gateRows) * T;
          const gateFullH = (groundRow - (grassRow - gateRows) + 1) * T;
          this.formGates.push(new FormGate(gateX, gateY, fg.form, gateFullH));
        }
      }
    }

    // Place hoop (non-boss levels only)
    if (!def.isBoss) {
      const hoopCol = this.cols - 8;
      this.hoop = new Hoop(hoopCol * T + T/2 - 10, (grassRow - 4) * T);
    }

    // Generate environmental props (TMNT-style decorations)
    {
      const T = CFG.TILE;
      const propRng = new SeededRNG(def.seed + 777);
      const bgTheme = def.bgTheme || "meadow";
      const propDefs = THEME_PROPS[bgTheme] || THEME_PROPS.meadow;
      const propsPerScreen = 10;
      const totalProps = Math.floor((this.cols * T / CFG.W) * propsPerScreen);
      for (let pi = 0; pi < totalProps; pi++) {
        const propCol = propRng.nextInt(8, this.cols - 10);
        // Check this column has ground
        if (this.get(propCol, grassRow) !== TILE_GRASS) { continue; }
        // Get zone-aware theme if needed
        let zonePropDefs = propDefs;
        if (hasZones) {
          const zone = this.getZoneAtCol(propCol);
          const zt = zone.bgTheme || bgTheme;
          zonePropDefs = THEME_PROPS[zt] || propDefs;
        }
        if (zonePropDefs.length === 0) continue;
        const propDef = zonePropDefs[propRng.nextInt(0, zonePropDefs.length - 1)];
        const [pw, ph] = propDef.size;
        const px = propCol * T + propRng.nextInt(0, T - pw);
        const py = grassRow * T - ph;
        this.props.push({ type: propDef.type, x: px, y: py, def: propDef });
      }
    }

    // Ensure ground under spawn and end
    for (let c = 0; c < 10; c++) {
      this.set(c, grassRow, TILE_GRASS);
      this.set(c, groundRow, TILE_DIRT);
    }
    if (!def.isBoss) {
      for (let c = this.cols - 12; c < this.cols; c++) {
        this.set(c, grassRow, TILE_GRASS);
        this.set(c, groundRow, TILE_DIRT);
      }
    }
  }
}

// --- Game State Machine ---
class GameStateMachine {
  constructor(game) {
    this.game = game;
    this.state = STATE_TITLE;
    this.stateTimer = 0;
    this.titlePhase = 0;
    this.deathTimer = 0;
    // Player select
    this.selectIndex = 0; // 0=1P, 1=2P
    // Name entry
    this.nameEntrySlot = 1;
    this.nameInput = "";
    this.nameLetterIdx = 0;
    this.nameRepeatTimer = 0;
    this.nameRepeatDir = 0;
    // Story
    this.storySceneIndex = -1;
    this.storyScrollY = 0;
    this.storyPhase = 0;
  }
  setState(s) {
    const prev = this.state;
    this.state = s;
    this.stateTimer = 0;
    this.onStateEnter(s, prev);
  }
  onStateEnter(state, prev) {
    const g = this.game;
    const audio = g.audio;
    const stateNames = ["TITLE","PLAYING","DYING","COMPLETE","LEVEL_INTRO","CODE_ENTRY","PAUSED","PLAYER_SELECT","NAME_ENTRY","STORY"];
    console.log("[State] " + (stateNames[prev]||prev) + " → " + (stateNames[state]||state));
    switch (state) {
      case STATE_TITLE:
        audio.stopMusic(0.8);
        audio.playMusic("title_screen", true);
        break;
      case STATE_LEVEL_INTRO: {
        const def = LEVEL_DEFS[g.currentLevelIndex];
        const track = audio.getMusicForLevel(def);
        audio.playMusic(track, true);
        break;
      }
      case STATE_PLAYING:
        // Restart level music when respawning from death
        if (prev === STATE_DYING) {
          const def = LEVEL_DEFS[g.currentLevelIndex];
          const track = audio.getMusicForLevel(def);
          audio.playMusic(track, true);
        }
        break;
      case STATE_DYING:
        audio.stopMusic(0.3);
        audio.stopCountdown();
        // Play death sound for any dead player
        {
          let deathType = "contact";
          for (const p of g.players) {
            if (p._deathType === "fall") { deathType = "fall"; break; }
          }
          if (deathType === "fall") audio.fallDeathSound();
          else audio.deathSound();
        }
        break;
      case STATE_COMPLETE: {
        audio.stopMusic(0.5);
        audio.stopCountdown();
        const nextIdx = g.currentLevelIndex + 1;
        const isGameComplete = nextIdx >= LEVEL_DEFS.length;
        // Find the player that completed (touched hoop / boss defeated)
        const completingPlayer = g._completingPlayer || g.player;
        setTimeout(() => {
          audio.celebrateSound(completingPlayer);
          if (isGameComplete) {
            setTimeout(() => audio.playMusic("game_complete", false), 1500);
          }
        }, 500);
        break;
      }
      case STATE_PLAYER_SELECT:
        break;
      case STATE_NAME_ENTRY:
        break;
      case STATE_STORY:
        audio.stopMusic(0.5);
        break;
    }
  }
  update(dt) {
    this.stateTimer += dt;
    this.titlePhase += dt;

    switch (this.state) {
      case STATE_TITLE:
        this.updateTitle(dt);
        break;
      case STATE_LEVEL_INTRO:
        this.updateLevelIntro(dt);
        break;
      case STATE_PLAYING:
        this.updatePlaying(dt);
        break;
      case STATE_PAUSED:
        this.updatePaused(dt);
        break;
      case STATE_DYING:
        this.updateDying(dt);
        break;
      case STATE_COMPLETE:
        this.updateComplete(dt);
        break;
      case STATE_CODE_ENTRY:
        this.updateCodeEntry(dt);
        break;
      case STATE_PLAYER_SELECT:
        this.updatePlayerSelect(dt);
        break;
      case STATE_NAME_ENTRY:
        this.updateNameEntry(dt);
        break;
      case STATE_STORY:
        this.updateStory(dt);
        break;
    }
  }
  updateTitle(dt) {
    // Any player's Enter goes to player select
    const anyEnter = this.game.inputs.some(inp => inp.pressed("Enter"));
    if (anyEnter && this.stateTimer > 0.5) {
      this.game.audio.menuSelect();
      this.selectIndex = 0;
      this.setState(STATE_PLAYER_SELECT);
    }
    // Press C or Select to enter code (P1 only for code entry)
    if (this.game.input.pressed("KeyC") && this.stateTimer > 0.5) {
      this.game.audio.menuSelect();
      this.codeInput = "";
      this.codeMessage = "";
      this.codeMessageTimer = 0;
      this.codeLetterIdx = 0;       // D-pad letter selector (0=A, 25=Z)
      this.codeRepeatTimer = 0;     // auto-repeat timer for held D-pad
      this.codeRepeatDir = 0;       // -1=down, +1=up, 0=none
      this.game.input.consumeLetter(); // eat the "C" so it doesn't auto-fill
      this.setState(STATE_CODE_ENTRY);
    }
  }
  updateCodeEntry(dt) {
    const input = this.game.input;
    if (this.codeMessageTimer > 0) {
      this.codeMessageTimer -= dt;
      if (this.codeMessageTimer <= 0) {
        if (this.codeSuccess) {
          // Code was valid — start that world (skip story)
          const g = this.game;
          g.startLevel(true);
          g.currentLevelIndex = this.codeTargetIndex;
          const def = LEVEL_DEFS[this.codeTargetIndex];
          g.level = new Level(def);
          g.level.generate();
          g.parallax = new ParallaxBackground(def);
          g.camera.setBounds(g.level.width, g.level.height);
          for (let i = 0; i < g.players.length; i++) {
            if (g.activePlayers[i]) {
              g.players[i].reset(g.level.spawnX + i * 30, g.level.spawnY);
              g.players[i].isUnderwater = !!def.isUnderwater;
              g.players[i]._deathHandled = false;
            } else {
              g.players[i].alive = false;
              g.players[i].respawnTimer = 0;
            }
          }
          this.setState(STATE_LEVEL_INTRO);
        } else {
          this.codeMessage = "";
        }
      }
      return;
    }

    // --- Keyboard input (type letters directly) ---
    const letter = input.consumeLetter();
    if (letter === "ESCAPE") {
      this.setState(STATE_TITLE);
      return;
    }
    if (letter === "BACKSPACE") {
      this.codeInput = this.codeInput.slice(0, -1);
      return;
    }
    if (letter && letter.length === 1 && this.codeInput.length < 4) {
      this.codeInput += letter;
      this.codeLetterIdx = letter.charCodeAt(0) - 65; // sync selector
      this.game.audio.menuSelect();
    }

    // --- Gamepad D-pad input (cycle through letters) ---
    if (this.codeInput.length < 4) {
      const upP = input.pressed("ArrowUp");
      const downP = input.pressed("ArrowDown");
      const upH = input.held("ArrowUp");
      const downH = input.held("ArrowDown");

      if (upP) {
        this.codeLetterIdx = (this.codeLetterIdx + 1) % 26;
        this.codeRepeatTimer = 0.35;
        this.codeRepeatDir = 1;
        this.game.audio.menuSelect();
      } else if (downP) {
        this.codeLetterIdx = (this.codeLetterIdx + 25) % 26;
        this.codeRepeatTimer = 0.35;
        this.codeRepeatDir = -1;
        this.game.audio.menuSelect();
      }

      // Auto-repeat when D-pad held
      if ((this.codeRepeatDir === 1 && upH) || (this.codeRepeatDir === -1 && downH)) {
        this.codeRepeatTimer -= dt;
        if (this.codeRepeatTimer <= 0) {
          this.codeLetterIdx = (this.codeLetterIdx + (this.codeRepeatDir === 1 ? 1 : 25)) % 26;
          this.codeRepeatTimer = 0.1;
          this.game.audio.menuSelect();
        }
      } else if (!upP && !downP) {
        this.codeRepeatDir = 0;
      }
    }

    // Gamepad A button or D-pad Right → confirm current letter
    if ((input.pressed("_gpA") || input.pressed("ArrowRight")) && this.codeInput.length < 4) {
      this.codeInput += String.fromCharCode(65 + this.codeLetterIdx);
      this.game.audio.menuSelect();
    }

    // Gamepad B button or D-pad Left → delete last letter
    if ((input.pressed("_gpB") || input.pressed("ArrowLeft")) && this.codeInput.length > 0 && !input.pressed("ArrowUp") && !input.pressed("ArrowDown")) {
      this.codeInput = this.codeInput.slice(0, -1);
      // Sync letter selector to previous letter
      if (this.codeInput.length > 0) {
        this.codeLetterIdx = this.codeInput.charCodeAt(this.codeInput.length - 1) - 65;
      } else {
        this.codeLetterIdx = 0;
      }
    }

    // Gamepad Select → back to title
    if (input.pressed("KeyC")) {
      this.setState(STATE_TITLE);
      return;
    }

    // Start/Enter → submit code
    if (input.pressed("Enter") && this.codeInput.length > 0) {
      const info = WORLD_CODES[this.codeInput];
      if (info) {
        this.codeMessage = "CODE ACCEPTED! " + info.label;
        this.codeSuccess = true;
        this.codeTargetIndex = info.levelIndex;
        this.codeMessageTimer = 1.5;
        this.game.audio.collectSound();
      } else {
        this.codeMessage = "INVALID CODE";
        this.codeSuccess = false;
        this.codeMessageTimer = 1.5;
        this.game.audio.hurtSound();
        this.codeInput = "";
      }
    }
  }
  updateLevelIntro(dt) {
    // Show level name for 2 seconds, any player can skip
    const anyEnter = this.game.inputs.some(inp => inp.enter);
    if (this.stateTimer > 2.0 || (anyEnter && this.stateTimer > 0.5)) {
      this.setState(STATE_PLAYING);
    }
  }
  updatePaused(dt) {
    // Any player can unpause
    const anyEnter = this.game.inputs.some(inp => inp.pressed("Enter"));
    if (anyEnter && this.stateTimer > 0.3) {
      this.game.audio.menuSelect();
      this.setState(STATE_PLAYING);
    }
  }
  updatePlaying(dt) {
    const g = this.game;
    const players = g.players.filter((p, i) => g.activePlayers[i]);
    const activePlayers = players.filter(p => p.alive);

    // Pause on any player's Enter
    if (g.inputs.some(inp => inp.pressed("Enter"))) {
      g.audio.menuSelect();
      this.setState(STATE_PAUSED);
      return;
    }

    g.gameTime += dt;
    g.updateCombo(dt);

    // Level timer countdown (always ticks while playing, even during respawn)
    if (g.levelTimer > 0) {
      g.levelTimer -= dt * CFG.TIME_TICK_SPEED;
      if (!g.countdownStarted && g.levelTimer <= CFG.TIME_COUNTDOWN_SFX) {
        g.countdownStarted = true;
        g.audio.playCountdown();
      }
      if (g.levelTimer <= 0) {
        g.levelTimer = 0;
        for (const p of players) {
          if (p.alive) { p._deathType = "contact"; p.die(); }
        }
        g.sharedLives--;
        g.particles.floatingText(g.player.cx, g.player.cy - 20, "TIME UP!", "#ff4444");
      }
    }

    // Zone-aware dynamic isUnderwater (per player)
    if (g.level.levelDef.zones) {
      for (const p of activePlayers) {
        const playerCol = Math.floor(p.cx / CFG.TILE);
        const zone = g.level.getZoneAtCol(playerCol);
        const wasUnderwater = p.isUnderwater;
        p.isUnderwater = !!zone.isUnderwater;
        if (wasUnderwater !== p.isUnderwater) {
          if (!p.isUnderwater && p.isMermaid) p.isMermaid = false;
          if (p.isUnderwater) {
            // Only clear non-base forms
            const baseDef = p.characterDef.startForm;
            if (!baseDef.isMouseicorn) p.isMouseicorn = false;
            if (!baseDef.isKittycorn) p.isKittycorn = false;
            if (!baseDef.isPixicorn) p.isPixicorn = false;
          }
        }
      }
    }

    // Update all active players (only if alive)
    for (let i = 0; i < g.players.length; i++) {
      if (g.activePlayers[i] && g.players[i].alive) {
        g.players[i].update(dt, g.level, g.inputs[i], g.audio, g.particles, g.camera);
      }
    }

    // Tether removed — screen-edge clamp applied after camera update below

    // Update entities
    for (const star of g.level.stars) { if (star.alive) star.update(dt, g.gameTime); }
    for (const fly of g.level.flies) { if (fly.alive) fly.update(dt, g.gameTime); }
    for (const gnome of g.level.gnomes) { if (gnome.alive) gnome.update(dt, g.gameTime); }
    if (g.level.hoop) g.level.hoop.update(dt, g.gameTime);
    for (const wc of g.level.wingCrystals) { if (wc.alive && !wc.collected) wc.update(dt, g.gameTime); }
    for (const df of g.level.deadFlowers) { if (df.alive) df.update(dt, g.gameTime); }
    for (const bf of g.level.blackFlowers) { if (bf.alive && !bf.used) bf.update(dt, g.gameTime); }
    for (const hb of g.level.hayBales) { if (hb.alive) hb.update(dt, g.level); }
    for (const gate of g.level.formGates) { gate.update(dt); }
    for (const f of g.level.fish) { if (f.alive) f.update(dt, g.gameTime); }
    for (const j of g.level.jellyfish) { if (j.alive) j.update(dt, g.gameTime); }
    for (const nw of g.level.narwhals) { if (nw.alive) nw.update(dt, g.gameTime); }
    for (const bird of g.level.birds) { if (bird.alive) bird.update(dt, g.gameTime); }
    for (const mg of g.level.mermaidGems) { if (mg.alive && !mg.collected) mg.update(dt, g.gameTime); }
    for (const kg of g.level.kittycornGems) { if (kg.alive && !kg.collected) kg.update(dt, g.gameTime); }
    for (const pg of g.level.pixicornGems) { if (pg.alive && !pg.collected) pg.update(dt, g.gameTime); }
    for (const mg of g.level.mousicornGems) { if (mg.alive && !mg.collected) mg.update(dt, g.gameTime); }
    for (let i = g.level.fireballs.length - 1; i >= 0; i--) {
      const fb = g.level.fireballs[i];
      if (fb.alive) fb.update(dt); else g.level.fireballs.splice(i, 1);
    }

    // Boss intro sound — first player to reach arena
    if (g.level.boss && g.level.boss.alive && !g.bossIntroPlayed) {
      for (const p of activePlayers) {
        if (p.cx >= g.level.boss.arenaLeft) {
          g.bossIntroPlayed = true;
          g.audio.bossIntroSound(g.level.boss.bossType);
          break;
        }
      }
    }

    // Update boss — target nearest alive player
    if (g.level.boss && g.level.boss.alive) {
      let targetX = g.player.cx, targetY = g.player.cy;
      if (activePlayers.length > 0) {
        let nearest = activePlayers[0];
        let nearDist = Infinity;
        for (const p of activePlayers) {
          const ddx = p.cx - g.level.boss.cx;
          const ddy = p.cy - g.level.boss.cy;
          const d = ddx * ddx + ddy * ddy;
          if (d < nearDist) { nearDist = d; nearest = p; }
        }
        targetX = nearest.cx; targetY = nearest.cy;
      }
      g.level.boss.update(dt, g.level, targetX, targetY);
      // Boss defeated check
      if (g.level.boss.defeated && g.level.boss.defeatTimer > 2.0) {
        g.audio.hoopSound();
        g.particles.sparkleBurst(g.level.boss.cx, g.level.boss.cy, 30);
        // Both alive players celebrate
        for (const p of activePlayers) {
          p.animState = "hoopClear";
          p.animFrame = 0;
          p.animTimer = 0;
          p.speedX = 0;
          p.vx = 0;
        }
        g._completingPlayer = activePlayers[0] || g.player;
        g.level.boss.alive = false;
        this.setState(STATE_COMPLETE);
      }
      // Boss fireball spawning
      if (g.level.boss.wantsToShoot) {
        g.level.boss.wantsToShoot = false;
        const bx = g.level.boss.cx;
        const by = g.level.boss.cy;
        const dx = targetX - bx;
        const dy = targetY - by;
        if (g.level.boss.bossType === "storm_dragon") {
          for (let s = -2; s <= 2; s++) {
            const angle = Math.atan2(dy, dx) + s * 0.2;
            g.level.fireballs.push(new Fireball(bx + g.level.boss.dir * 16, by + 10, Math.cos(angle) * 2.8, Math.sin(angle) * 2.8));
          }
          g.audio.fireBossSound();
        } else if (g.level.boss.bossType === "shadow_queen") {
          for (let s = 0; s < 8; s++) {
            const angle = (s / 8) * Math.PI * 2 + g.level.boss.queenGlow;
            g.level.fireballs.push(new Fireball(bx, by, Math.cos(angle) * 2.2, Math.sin(angle) * 2.2));
          }
          g.audio.fireBossSound();
        } else if (g.level.boss.bossType === "pharaoh_cat") {
          for (let s = -1; s <= 1; s++) {
            const angle = Math.atan2(dy, dx) + s * 0.35;
            g.level.fireballs.push(new Fireball(bx + g.level.boss.dir * 20, by - 10, Math.cos(angle) * 2.5, Math.sin(angle) * 1.5));
          }
          g.audio.fireBossSound();
        } else {
          for (let s = -1; s <= 1; s++) {
            const spreadAngle = Math.atan2(dy, dx) + s * 0.25;
            g.level.fireballs.push(new Fireball(bx, by, Math.cos(spreadAngle) * CFG.FLOWER_FIREBALL_SPEED, Math.sin(spreadAngle) * CFG.FLOWER_FIREBALL_SPEED));
          }
          g.audio.fireBossSound();
        }
      }
    }

    // Spawn standing poop / poop / rainbow bolt for BOTH players
    for (const p of players) {
      if (!p.alive) continue;
      if (p._spawnStandPoop) {
        p._spawnStandPoop = false;
        const poop = new Poop(p.cx - p.facing * 20, p.bottom - 20, 0, 0);
        poop.fadeTime = 8.0;
        g.level.poops.push(poop);
        g.audio.formPoopSound(p);
      }
      if (p._spawnPoop) {
        p._spawnPoop = false;
        const pvx = -p.facing * 1.5;
        const spawnX = p.cx - p.facing * 20;
        const spawnY = p.bottom - 14;
        g.level.poops.push(new Poop(spawnX, spawnY, pvx, -2.5));
        g.audio.formPoopSound(p);
        g.particles.emit(PARTICLE_DUST, spawnX, spawnY, {
          vx: -p.facing * 0.8, vy: -1, life: 0.3, size: 3, color: "#cc88ff", gravity: 0.02, friction: 0.9
        });
      }
      if (p._spawnRainbow) {
        p._spawnRainbow = false;
        const isKittySmall = (p.isKittycorn && !p.isUnderwater);
        const isSmallUni = !p.isBig && !p.isMermaid && !p.isKittycorn && !p.isPixicorn && !p.isMouseicorn;
        const hornOffsetX = isKittySmall ? 8 : (isSmallUni ? 12 : 16);
        const hornOffsetY = isKittySmall ? (p.h * 0.3) : (isSmallUni ? 3 : 4);
        const hornX = p.cx + p.facing * hornOffsetX;
        const hornY = p.top + hornOffsetY;
        g.level.rainbowBolts.push(new RainbowBolt(hornX, hornY, p.facing));
        g.audio.rainbowShotSound();
        g.particles.sparkleBurst(hornX, hornY, 5);
      }
    }

    // Update poops
    for (let i = g.level.poops.length - 1; i >= 0; i--) {
      const p = g.level.poops[i];
      if (p.alive) p.update(dt, g.level); else g.level.poops.splice(i, 1);
    }
    // Update rainbow bolts
    for (let i = g.level.rainbowBolts.length - 1; i >= 0; i--) {
      const rb = g.level.rainbowBolts[i];
      if (rb.alive) rb.update(dt, g.level); else g.level.rainbowBolts.splice(i, 1);
    }

    // === Projectile vs enemy collisions (unchanged — bolts/poop are shared) ===
    // Rainbow bolts vs enemies
    const rbEnemyLists = [
      [g.level.flies, "#ff4488", "ZAP!"],
      [g.level.gnomes, "#ff4488", "ZAP!"],
      [g.level.fish, "#ff4488", "ZAP!"],
      [g.level.jellyfish, "#ff4488", "ZAP!"],
      [g.level.narwhals, "#44ccff", "ZAP!"],
      [g.level.birds, "#ff8844", "ZAP!"]
    ];
    for (const [enemies, color, text] of rbEnemyLists) {
      for (const rb of g.level.rainbowBolts) {
        if (!rb.alive) continue;
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          if (rb.overlaps(enemy)) {
            enemy.alive = false; rb.alive = false;
            g.audio.collectSound();
            g.particles.sparkleBurst(enemy.cx, enemy.cy, 12);
            g.particles.floatingText(enemy.cx, enemy.cy - 10, text, color);
            g.addComboHit();
            g.addScore(enemies === g.level.gnomes ? 200 : 100, enemy.cx, enemy.cy, "#ffdd44");
            break;
          }
        }
      }
    }
    // Poop vs enemies
    const poopEnemyLists = [
      [g.level.flies, "#cc88ff", "SPLAT!"],
      [g.level.fish, "#44ccff", "SPLAT!"],
      [g.level.jellyfish, "#cc88ff", "SPLAT!"],
      [g.level.narwhals, "#44ccff", "SPLAT!"],
      [g.level.birds, "#ff8844", "SPLAT!"],
      [g.level.gnomes, "#cc88ff", "SPLAT!"]
    ];
    for (const [enemies, color, text] of poopEnemyLists) {
      for (const poop of g.level.poops) {
        if (!poop.alive || poop.landed) continue;
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          if (poop.overlaps(enemy)) {
            enemy.alive = false; poop.alive = false;
            g.audio.collectSound();
            g.particles.impactBurst(enemy.cx, enemy.cy, 8, color);
            g.particles.floatingText(enemy.cx, enemy.cy - 10, text, color);
            g.addComboHit();
            g.addScore(enemies === g.level.gnomes ? 200 : 100, enemy.cx, enemy.cy, "#ffdd44");
            break;
          }
        }
      }
    }
    // Poop vs fireballs
    for (const poop of g.level.poops) {
      if (!poop.alive || poop.landed) continue;
      for (const fb of g.level.fireballs) {
        if (!fb.alive) continue;
        if (poop.overlaps(fb)) {
          fb.alive = false;
          g.audio.collectSound();
          g.particles.impactBurst(fb.cx, fb.cy, 6, "#ff8844");
          break;
        }
      }
    }
    // Poop vs dead flowers (revive — credit to nearest alive player)
    for (const poop of g.level.poops) {
      if (!poop.alive) continue;
      for (const df of g.level.deadFlowers) {
        if (!df.alive || df.revived) continue;
        if (poop.overlaps(df)) {
          df.revived = true;
          df.reviveTimer = 0;
          poop.alive = false;
          // Credit nearest alive player
          let creditP = activePlayers[0] || g.player;
          for (const ap of activePlayers) {
            if (Math.abs(ap.cx - df.cx) < Math.abs(creditP.cx - df.cx)) creditP = ap;
          }
          creditP.flowersRevived++;
          creditP.flowersForRainbow++;
          g.audio.flowerBloomSound();
          g.particles.sparkleBurst(df.cx, df.cy, 10);
          g.particles.floatingText(df.cx, df.cy - 12, "BLOOM!", "#ff88cc");
          if (creditP.flowersForRainbow >= CFG.FLOWERS_FOR_RAINBOW && !creditP.hasRainbow) {
            creditP.hasRainbow = true;
            g.particles.sparkleBurst(creditP.cx, creditP.cy, 20);
            g.particles.floatingText(creditP.cx, creditP.cy - 20, "RAINBOW POWER!", "#ff4488");
          }
          if (creditP.flowersRevived >= CFG.FLOWERS_FOR_LIFE) {
            g.sharedLives++;
            creditP.flowersRevived = 0;
            creditP.flowersForRainbow = 0;
            g.audio.extraLifeSound();
            g.particles.sparkleBurst(creditP.cx, creditP.cy, 30);
            g.particles.floatingText(creditP.cx, creditP.cy - 20, "1UP!", "#44ff44");
          }
          break;
        }
      }
    }
    // Poop vs black flowers
    for (const poop of g.level.poops) {
      if (!poop.alive) continue;
      for (const bf of g.level.blackFlowers) {
        if (!bf.alive || bf.used) continue;
        if (poop.overlaps(bf)) {
          bf.used = true;
          poop.alive = false;
          g.audio.flowerBloomSound();
          // Check nearest alive player for isBig
          let creditP = activePlayers[0] || g.player;
          for (const ap of activePlayers) {
            if (Math.abs(ap.cx - bf.cx) < Math.abs(creditP.cx - bf.cx)) creditP = ap;
          }
          if (creditP.isBig) {
            g.sharedLives++;
            g.audio.extraLifeSound();
            g.particles.sparkleBurst(bf.cx, bf.cy, 20);
            g.particles.floatingText(bf.cx, bf.cy - 12, "1UP!", "#00ff88");
            const colors = ["#ff0000","#ff8800","#ffff00","#00ff00","#0088ff","#8800ff"];
            for (const clr of colors) g.particles.impactBurst(bf.cx, bf.cy, 4, clr);
          } else {
            g.particles.impactBurst(bf.cx, bf.cy, 8, "#8800aa");
            g.level.hayBales.push(new HayBale(bf.cx - 8, bf.cy - 20));
          }
          break;
        }
      }
    }
    // Poop/rainbow vs boss
    if (g.level.boss && g.level.boss.alive && !g.level.boss.defeated) {
      for (const poop of g.level.poops) {
        if (!poop.alive || poop.landed) continue;
        if (poop.overlaps(g.level.boss)) { g.level.boss.hit(g.particles, g.audio, g); poop.alive = false; break; }
      }
      for (const rb of g.level.rainbowBolts) {
        if (!rb.alive) continue;
        if (rb.overlaps(g.level.boss)) { g.level.boss.hit(g.particles, g.audio, g); rb.alive = false; break; }
      }
    }

    // === PLAYER vs WORLD collisions (for BOTH players) ===
    for (const pl of activePlayers) {
      // Player vs wing crystals
      for (const wc of g.level.wingCrystals) {
        if (!wc.alive || wc.collected) continue;
        if (pl.overlapsPad(wc, -4, -4)) {
          wc.collected = true; wc.alive = false;
          if (!pl.hasWings) pl.collectWings(g.audio, g.particles);
          else { g.audio.collectSound(); g.particles.sparkleBurst(wc.cx, wc.cy, 6); }
        }
      }
      // Player vs stars
      for (const star of g.level.stars) {
        if (!star.alive || star.collected) continue;
        if (pl.overlapsPad(star, -4, -4)) {
          star.collect(); pl.stars++;
          g.audio.collectSound();
          g.particles.sparkleBurst(star.cx, star.cy, 12);
          g.addScore(50, star.cx, star.cy, "#ffff44");
          if (pl.stars % 5 === 0 && !pl.hasRainbow) {
            pl.hasRainbow = true;
            g.particles.sparkleBurst(pl.cx, pl.cy, 20);
            g.particles.floatingText(pl.cx, pl.cy - 20, "RAINBOW POWER!", "#ff4488");
          }
        }
      }
      // Player vs stomp enemies (flies, gnomes, fish, jellyfish, narwhals, birds)
      const stompEnemies = [
        [g.level.flies, -8, 2, 0.6, "#8888ff", "SQUISH!"],
        [g.level.gnomes, -8, 2, 0.6, "#cc4444", "BONK!"],
        [g.level.fish, -6, 2, 0.5, "#44aaff", "SPLASH!"],
        [g.level.jellyfish, -4, 2, 0.5, "#cc88ff", "ZAP!"],
        [g.level.narwhals, -4, 2, 0.5, "#44ccff", "BONK!"],
        [g.level.birds, -4, 2, 0.5, "#ff8844", "SQUAWK!"]
      ];
      for (const [enemies, padX, padY, bounce, color, text] of stompEnemies) {
        for (const enemy of enemies) {
          if (!enemy.alive || !pl.alive) continue;
          if (pl.overlapsPad(enemy, padX, padY)) {
            if (pl.vy > 0 && pl.bottom - 8 < enemy.cy) {
              enemy.alive = false;
              pl.vy = CFG.JUMP_FORCE * bounce;
              g.audio.collectSound();
              g.particles.impactBurst(enemy.cx, enemy.cy, 8, color);
              g.particles.impactBurst(enemy.cx, enemy.cy, 5, "#ffffff");
              g.particles.floatingText(enemy.cx, enemy.cy - 10, text, color);
              // Score + combo
              const isGnome = enemies === g.level.gnomes;
              g.addComboHit();
              g.addScore(isGnome ? 200 : 100, enemy.cx, enemy.cy, "#ffdd44");
              g.camera.shake(3);
            } else {
              pl.hurt(g.particles, g.audio);
            }
          }
        }
      }
      // Player vs form gems
      const formGems = [
        [g.level.mermaidGems, "isMermaid", "collectMermaid"],
        [g.level.kittycornGems, "isKittycorn", "collectKittycorn"],
        [g.level.pixicornGems, "isPixicorn", "collectPixicorn"],
        [g.level.mousicornGems, "isMouseicorn", "collectMouseicorn"]
      ];
      for (const [gems, formProp, collectMethod] of formGems) {
        for (const gem of gems) {
          if (!gem.alive || gem.collected || !pl.alive) continue;
          if (pl.overlaps(gem)) {
            gem.collected = true;
            if (!pl[formProp]) pl[collectMethod](g.particles, g.audio);
            else { g.audio.collectSound(); g.particles.sparkleBurst(gem.cx, gem.cy, 6); }
          }
        }
      }
      // Player vs form gates
      for (const gate of g.level.formGates) {
        if (gate.isOpen() || gate.opened) continue;
        const senseRange = CFG.TILE * 2;
        const gdx = Math.abs(pl.cx - gate.cx);
        const gdy = Math.abs(pl.cy - gate.cy);
        const inRange = gdx < senseRange && gdy < gate.h;
        const touching = pl.overlaps(gate);
        const hasForm =
          gate.requiredForm === "mousicorn" ? pl.isMouseicorn :
          gate.requiredForm === "kittycorn" ? pl.isKittycorn :
          gate.requiredForm === "pixicorn" ? pl.isPixicorn :
          gate.requiredForm === "mermaid" ? pl.isMermaid : false;
        if ((inRange || touching) && hasForm) {
          gate.opened = true;
          g.audio.collectSound();
          g.particles.sparkleBurst(gate.cx, gate.cy, 30);
          const T = CFG.TILE;
          const gateCol = Math.floor(gate.x / T);
          const gateTopRow = Math.floor(gate.y / T);
          const gateRows = Math.ceil(gate.h / T);
          for (let r = gateTopRow; r < gateTopRow + gateRows; r++) {
            g.level.set(gateCol, r, TILE_EMPTY);
            g.level.set(gateCol + 1, r, TILE_EMPTY);
          }
        } else if (touching && !hasForm) {
          pl.x = gate.x - pl.w - 1;
          pl.vx = 0;
          if (!gate._hintTimer || gate._hintTimer <= 0) {
            g.particles.floatingText(gate.cx, gate.y - 10,
              "Need " + gate.requiredForm.toUpperCase() + "!", "#ffaa00");
            gate._hintTimer = 1.5;
          } else { gate._hintTimer -= dt; }
        }
      }
      // Player vs fireballs
      for (const fb of g.level.fireballs) {
        if (!fb.alive || !pl.alive) continue;
        if (pl.overlaps(fb)) { pl.hurt(g.particles, g.audio); fb.alive = false; }
      }
      // Player vs hay bales
      for (const hb of g.level.hayBales) {
        if (!hb.alive || !pl.alive) continue;
        if (pl.overlaps(hb)) {
          hb.alive = false;
          if (!pl.isBig) {
            pl.isBig = true;
            g.audio.growBigSound();
            pl.growBigTimer = CFG.GROW_BIG_DURATION;
            pl.invTimer = CFG.GROW_BIG_DURATION;
            g.particles.sparkleBurst(pl.cx, pl.cy, 15);
            g.particles.floatingText(pl.cx, pl.cy - 20, "BIG!", "#daa520");
          } else {
            g.sharedLives++;
            g.audio.extraLifeSound();
            g.particles.sparkleBurst(pl.cx, pl.cy, 20);
            g.particles.floatingText(pl.cx, pl.cy - 20, "1UP!", "#00ff88");
            const colors = ["#ff0000","#ff8800","#ffff00","#00ff00","#0088ff","#8800ff"];
            for (const clr of colors) g.particles.impactBurst(pl.cx, pl.cy, 4, clr);
          }
        }
      }
      // Player vs boss
      if (g.level.boss && g.level.boss.alive && !g.level.boss.defeated && pl.alive) {
        if (pl.overlapsPad(g.level.boss, -4, 2)) {
          if (pl.vy > 0 && pl.bottom - 8 < g.level.boss.cy) {
            g.level.boss.hit(g.particles, g.audio, g);
            pl.vy = CFG.JUMP_FORCE * 0.7;
          } else if (g.level.boss.invTimer <= 0) {
            pl.hurt(g.particles, g.audio);
          }
        }
      }
      // Player vs hoop
      if (g.level.hoop && g.level.hoop.alive && pl.overlaps(g.level.hoop)) {
        g.audio.hoopSound();
        g.particles.sparkleBurst(g.level.hoop.cx, g.level.hoop.cy, 20);
        // Both alive players celebrate
        for (const cp of activePlayers) {
          cp.animState = "hoopClear";
          cp.animFrame = 0;
          cp.animTimer = 0;
          cp.speedX = 0;
          cp.vx = 0;
        }
        g._completingPlayer = pl;
        this.setState(STATE_COMPLETE);
        break; // only trigger once
      }
    }

    // === Co-op death/respawn handling (N-player) ===
    for (const p of players) {
      if (!p.alive && !p._deathHandled) {
        p._deathHandled = true;
        g.sharedLives--;
        // Find nearest alive player to respawn near
        const others = players.filter(o => o !== p && o.alive);
        if (others.length > 0 && g.sharedLives >= 0) {
          p.respawnTimer = 2.0;
          if (p._deathType === "fall") g.audio.fallDeathSound();
          else g.audio.deathSound();
        }
      }
    }
    // Respawn timers
    for (const p of players) {
      if (!p.alive && p.respawnTimer > 0) {
        p.respawnTimer -= dt;
        if (p.respawnTimer <= 0) {
          // Find nearest alive player
          const others = players.filter(o => o !== p && o.alive);
          if (others.length > 0) {
            let nearest = others[0];
            let nearDist = Infinity;
            for (const o of others) {
              const d = Math.abs(o.cx - p.cx);
              if (d < nearDist) { nearDist = d; nearest = o; }
            }
            p.reset(nearest.cx + 30, nearest.y);
            p._deathHandled = false;
          } else {
            p.respawnTimer = 0;
          }
        }
      }
    }
    // All active players dead = STATE_DYING
    const allDead = players.every(p => !p.alive && p.respawnTimer <= 0);
    if (allDead) {
      this.deathTimer = 0;
      this.setState(STATE_DYING);
    }

    // Camera — follow all active players
    g.camera.followGroup(players, dt);

    // Screen-edge clamp: no player can leave the visible screen
    for (const p of players) {
      if (!p.alive) continue;
      const minX = g.camera.x;
      const maxX = g.camera.x + CFG.W - p.w;
      if (p.x < minX) { p.x = minX; if (p.speedX < 0) p.speedX = 0; }
      if (p.x > maxX) { p.x = maxX; if (p.speedX > 0) p.speedX = 0; }
    }

    // Particles
    g.particles.update(dt);
  }
  updateDying(dt) {
    this.deathTimer += dt;
    this.game.particles.update(dt);
    if (this.deathTimer > 1.5) {
      if (this.game.sharedLives >= 0) {
        // Restart current level from beginning (keep power-ups and lives)
        this.game.startLevel(false);
        this.setState(STATE_PLAYING);
      } else {
        // Game over - back to title
        this.game.currentLevelIndex = 0;
        this.setState(STATE_TITLE);
      }
    }
  }
  updateComplete(dt) {
    const g = this.game;
    g.particles.update(dt);

    // Animate hoop clear sprite for both players
    for (const p of g.players) {
      if (p.animState === "hoopClear") {
        p.animTimer += dt;
        if (p.animTimer > 0.15) {
          p.animTimer = 0;
          if (p.animFrame < 5) {
            p.animFrame++;
          } else {
            p.animFrame = p.animFrame === 5 ? 4 : 5;
          }
        }
      }
    }

    const def = g.level.levelDef;
    const isBossLevel = def.isBoss;
    const nextIdx = g.currentLevelIndex + 1;
    const isGameComplete = nextIdx >= LEVEL_DEFS.length;

    // Any player's Enter advances
    const autoAdvance = isBossLevel && !isGameComplete && this.stateTimer > 5.0;
    const manualAdvance = g.inputs.some(inp => inp.enter) && this.stateTimer > 1.0;

    if (autoAdvance || manualAdvance) {
      g.audio.menuSelect();
      if (isGameComplete) {
        // Epilogue story
        this.triggerStory(8);
      } else if (isBossLevel) {
        // Advance level index, then show story (story _endStory will call startLevel)
        g.currentLevelIndex = nextIdx;
        const completedWorld = def.world;
        if (!this.triggerStory(completedWorld)) {
          // No story for this world — just go to next level
          g.startLevel(false);
          this.setState(STATE_LEVEL_INTRO);
        }
      } else {
        // Non-boss level — go directly to next level
        g.currentLevelIndex = nextIdx;
        g.startLevel(false);
        this.setState(STATE_LEVEL_INTRO);
      }
    }
  }

  // --- Player Select (1-4 players) ---
  updatePlayerSelect(dt) {
    const g = this.game;
    const anyUp = g.inputs.some(inp => inp.pressed("ArrowUp"));
    const anyDown = g.inputs.some(inp => inp.pressed("ArrowDown"));
    const anyEnter = g.inputs.some(inp => inp.pressed("Enter"));

    if (anyUp) {
      this.selectIndex = (this.selectIndex + 3) % 4; // wrap up
      g.audio.menuSelect();
    }
    if (anyDown) {
      this.selectIndex = (this.selectIndex + 1) % 4; // wrap down
      g.audio.menuSelect();
    }
    if (anyEnter && this.stateTimer > 0.3) {
      g.audio.menuSelect();
      g.playerCount = this.selectIndex + 1;
      // Set activePlayers array
      for (let i = 0; i < 4; i++) {
        g.activePlayers[i] = i < g.playerCount;
      }
      g.p2Active = g.playerCount >= 2; // legacy compat
      // Go to name entry for P1
      this.nameEntrySlot = 1;
      this.nameInput = g.playerNames[0];
      this.nameLetterIdx = 0;
      this.nameRepeatTimer = 0;
      this.nameRepeatDir = 0;
      this.setState(STATE_NAME_ENTRY);
    }
    // Escape goes back to title
    if (g.input.pressed("Escape")) {
      this.setState(STATE_TITLE);
    }
  }

  // --- Name Entry ---
  updateNameEntry(dt) {
    const g = this.game;
    const slotIdx = this.nameEntrySlot - 1;
    const input = g.inputs[slotIdx] || g.input;
    // Also allow P1 input for any slot's name (in case of single controller)
    const altInput = g.input;

    // --- Keyboard input ---
    const letter = input.consumeLetter() || (this.nameEntrySlot === 2 ? altInput.consumeLetter() : null);
    if (letter === "ESCAPE") {
      // Go back
      if (this.nameEntrySlot > 1) {
        // Back to previous slot
        this.nameEntrySlot--;
        this.nameInput = g.playerNames[this.nameEntrySlot - 1];
        this.nameLetterIdx = 0;
        this.stateTimer = 0;
      } else {
        this.setState(STATE_PLAYER_SELECT);
      }
      return;
    }
    if (letter === "BACKSPACE") {
      this.nameInput = this.nameInput.slice(0, -1);
      return;
    }
    // Enter key submits name (keyboard or gamepad Start)
    if ((input.pressed("Enter") || altInput.pressed("Enter")) && this.stateTimer > 0.3) {
      this._submitName();
      return;
    }
    if (letter && letter.length === 1 && this.nameInput.length < 8) {
      this.nameInput += letter;
      this.nameLetterIdx = letter.charCodeAt(0) - 65;
      g.audio.menuSelect();
    }

    // --- Gamepad D-pad ---
    const upP = input.pressed("ArrowUp") || altInput.pressed("ArrowUp");
    const downP = input.pressed("ArrowDown") || altInput.pressed("ArrowDown");
    const upH = input.held("ArrowUp") || altInput.held("ArrowUp");
    const downH = input.held("ArrowDown") || altInput.held("ArrowDown");

    if (upP) {
      this.nameLetterIdx = (this.nameLetterIdx + 1) % 26;
      this.nameRepeatTimer = 0.35;
      this.nameRepeatDir = 1;
      g.audio.menuSelect();
    } else if (downP) {
      this.nameLetterIdx = (this.nameLetterIdx + 25) % 26;
      this.nameRepeatTimer = 0.35;
      this.nameRepeatDir = -1;
      g.audio.menuSelect();
    }
    if ((this.nameRepeatDir === 1 && upH) || (this.nameRepeatDir === -1 && downH)) {
      this.nameRepeatTimer -= dt;
      if (this.nameRepeatTimer <= 0) {
        this.nameLetterIdx = (this.nameLetterIdx + (this.nameRepeatDir === 1 ? 1 : 25)) % 26;
        this.nameRepeatTimer = 0.1;
        g.audio.menuSelect();
      }
    } else if (!upP && !downP) {
      this.nameRepeatDir = 0;
    }

    // Gamepad A → confirm letter
    const gpA = input.pressed("_gpA") || altInput.pressed("_gpA");
    if (gpA && this.nameInput.length < 8) {
      this.nameInput += String.fromCharCode(65 + this.nameLetterIdx);
      g.audio.menuSelect();
    }
    // Gamepad B → delete
    const gpB = input.pressed("_gpB") || altInput.pressed("_gpB");
    if (gpB && this.nameInput.length > 0) {
      this.nameInput = this.nameInput.slice(0, -1);
    }
  }
  _submitName() {
    const g = this.game;
    const slotIdx = this.nameEntrySlot - 1;
    const defaultName = CHARACTER_DEFS[CHARACTER_ORDER[slotIdx]].defaultName;
    const name = this.nameInput.trim() || defaultName;
    g.playerNames[slotIdx] = name;
    // Legacy compat
    if (slotIdx === 0) g.p1Name = name;
    if (slotIdx === 1) g.p2Name = name;

    if (this.nameEntrySlot < g.playerCount) {
      // Move to next player's name entry
      this.nameEntrySlot++;
      const nextIdx = this.nameEntrySlot - 1;
      this.nameInput = g.playerNames[nextIdx];
      this.nameLetterIdx = 0;
      this.nameRepeatTimer = 0;
      this.nameRepeatDir = 0;
      this.stateTimer = 0;
    } else {
      // All names entered — go to prologue
      this.triggerStory(0);
    }
    g.audio.menuSelect();
  }

  // --- Story Mode ---
  triggerStory(afterWorld) {
    const idx = STORY_SCENES.findIndex(s => s.triggerAfterWorld === afterWorld);
    if (idx < 0) return false;
    this.storySceneIndex = idx;
    this.storyScrollY = 0;
    this.storyPhase = 0;
    this.setState(STATE_STORY);
    return true;
  }
  updateStory(dt) {
    const g = this.game;
    const scene = STORY_SCENES[this.storySceneIndex];
    if (!scene) { this.setState(STATE_TITLE); return; }

    const anyEnter = g.inputs.some(inp => inp.pressed("Enter"));

    if (this.storyPhase === 0) {
      // Phase 0: Fade in (1.5s)
      if (this.stateTimer > 1.5 || anyEnter) {
        this.storyPhase = 1;
        this.storyScrollY = 0;
      }
    } else if (this.storyPhase === 1) {
      // Phase 1: Scroll text
      this.storyScrollY += dt * 14;
      const lines = g.playerCount >= 2 ? scene.text2P : scene.text1P;
      const totalHeight = lines.length * 18;
      if (this.storyScrollY >= totalHeight || anyEnter) {
        this.storyPhase = 2;
        this.storyScrollY = totalHeight;
      }
    } else if (this.storyPhase === 2) {
      // Phase 2: All visible, wait for Enter
      if (anyEnter) {
        this._endStory();
      }
    }
  }
  _endStory() {
    const g = this.game;
    const scene = STORY_SCENES[this.storySceneIndex];
    if (!scene) { this.setState(STATE_TITLE); return; }

    if (scene.triggerAfterWorld === 0) {
      // Prologue → start fresh game
      g.startLevel(true);
      this.setState(STATE_LEVEL_INTRO);
    } else if (scene.triggerAfterWorld === 8) {
      // Epilogue → title
      this.setState(STATE_TITLE);
    } else {
      // Mid-game: level was already advanced in updateComplete, just start it
      g.startLevel(false);
      this.setState(STATE_LEVEL_INTRO);
    }
  }
}

// --- Main Game Class ---
class Game {
  constructor() {
    const canvas = document.getElementById("c");
    this.renderer = new Renderer(canvas);
    // 4 input managers
    this.inputs = [new InputManager(1), new InputManager(2), new InputManager(3), new InputManager(4)];
    this.input = this.inputs[0];   // backward compat
    this.input2 = this.inputs[1];  // backward compat
    this.audio = new AudioManager();
    this.camera = new Camera();
    this.particles = new ParticleSystem(800); // increased for 4 players
    this.parallax = new ParallaxBackground(LEVEL_DEFS[0]);
    this.tileRenderer = new TileRenderer();
    this.spriteDrawer = new SpriteDrawer();
    this.hud = new HUD();
    this.stateMachine = new GameStateMachine(this);

    this.currentLevelIndex = 0;
    this.level = null;
    // 4 players
    this.player = new Player(0, 0, 1);
    this.player2 = new Player(30, 0, 2);
    this.player3 = new Player(60, 0, 3);
    this.player4 = new Player(90, 0, 4);
    this.players = [this.player, this.player2, this.player3, this.player4];
    // Assign characters
    for (let i = 0; i < 4; i++) {
      this.players[i].setCharacter(CHARACTER_ORDER[i]);
    }
    this.sharedLives = CFG.LIVES;
    this._completingPlayer = null;
    this.playerCount = 4;
    this.activePlayers = [true, true, true, true]; // which slots are active
    this.playerNames = ["STAR", "LUNA", "FAYE", "PIP"];
    // Legacy compat
    this.p1Name = this.playerNames[0];
    this.p2Name = this.playerNames[1];
    this.p2Active = true;
    this.gameTime = 0;
    this.levelTimer = 0;
    this.countdownStarted = false;
    this.bossIntroPlayed = false;

    // TMNT-style score & combo system
    this.score = 0;
    this.combo = 0;
    this.comboTimer = 0;
    this.comboDisplay = 0;  // for HUD fade
    this.comboDisplayTimer = 0;

    this.lastTime = 0;
    this.accumulator = 0;
    this.fixedDT = 1 / 60;
    this.konamiFlashTimer = 0;
    this.konamiActivated = false;

    // Story images: custom images for story scenes (drag-and-drop or from story/ folder)
    this.storyImages = {}; // key → Image element
    this._loadStoryImages();
    this._setupStoryDragDrop();
  }
  _loadStoryImages() {
    // Try loading from story/ folder + localStorage overrides
    for (let i = 0; i <= 8; i++) {
      const key = "story_" + i;
      // Check localStorage first (drag-dropped images persist here)
      const stored = localStorage.getItem("unicorn_coop_" + key);
      if (stored) {
        const img = new Image();
        img.src = stored;
        img.onload = () => { this.storyImages[key] = img; };
      }
      // Also try loading from story/ folder (won't error if missing)
      const fileImg = new Image();
      fileImg.src = "story/" + key + ".png";
      fileImg.onload = () => {
        // Only use file version if no localStorage override
        if (!this.storyImages[key]) this.storyImages[key] = fileImg;
      };
    }
  }
  _setupStoryDragDrop() {
    const canvas = document.getElementById("c");
    canvas.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
    });
    canvas.addEventListener("drop", (e) => {
      e.preventDefault();
      // Only accept drops during story mode
      if (this.stateMachine.state !== STATE_STORY) return;
      const sceneIdx = this.stateMachine.storySceneIndex;
      const scene = STORY_SCENES[sceneIdx];
      if (!scene) return;

      const file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith("image/")) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        const dataUrl = ev.target.result;
        const key = scene.imageKey;
        // Save to localStorage for persistence
        try { localStorage.setItem("unicorn_coop_" + key, dataUrl); } catch(err) {}
        // Create Image element
        const img = new Image();
        img.src = dataUrl;
        img.onload = () => { this.storyImages[key] = img; };
      };
      reader.readAsDataURL(file);
    });
  }
  // --- Score & Combo helpers ---
  addScore(points, x, y, color) {
    const mult = this.combo > 1 ? this.combo : 1;
    const total = points * mult;
    this.score += total;
    if (x !== undefined && y !== undefined) {
      this.particles.floatingText(x, y - 16, "+" + total, color || "#ffdd44");
    }
  }
  addComboHit() {
    this.combo++;
    this.comboTimer = 2.0; // 2s window
    if (this.combo > 1) {
      this.comboDisplay = this.combo;
      this.comboDisplayTimer = 1.5;
    }
  }
  updateCombo(dt) {
    if (this.comboTimer > 0) {
      this.comboTimer -= dt;
      if (this.comboTimer <= 0) { this.combo = 0; }
    }
    if (this.comboDisplayTimer > 0) this.comboDisplayTimer -= dt;
  }
  startLevel(freshGame) {
    const def = LEVEL_DEFS[this.currentLevelIndex];
    this.level = new Level(def);
    this.level.generate();
    if (def.zones) {
      this.parallaxMap = {};
      for (const zone of def.zones) {
        if (!this.parallaxMap[zone.bgTheme]) {
          this.parallaxMap[zone.bgTheme] = new ParallaxBackground(zone);
        }
      }
      this.parallaxZones = def.zones;
      this.parallax = this.parallaxMap[def.zones[0].bgTheme];
    } else {
      this.parallax = new ParallaxBackground(def);
      this.parallaxMap = null;
      this.parallaxZones = null;
    }
    this.camera.setBounds(this.level.width, this.level.height);
    // Reset all players
    const isUW = def.zones ? !!def.zones[0].isUnderwater : !!def.isUnderwater;
    for (let i = 0; i < this.players.length; i++) {
      const p = this.players[i];
      p.reset(this.level.spawnX + i * 30, this.level.spawnY);
      p.stars = 0;
      p._deathHandled = false;
      p.respawnTimer = 0;
      p.isUnderwater = isUW;
    }
    this.gameTime = 0;
    this.levelTimer = def.isBoss ? CFG.BOSS_LEVEL_TIME : CFG.LEVEL_TIME;
    this.countdownStarted = false;
    this.bossIntroPlayed = false;
    this._completingPlayer = null;
    if (freshGame) {
      this.currentLevelIndex = 0;
      const freshDef = LEVEL_DEFS[0];
      this.level = new Level(freshDef);
      this.level.generate();
      this.parallax = new ParallaxBackground(freshDef);
      this.camera.setBounds(this.level.width, this.level.height);
      this.sharedLives = CFG.LIVES;
      this.score = 0;
      this.combo = 0;
      this.comboTimer = 0;
      this.comboDisplay = 0;
      this.comboDisplayTimer = 0;
      // Reset all players fully
      for (let i = 0; i < this.players.length; i++) {
        const p = this.players[i];
        p.reset(this.level.spawnX + i * 30, this.level.spawnY);
        p.lives = CFG.LIVES;
        p.isBig = false;
        p.hasWings = false;
        p.hasRainbow = false;
        p.isMermaid = false;
        // Restore base character form
        p.setCharacter(p.characterId);
        p.isUnderwater = !!freshDef.isUnderwater;
        p.flowersRevived = 0;
        p.flowersForRainbow = 0;
        p.canTripleJump = false;
        p.canDoubleJump = false;
        p.growWingsTimer = 0;
        p.mermaidTransformTimer = 0;
        p.kittycornTransformTimer = 0;
        p.pixicornTransformTimer = 0;
        p.mousicornTransformTimer = 0;
        p._deathHandled = false;
